<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrooveIQ Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #7c5cfc;
    --accent-dim: #5a3fd6;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }
  header h1 span { color: var(--text-dim); font-weight: 400; }
  .auth-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .auth-bar input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    width: 260px;
  }
  .auth-bar input::placeholder { color: var(--text-dim); }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  button:hover { background: var(--accent-dim); }
  button.secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  button.secondary:hover { background: var(--border); color: var(--text); }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* Stats cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
  }
  .stat-card .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Panels */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 800px) { .panels { grid-template-columns: 1fr; } }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body { padding: 0; }
  .full-width { grid-column: 1 / -1; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 10px 16px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(124, 92, 252, 0.04); }

  /* Tags / badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .badge-red { background: rgba(248, 113, 113, 0.15); color: var(--red); }
  .badge-yellow { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
  .badge-blue { background: rgba(96, 165, 250, 0.15); color: var(--blue); }
  .badge-purple { background: rgba(124, 92, 252, 0.15); color: var(--accent); }

  /* Bar chart (CSS-only) */
  .bar-row {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    gap: 12px;
  }
  .bar-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .bar-label {
    font-size: 12px;
    min-width: 90px;
    color: var(--text-dim);
  }
  .bar-track { flex: 1; height: 20px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .bar-count { font-size: 12px; min-width: 40px; text-align: right; }

  /* Status */
  .status-line {
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-line b { color: var(--text); }

  /* Empty state */
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Auto-refresh indicator */
  .refresh-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .refresh-info {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
  }
</style>
</head>
<body>
<header>
  <h1>GrooveIQ <span>Dashboard</span></h1>
  <div class="auth-bar">
    <div class="refresh-info" id="refresh-info" style="display:none">
      <span class="refresh-dot"></span> Auto-refresh 10s
    </div>
    <input type="password" id="api-key" placeholder="API Key" autocomplete="off">
    <button onclick="connect()">Connect</button>
  </div>
</header>

<div class="container" id="app">
  <div class="empty" id="welcome">
    Enter your API key above to connect.
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const BASE = window.location.origin;
let KEY = '';
let refreshTimer = null;

function headers() {
  return { 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };
}

async function api(path) {
  const res = await fetch(BASE + path, { headers: headers() });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleString();
}

function eventBadge(type) {
  const colors = {
    play_end: 'green', like: 'green', playlist_add: 'green', repeat: 'green',
    seek_back: 'green', queue_add: 'green', play_start: 'green',
    skip: 'red', dislike: 'red',
    volume_up: 'blue', volume_down: 'blue',
    pause: 'yellow', resume: 'yellow', rating: 'yellow',
    seek_forward: 'yellow',
    reco_impression: 'purple',
  };
  return `<span class="badge badge-${colors[type] || 'purple'}">${type}</span>`;
}

async function connect() {
  KEY = $('#api-key').value.trim();
  if (!KEY) return;
  sessionStorage.setItem('grooveiq_key', KEY);
  try {
    await loadDashboard();
    $('#refresh-info').style.display = 'flex';
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(loadDashboard, 10000);
  } catch (e) {
    $('#app').innerHTML = `<div class="empty">Connection failed: ${e.message}</div>`;
  }
}

async function loadDashboard() {
  const [stats, users, events] = await Promise.all([
    api('/v1/stats'),
    api('/v1/users?limit=20'),
    api('/v1/events?limit=30'),
  ]);
  render(stats, users, events);
}

function renderEventRow(e) {
  const source = [e.context_type, e.surface].filter(Boolean).join(' / ') || '\u2014';
  const device = [e.device_type, e.device_id ? e.device_id.slice(0, 12) : null].filter(Boolean).join(' ') || '\u2014';
  const output = [e.output_type, e.output_device_name].filter(Boolean).join(': ') || '\u2014';
  const reasons = [e.reason_start ? 'start=' + e.reason_start : null, e.reason_end ? 'end=' + e.reason_end : null].filter(Boolean).join(', ') || '\u2014';
  const sigs = [];
  if (e.dwell_ms != null) sigs.push('dwell=' + (e.dwell_ms / 1000).toFixed(1) + 's');
  if (e.shuffle) sigs.push('shuffle');
  if (e.bluetooth_connected) sigs.push('BT');
  if (e.location_label) sigs.push(e.location_label);
  if (e.hour_of_day != null) sigs.push(e.hour_of_day + ':00');
  if (e.num_seekfwd) sigs.push('seek\u2192' + e.num_seekfwd);
  if (e.num_seekbk) sigs.push('seek\u2190' + e.num_seekbk);
  if (e.context_switch) sigs.push('ctx-switch');
  if (e.position != null) sigs.push('#' + e.position);
  const sigHtml = sigs.length
    ? sigs.map(function(s) { return '<span class="badge badge-blue" style="margin:1px">' + s + '</span>'; }).join(' ')
    : '\u2014';
  return '<tr>'
    + '<td style="white-space:nowrap">' + timeAgo(e.timestamp) + '</td>'
    + '<td><b>' + e.user_id + '</b></td>'
    + '<td style="font-family:monospace;font-size:12px">' + e.track_id + '</td>'
    + '<td>' + eventBadge(e.event_type) + '</td>'
    + '<td>' + (e.value != null ? e.value : '\u2014') + '</td>'
    + '<td>' + source + '</td>'
    + '<td>' + device + '</td>'
    + '<td>' + output + '</td>'
    + '<td style="font-size:11px">' + reasons + '</td>'
    + '<td>' + sigHtml + '</td>'
    + '</tr>';
}

function render(stats, users, events) {
  const maxEvt = Math.max(...Object.values(stats.event_types_24h || {}), 1);

  let html = `
    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Total Events</div>
        <div class="value">${stats.total_events.toLocaleString()}</div>
        <div class="sub">${stats.events_last_24h} in last 24h</div>
      </div>
      <div class="stat-card">
        <div class="label">Active Users</div>
        <div class="value">${stats.total_users}</div>
      </div>
      <div class="stat-card">
        <div class="label">Tracks Analyzed</div>
        <div class="value">${stats.total_tracks_analyzed}</div>
      </div>
      <div class="stat-card">
        <div class="label">Events / Hour</div>
        <div class="value">${stats.events_last_1h}</div>
        <div class="sub">last 60 minutes</div>
      </div>
    </div>

    <div class="panels">
      <!-- Event Type Breakdown -->
      <div class="panel">
        <div class="panel-header">Event Types (24h)</div>
        <div class="panel-body">
          ${Object.keys(stats.event_types_24h || {}).length === 0
            ? '<div class="empty">No events in the last 24 hours</div>'
            : Object.entries(stats.event_types_24h).map(([type, count]) => `
              <div class="bar-row">
                <div class="bar-label">${eventBadge(type)}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${(count / maxEvt * 100).toFixed(1)}%"></div>
                </div>
                <div class="bar-count">${count}</div>
              </div>
            `).join('')}
        </div>
      </div>

      <!-- Users -->
      <div class="panel">
        <div class="panel-header">Users</div>
        <div class="panel-body">
          ${users.length === 0
            ? '<div class="empty">No users yet</div>'
            : `<table>
              <tr><th>User</th><th>Events</th><th>Last Seen</th></tr>
              ${users.map(u => `
                <tr>
                  <td><b>${u.user_id}</b></td>
                  <td>${u.event_count}</td>
                  <td>${timeAgo(u.last_seen)}</td>
                </tr>
              `).join('')}
            </table>`}
        </div>
      </div>

      <!-- Top Tracks -->
      <div class="panel">
        <div class="panel-header">Top Tracks (24h)</div>
        <div class="panel-body">
          ${(stats.top_tracks_24h || []).length === 0
            ? '<div class="empty">No track activity in the last 24 hours</div>'
            : `<table>
              <tr><th>Track ID</th><th>Events</th></tr>
              ${stats.top_tracks_24h.map(t => `
                <tr>
                  <td style="font-family:monospace;font-size:12px">${t.track_id}</td>
                  <td>${t.events}</td>
                </tr>
              `).join('')}
            </table>`}
        </div>
      </div>

      <!-- Library Scan -->
      <div class="panel">
        <div class="panel-header">
          Library Scan
          <button class="secondary" onclick="triggerScan()">Scan Now</button>
        </div>
        <div class="panel-body">
          ${!stats.latest_scan
            ? '<div class="empty">No scans yet. Click "Scan Now" to analyze your library.</div>'
            : `
            <div class="status-line">
              Status: <span class="badge badge-${stats.latest_scan.status === 'completed' ? 'green' : stats.latest_scan.status === 'running' ? 'yellow' : 'red'}">${stats.latest_scan.status}</span>
            </div>
            <div class="status-line">Found: <b>${stats.latest_scan.files_found}</b> &nbsp; Analyzed: <b>${stats.latest_scan.files_analyzed}</b> &nbsp; Failed: <b>${stats.latest_scan.files_failed}</b></div>
            <div class="status-line">Started: <b>${fmtTime(stats.latest_scan.started_at)}</b></div>
            ${stats.latest_scan.ended_at ? `<div class="status-line">Ended: <b>${fmtTime(stats.latest_scan.ended_at)}</b></div>` : ''}
            `}
        </div>
      </div>

      <!-- Recent Events Feed -->
      <div class="panel full-width">
        <div class="panel-header">Recent Events</div>
        <div class="panel-body" style="overflow-x:auto">
          ${events.length === 0
            ? '<div class="empty">No events recorded yet</div>'
            : '<table><tr><th>Time</th><th>User</th><th>Track</th><th>Event</th><th>Value</th><th>Source</th><th>Device</th><th>Output</th><th>Reason</th><th>Signals</th></tr>'
              + events.map(renderEventRow).join('')
              + '</table>'}
        </div>
      </div>
    </div>
  `;
  $('#app').innerHTML = html;
}

async function triggerScan() {
  try {
    await fetch(BASE + '/v1/library/scan', { method: 'POST', headers: headers() });
    setTimeout(loadDashboard, 1000);
  } catch (e) {
    alert('Scan failed: ' + e.message);
  }
}

// Restore key from session
const saved = sessionStorage.getItem('grooveiq_key');
if (saved) {
  $('#api-key').value = saved;
  connect();
}
</script>
</body>
</html>
