      colsample_bytree: { desc: "Column subsampling ratio [RETRAIN]", min: 0.1, max: 1.0, step: 0.05 },
      reg_alpha: { desc: "L1 regularisation [RETRAIN]", min: 0, max: 10, step: 0.1 },
      reg_lambda: { desc: "L2 regularisation [RETRAIN]", min: 0, max: 10, step: 0.1 },
      min_training_samples: { desc: "Min samples required to train [RETRAIN]", min: 5, max: 1000, step: 5, integer: true },
      weight_disliked: { desc: "Sample weight for disliked tracks", min: 1, max: 10, step: 0.1 },
      weight_heavy_skip: { desc: "Sample weight for heavily skipped tracks", min: 1, max: 10, step: 0.1 },
      weight_strong_positive: { desc: "Sample weight for liked/repeated tracks", min: 1, max: 10, step: 0.1 },
      weight_impression_negative: { desc: "Sample weight for shown-but-not-played tracks", min: 1, max: 10, step: 0.1 }
    },
    radio: {
      seed_weight: { desc: "How much the seed anchor influences drift embedding", min: 0, max: 1, step: 0.05 },
      feedback_weight: { desc: "How much feedback shifts drift embedding", min: 0, max: 1, step: 0.05 },

      feedback_dislike_weight: { desc: "Repulsion weight when user dislikes", min: 0, max: 5, step: 0.1 },
      feedback_skip_weight: { desc: "Mild repulsion weight on skip", min: 0, max: 5, step: 0.1 },
      feedback_decay: { desc: "Exponential decay for older feedback", min: 0.1, max: 1, step: 0.05 },
      session_ttl_hours: { desc: "Hours of inactivity before session expires", min: 0.5, max: 24, step: 0.5 },
      max_sessions: { desc: "Maximum concurrent radio sessions", min: 1, max: 500, step: 1, integer: true }
    },
    session_embeddings: {
      embedding_dim: { desc: "Embedding vector dimensionality [RETRAIN]", min: 16, max: 512, step: 16, integer: true },
      window_size: { desc: "Context window size (tracks before/after) [RETRAIN]", min: 1, max: 20, step: 1, integer: true },
      min_count: { desc: "Ignore tracks appearing fewer times [RETRAIN]", min: 1, max: 50, step: 1, integer: true },

      min_sessions: { desc: "Minimum sessions required to train", min: 1, max: 500, step: 1, integer: true },
      min_vocab: { desc: "Minimum unique tracks required to train", min: 2, max: 100, step: 1, integer: true }
    }
  };
  var group = meta[groupKey];
  if (group && group[fieldKey]) return group[fieldKey];
  // Fallback: guess from default value
  var defVal = algoDefaults.config[groupKey][fieldKey];
  if (typeof defVal === 'number' && Number.isInteger(defVal)) {
    return { desc: fieldKey.replace(/_/g, ' '), min: 0, max: defVal * 10 || 100, step: 1, integer: true };
  }
  return { desc: fieldKey.replace(/_/g, ' '), min: 0, max: 10, step: 0.1 };
}

function algoHasChanges() {
  return JSON.stringify(algoEdited) !== JSON.stringify(algoCurrent.config);
}

function algoHasRetrainChanges() {
  var retrain = false;
  var groups = algoDefaults.groups;
  for (var i = 0; i < groups.length; i++) {
    if (!groups[i].retrain_required) continue;
    var gk = groups[i].key;
    if (JSON.stringify(algoEdited[gk]) !== JSON.stringify(algoCurrent.config[gk])) {
      retrain = true;
      break;
    }
  }
  return retrain;
}

function algoFieldChanged(groupKey, fieldKey) {
  return algoEdited[groupKey][fieldKey] !== algoCurrent.config[groupKey][fieldKey];
}

function algoFieldDiffersFromDefault(groupKey, fieldKey) {
  return algoEdited[groupKey][fieldKey] !== algoDefaults.config[groupKey][fieldKey];
}

function renderAlgorithm() {
  var groups = algoDefaults.groups;
  var hasChanges = algoHasChanges();
  var retrainWarning = hasChanges && algoHasRetrainChanges();

  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">';
  h += '<div>';
  h += '<h2 style="font-size:18px;margin:0">Algorithm Configuration</h2>';
  h += '<span style="font-size:12px;color:var(--text-dim)">Version ' + algoCurrent.version + (algoCurrent.name ? ' \u2014 ' + esc(algoCurrent.name) : '') + '</span>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  h += '<button class="secondary" onclick="algoExport()" title="Export config as JSON">Export</button>';
  h += '<button class="secondary" onclick="algoShowImport()" title="Import config from JSON">Import</button>';
  h += '<button class="secondary" onclick="algoShowHistory()">History</button>';
  h += '<button class="secondary" onclick="algoShowDiff()">Diff</button>';
  h += '<span style="width:1px;height:20px;background:var(--border)"></span>';
  h += '<button class="secondary" style="color:var(--yellow)" onclick="algoResetToDefaults()">Reset to Defaults</button>';
  if (hasChanges) {
    h += '<button class="secondary" onclick="algoDiscardChanges()">Discard</button>';
  }
  h += '<button' + (hasChanges ? '' : ' disabled') + ' onclick="algoSaveAndApply()">Save & Apply</button>';
  h += '</div></div>';

  if (retrainWarning) {
    h += '<div style="background:#2d2200;border:1px solid var(--yellow);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--yellow)">';
    h += '\u26A0 Changes include parameters that trigger a full model retrain (Ranking Model and/or Session Embeddings).';
    h += '</div>';
  }

  // Config groups as accordions
  for (var g = 0; g < groups.length; g++) {
    var group = groups[g];
    var gk = group.key;
    var groupChanged = JSON.stringify(algoEdited[gk]) !== JSON.stringify(algoCurrent.config[gk]);
    var retrain = group.retrain_required;

    h += '<div class="panel full-width" style="margin-bottom:12px">';
    h += '<div class="panel-header algo-group-header" onclick="algoToggleGroup(\'' + gk + '\')" style="cursor:pointer;user-select:none">';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<span class="algo-chevron" id="algo-chev-' + gk + '">\u25B6</span>';
    h += '<span>' + esc(group.label) + '</span>';
    if (retrain) h += '<span class="badge badge-yellow" style="font-size:10px">RETRAIN</span>';
    if (groupChanged) h += '<span class="badge badge-blue" style="font-size:10px">MODIFIED</span>';
    h += '</div>';
    h += '<span style="font-size:12px;color:var(--text-dim);font-weight:400">' + esc(group.description) + '</span>';
    h += '</div>';

    h += '<div class="panel-body algo-group-body" id="algo-body-' + gk + '" style="display:none;padding:16px">';
    var fields = algoFieldSchema(gk);
    h += '<div class="algo-fields-grid">';
    for (var f = 0; f < fields.length; f++) {
      var fk = fields[f].key;
      var meta = algoFieldMeta(gk, fk);
      var val = algoEdited[gk][fk];
      var defVal = algoDefaults.config[gk][fk];
      var changed = algoFieldChanged(gk, fk);
      var diffDefault = val !== defVal;

      h += '<div class="algo-field' + (changed ? ' algo-field-changed' : '') + '">';
      h += '<div class="algo-field-header">';
      h += '<label class="algo-field-label" title="' + esc(meta.desc) + '">' + esc(fk.replace(/_/g, ' ')) + '</label>';
      if (meta.desc.indexOf('[RETRAIN]') >= 0) {
        h += '<span class="badge badge-yellow" style="font-size:9px;padding:1px 4px">RETRAIN</span>';
      }
      h += '</div>';
      h += '<div class="algo-field-controls">';
      h += '<input type="range" class="algo-slider" min="' + meta.min + '" max="' + meta.max + '" step="' + meta.step + '" value="' + val + '" ';
      h += 'oninput="algoSliderChange(\'' + gk + '\',\'' + fk + '\',this.value,' + (meta.integer ? 'true' : 'false') + ')">';
      h += '<input type="number" class="algo-num" min="' + meta.min + '" max="' + meta.max + '" step="' + meta.step + '" value="' + val + '" ';
      h += 'onchange="algoNumChange(\'' + gk + '\',\'' + fk + '\',this.value,' + (meta.integer ? 'true' : 'false') + ')">';
      h += '</div>';
      h += '<div class="algo-field-info">';
      h += '<span style="color:var(--text-dim);font-size:11px">' + esc(meta.desc.replace(' [RETRAIN]', '')) + '</span>';
      if (diffDefault) {
        h += '<span style="font-size:11px;color:var(--accent)"> (default: ' + defVal + ')</span>';
      }
      h += '</div>';
      h += '</div>';
    }
    h += '</div></div></div>';
  }

  $('#app').innerHTML = h;
}

function algoToggleGroup(gk) {
  var body = document.getElementById('algo-body-' + gk);
  var chev = document.getElementById('algo-chev-' + gk);
  if (!body) return;
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '\u25B6' : '\u25BC';
}

function algoSliderChange(gk, fk, val, isInt) {
  var v = isInt ? parseInt(val, 10) : parseFloat(val);
  algoEdited[gk][fk] = v;
  // Sync number input
  var numInputs = document.querySelectorAll('.algo-num');
  // Re-render is expensive, just update sibling + badges
  var sliders = document.querySelectorAll('.algo-slider');
  for (var i = 0; i < sliders.length; i++) {
    var s = sliders[i];
    if (s.value == val && s.parentElement) {
      var numInput = s.parentElement.querySelector('.algo-num');
      if (numInput) numInput.value = v;
      break;
    }
  }
}

function algoNumChange(gk, fk, val, isInt) {
  var meta = algoFieldMeta(gk, fk);
  var v = isInt ? parseInt(val, 10) : parseFloat(val);
  if (isNaN(v)) return;
  if (v < meta.min) v = meta.min;
  if (v > meta.max) v = meta.max;
  algoEdited[gk][fk] = v;
  renderAlgorithm();
}

function algoSaveAndApply() {
  var retrainWarn = algoHasRetrainChanges();
  var msg = 'Save configuration as new version and run the pipeline?';
  if (retrainWarn) msg = 'This will trigger a full model retrain. Save and run pipeline?';
  if (!confirm(msg)) return;

  var name = prompt('Version name (optional):', '');
  apiPut('/v1/algorithm/config', { name: name || null, config: algoEdited }).then(function(saved) {
    algoCurrent = saved;
    algoEdited = JSON.parse(JSON.stringify(saved.config));
    // Phase C: Navigate to Pipeline tab and trigger pipeline reset
    switchTab('pipeline');
    setTimeout(function() {
      apiPost('/v1/pipeline/reset', {}).then(function() {
        pipelineConnectSSE();
        setTimeout(function() { pipelineRefreshStatus(); }, 500);
      }).catch(function(e) { alert('Pipeline run failed: ' + e.message); });
    }, 200);
  }).catch(function(e) {
    alert('Save failed: ' + e.message);
  });
}

function algoDiscardChanges() {
  algoEdited = JSON.parse(JSON.stringify(algoCurrent.config));
  renderAlgorithm();
}

function algoResetToDefaults() {
  if (!confirm('Reset all algorithm parameters to their default values? This creates a new config version.')) return;
  apiPost('/v1/algorithm/config/reset', {}).then(function(saved) {
    algoCurrent = saved;
    algoEdited = JSON.parse(JSON.stringify(saved.config));
    renderAlgorithm();
  }).catch(function(e) {
    alert('Reset failed: ' + e.message);
  });
}

function algoExport() {
  fetch(BASE + '/v1/algorithm/config/export', { headers: headers() }).then(function(res) {
    if (!res.ok) throw new Error(res.statusText);
    return res.blob().then(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'grooveiq-config-v' + algoCurrent.version + '.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  }).catch(function(e) {
    alert('Export failed: ' + e.message);
  });
}

function algoShowImport() {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal" style="min-width:480px">'
    + '<h2>Import Configuration</h2>'
    + '<div class="field"><label>JSON file</label>'
    + '<input type="file" id="algo-import-file" accept=".json" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:13px">'
    + '</div>'
    + '<div class="field"><label>Name (optional)</label>'
    + '<input type="text" id="algo-import-name" placeholder="e.g., Imported from backup" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px">'
    + '</div>'
    + '<div class="actions">'
    + '<button class="secondary" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>'
    + '<button onclick="algoDoImport()">Import</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
}

function algoDoImport() {
  var fileInput = document.getElementById('algo-import-file');
  var nameInput = document.getElementById('algo-import-name');
  if (!fileInput || !fileInput.files.length) { alert('Select a JSON file'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var config = data.config || data;
      var name = (nameInput && nameInput.value) || data.name || 'Imported';
      apiPost('/v1/algorithm/config/import', { name: name, config: config }).then(function(saved) {
        var overlay = document.querySelector('.modal-overlay');
        if (overlay) overlay.remove();
        algoCurrent = saved;
        algoEdited = JSON.parse(JSON.stringify(saved.config));
        api('/v1/algorithm/config/history?limit=50').then(function(h) { algoHistory = h; });
        renderAlgorithm();
      }).catch(function(err) {
        alert('Import failed: ' + err.message);
      });
    } catch (ex) {
      alert('Invalid JSON: ' + ex.message);
    }
  };
  reader.readAsText(fileInput.files[0]);
}

function algoShowHistory() {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  var h = '<div class="modal" style="min-width:600px;max-height:80vh;overflow:auto">';
  h += '<h2>Version History</h2>';
  h += '<table><tr><th>Version</th><th>Name</th><th>Active</th><th>Created</th><th>Actions</th></tr>';
  for (var i = 0; i < algoHistory.length; i++) {
    var v = algoHistory[i];
    h += '<tr>';
    h += '<td>v' + v.version + '</td>';
    h += '<td>' + esc(v.name || '\u2014') + '</td>';
    h += '<td>' + (v.is_active ? '<span class="badge badge-green">active</span>' : '') + '</td>';
    h += '<td style="font-size:12px;color:var(--text-dim)">' + fmtTime(v.created_at) + '</td>';
    h += '<td style="display:flex;gap:4px">';
    if (!v.is_active) {
      h += '<button class="secondary" style="font-size:11px;padding:2px 8px" onclick="algoActivateVersion(' + v.version + ')">Activate</button>';
    }
    h += '<button class="secondary" style="font-size:11px;padding:2px 8px" onclick="algoDiffVersion(' + v.version + ')">Diff</button>';
    h += '</td></tr>';
  }
  h += '</table>';
  h += '<div class="actions"><button class="secondary" onclick="this.closest(\'.modal-overlay\').remove()">Close</button></div>';
  h += '</div>';
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}

function algoActivateVersion(version) {
  if (!confirm('Activate config v' + version + '? This rolls back to that version.')) return;
  apiPost('/v1/algorithm/config/activate/' + version, {}).then(function(saved) {
    var overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
    algoCurrent = saved;
    algoEdited = JSON.parse(JSON.stringify(saved.config));
    api('/v1/algorithm/config/history?limit=50').then(function(h) { algoHistory = h; });
    renderAlgorithm();
  }).catch(function(e) {
    alert('Activate failed: ' + e.message);
  });
}

function algoShowDiff() {
  // Compare edited (working copy) vs current active (saved)
  algoDiffAgainst(algoCurrent.config, 'current (v' + algoCurrent.version + ')');
}

function algoDiffVersion(version) {
  api('/v1/algorithm/config/' + version).then(function(ver) {
    var overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
    algoDiffAgainst(ver.config, 'v' + ver.version + (ver.name ? ' (' + ver.name + ')' : ''));
  }).catch(function(e) { alert('Failed: ' + e.message); });
}

function algoDiffAgainst(compareConfig, compareLabel) {
  var groups = algoDefaults.groups;
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  var h = '<div class="modal" style="min-width:640px;max-height:80vh;overflow:auto">';
  h += '<h2>Diff: Working Copy vs ' + esc(compareLabel) + '</h2>';
  var anyDiff = false;

  for (var g = 0; g < groups.length; g++) {
    var gk = groups[g].key;
    var diffs = [];
    var edited = algoEdited[gk];
    var compare = compareConfig[gk];
    for (var key in edited) {
      if (!edited.hasOwnProperty(key)) continue;
      var ev = edited[key];
      var cv = compare[key];
      if (ev !== cv) {
        diffs.push({ key: key, from: cv, to: ev });
      }
    }
    if (diffs.length === 0) continue;
    anyDiff = true;
    h += '<div style="margin-bottom:12px">';
    h += '<div style="font-weight:600;font-size:13px;margin-bottom:4px">' + esc(groups[g].label) + '</div>';
    h += '<table style="font-size:12px"><tr><th>Parameter</th><th>From</th><th>To</th></tr>';
    for (var d = 0; d < diffs.length; d++) {
      h += '<tr>';
      h += '<td style="font-family:monospace">' + esc(diffs[d].key) + '</td>';
      h += '<td style="color:var(--red)">' + diffs[d].from + '</td>';
      h += '<td style="color:var(--green)">' + diffs[d].to + '</td>';
      h += '</tr>';
    }
    h += '</table></div>';
  }
  if (!anyDiff) {
    h += '<div style="color:var(--text-dim);padding:16px 0">No differences found.</div>';
  }
  h += '<div class="actions"><button class="secondary" onclick="this.closest(\'.modal-overlay\').remove()">Close</button></div>';
  h += '</div>';
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}


// ---------------------------------------------------------------------------
// Override the pipeline step detail to include rich detail div
// ---------------------------------------------------------------------------

var _originalRenderPipeline = renderPipeline;
renderPipeline = function() {
  _originalRenderPipeline();
  // Inject rich detail placeholder after the step detail panel
  var app = document.getElementById('app');
  if (!app) return;
  // Find the pipe-detail div and add rich detail div after it, or add it after the flow
  var existing = document.getElementById('step-detail-rich');
  if (!existing) {
    var div = document.createElement('div');
    div.id = 'step-detail-rich';
    // Insert after the first full-width panel (flow diagram)
    var panels = app.querySelectorAll('.panel.full-width');
    if (panels.length > 0) {
      panels[0].after(div);
    } else {
      app.appendChild(div);
    }
  }
  // Load detail if step is selected
  if (pipelineSelectedStep) {
    loadStepDetail(pipelineSelectedStep);
  } else {
    var el = document.getElementById('step-detail-rich');
    if (el) el.innerHTML = '';
  }
};

if (saved) { $('#api-key').value = saved; connect(); }
