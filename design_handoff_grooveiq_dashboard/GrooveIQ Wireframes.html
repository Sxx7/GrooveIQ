<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GrooveIQ — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-theme="light">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="page-overview.jsx"></script>
<script type="text/babel" src="page-lidarr.jsx"></script>
<script type="text/babel" src="page-actions.jsx"></script>
<script type="text/babel" src="page-recs.jsx"></script>
<script type="text/babel" src="page-realistic.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "dark"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS);
  React.useEffect(() => {
    document.body.setAttribute('data-theme', tweaks.theme);
  }, [tweaks.theme]);

  return (
    <>
      <DesignCanvas>
        {/* SECTION 0 — Realistic mockup */}
        <DCSection id="real" title="00 · Realistic mockup" subtitle="Full-fidelity Monitor → Overview using your exact palette. Sidebar collapses (« / »).">
          <DCArtboard id="real-1" label="Monitor → Overview · expanded" width={1320} height={840}>
            <Realistic />
          </DCArtboard>
        </DCSection>

        {/* SECTION 1 — Collapsible side rail */}
        <DCSection id="shell" title="01 · Shell — collapsible side rail" subtitle="One nav, two states. Click « / » to toggle. Active item gets a lavender accent bar.">
          <DCArtboard id="nav-expanded" label="Expanded · default" width={1080} height={720}>
            <PageMonitorOverview navStyle="side" />
          </DCArtboard>
          <DCArtboard id="nav-collapsed" label="Collapsed · icon rail" width={1080} height={720}>
            <PageMonitorOverview navStyle="side-icon" />
          </DCArtboard>
        </DCSection>

        {/* SECTION 2 — Lidarr Backfill, the 3-bucket split */}
        <DCSection id="lidarr" title="02 · Lidarr Backfill — the triple-split"
                   subtitle="Today's most fragmented page lands in 3 buckets. Cross-links anchor each surface to the others.">
          <DCArtboard id="lb-set" label="Settings · policy" width={780} height={620}>
            <LBSettings />
          </DCArtboard>
          <DCArtboard id="lb-act" label="Actions · queue mgmt" width={780} height={620}>
            <LBActions />
          </DCArtboard>
          <DCArtboard id="lb-mon" label="Monitor · live stats" width={780} height={620}>
            <LBMonitor />
          </DCArtboard>
        </DCSection>

        {/* SECTION 3 — Actions shape comparison */}
        <DCSection id="actions" title="03 · Actions bucket — three shapes"
                   subtitle="Open question Q10. Plan leans toward grouped (B). Compare side by side.">
          <DCArtboard id="act-a" label="A · Single hub (cards)" width={780} height={620}>
            <ActionsHub />
          </DCArtboard>
          <DCArtboard id="act-b" label="B · Grouped pages ★" width={780} height={620}>
            <ActionsGrouped />
          </DCArtboard>
          <DCArtboard id="act-c" label="C · One per action" width={780} height={620}>
            <ActionsSingle />
          </DCArtboard>
        </DCSection>

        {/* SECTION 4 — Recommendations + cross-link to debug */}
        <DCSection id="recs" title="04 · Explore → Recommendations"
                   subtitle="Clean fetch-and-view. Per-row 'debug→' link to Monitor → Recs Debug carries request_id.">
          <DCArtboard id="recs-1" label="Explore → Recommendations" width={1080} height={680}>
            <PageRecommendations />
          </DCArtboard>
        </DCSection>

        {/* SECTION 5 — Open notes + system */}
        <DCSection id="notes" title="05 · Notes for design review"
                   subtitle="Decisions still open and a quick legend for the colour system.">
          <DCArtboard id="legend" label="Colour system · the restraint" width={520} height={520}>
            <div style={{ padding: 24, height: '100%', background: 'var(--paper)', display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div className="hand hand-xl">Colour rules</div>
              <div style={{ fontSize: 12, color: 'var(--ink-2)' }}>
                Today's dashboard uses 7+ rainbows. New design reserves colour for state that genuinely changes meaning.
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 6 }}>
                {[
                  ['Ink', 'var(--ink)', 'default text & UI'],
                  ['Accent', 'var(--accent)', 'primary action · brand'],
                  ['Good', 'var(--good)', 'success · ok'],
                  ['Warn', 'var(--warn)', 'warning · stale'],
                  ['Bad', 'var(--bad)', 'error · destructive'],
                  ['Ink-3', 'var(--ink-3)', 'secondary text'],
                ].map(([n, c, sub]) => (
                  <div key={n} className="row gap-3" style={{ padding: 8, border: '1.5px solid var(--line-soft)', borderRadius: 6 }}>
                    <div style={{ width: 22, height: 22, borderRadius: 4, background: c }} />
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600 }}>{n}</div>
                      <div className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>{sub}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 8, lineHeight: 1.6 }}>
                Source / event-type / reranker badges become typographic — uppercase mono in a faint outline, no fill.
                Score bars are monochrome by default. Heatmaps & music-map keep colour because colour <em>is</em> the data.
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="open-questions" label="Open questions" width={520} height={520}>
            <div style={{ padding: 24, height: '100%', background: 'var(--paper)', display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div className="hand hand-xl">Open Qs</div>
              {[
                ['Landing on first load', 'Monitor → Overview if data exists, else Settings → Connections'],
                ['Activity pill', 'Single combined pill (locked in). Top-right of every page.'],
                ['Sub-page nav', 'Tabs for ≤7 items, side rail for buckets with more (Monitor)'],
                ['User context', 'Settings/Monitor as separate routes; shared user header bar at top'],
                ['Mobile parity', 'Polite "best on desktop" notice for Music Map + diff modals'],
                ['⌘K palette', 'Designed in from start — short-circuits 4×N nav'],
              ].map(([q, a], i) => (
                <div key={i} style={{ borderTop: i > 0 ? '1px dashed var(--line-soft)' : 'none', paddingTop: i > 0 ? 8 : 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 2 }}>{q}</div>
                  <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>{a}</div>
                </div>
              ))}
            </div>
          </DCArtboard>

          <DCArtboard id="activity-pill" label="Activity pill · expanded" width={420} height={520}>
            <div style={{ padding: 24, height: '100%', background: 'var(--paper)', display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div className="hand hand-xl">Activity pill</div>
              <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>
                Lives top-right in every nav variant. Collapsed shows count + brief. Click to expand.
              </div>
              <div style={{ position: 'relative', alignSelf: 'flex-start' }}>
                <ActivityPill expanded={false} onToggle={() => {}} />
              </div>
              <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>Expanded:</div>
              <div style={{ position: 'relative', height: 280 }}>
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0 }}>
                  <ActivityPill expanded={true} onToggle={() => {}} />
                </div>
              </div>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Wireframe controls">
        <TweakSection title="Theme">
          <TweakRadio label="Mode" value={tweaks.theme} options={[
            { value: 'light', label: 'Light' },
            { value: 'dark', label: 'Dark' },
          ]} onChange={v => setTweak('theme', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
