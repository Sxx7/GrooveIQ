  #   environment:
  #     SLSKD_SLSK_USERNAME:          ${SOULSEEK_USERNAME}
  #     SLSKD_SLSK_PASSWORD:          ${SOULSEEK_PASSWORD}
  #     SLSKD_API_KEY:                ${SLSKD_API_KEY}
  #     SLSKD_DOWNLOADS_DIR:          /music/_soulseek_incoming
  #     SLSKD_REMOTE_CONFIGURATION:   "true"
  #   volumes:
  #     - slskd_data:/app
  #     - ${MUSIC_LIBRARY_PATH:-/mnt/music}:/music:rw
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:5030/api/v0/server", "-H", "X-API-Key: ${SLSKD_API_KEY}"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 15s
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "${SLSKD_CPU_LIMIT:-1.0}"
  #         memory: "${SLSKD_MEM_LIMIT:-512M}"
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  # ---------------------------------------------------------------------------
  # Optional: PostgreSQL (uncomment for multi-user / production deployments)
  # ---------------------------------------------------------------------------
  # db:
  #   image: postgres:16-alpine
  #   container_name: grooveiq_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER:     grooveiq
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
