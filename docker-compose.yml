# GrooveIQ – docker-compose.yml
#
# Usage:
#   cp .env.example .env          # edit your settings
#   docker compose up -d          # start
#   docker compose logs -f        # follow logs
#   docker compose down           # stop (data persists in ./data/)
#
# To use PostgreSQL instead of SQLite, uncomment the `db` service and
# update DATABASE_URL in your .env file.

services:

  grooveiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      platforms:
        - linux/amd64
    image: grooveiq:latest
    platform: linux/amd64
    container_name: grooveiq
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]

    ports:
      - "${GROOVEIQ_PORT:-8000}:8000"

    # All user settings (including secrets) are loaded from .env via env_file.
    # This keeps secrets out of the compose file itself — important if you
    # share or version-control docker-compose.yml.  Secrets are still visible
    # via `docker inspect`; for full isolation use Docker Swarm secrets.
    env_file: .env

    environment:
      # Container-internal overrides (these differ from host values in .env)
      MUSIC_LIBRARY_PATH:   /music
      SPOTDL_API_URL:       http://spotdl-api:8181
      # Uncomment when streamrip-api service is enabled:
      # STREAMRIP_API_URL:  http://streamrip-api:8282

    volumes:
      # Persistent database & state
      - grooveiq_data:/data
      # Essentia model cache (avoids re-download on restart)
      - grooveiq_models:/cache/essentia
      # Your music library (read-only – GrooveIQ never modifies your files)
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}:/music:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64M

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

    # Limit CPU/RAM so analysis jobs don't starve other containers
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEM_LIMIT:-2G}"
        reservations:
          memory: 256M

    networks:
      - default
      - apps_default

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # spotdl-api (Spotify-matched downloads via YouTube Music)
  # ---------------------------------------------------------------------------
  spotdl-api:
    build:
      context: ./spotdl-api
      dockerfile: Dockerfile
    image: spotdl-api:latest
    container_name: spotdl-api
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:noexec,nosuid,size=128M
    # No host ports — reachable by grooveiq via Docker network at spotdl-api:8181.
    # Exposing on the host would bypass GrooveIQ's auth layer (spotdl-api has no
    # auth of its own).  For debug access: docker compose exec spotdl-api curl ...
    env_file: .env
    environment:
      # Container-internal overrides
      OUTPUT_DIR:        /music
      OUTPUT_FORMAT:     ${SPOTDL_FORMAT:-opus}
      BITRATE:           ${SPOTDL_BITRATE:-auto}
      OUTPUT_TEMPLATE:   ${SPOTDL_TEMPLATE:-{artist}/{album}/{artists} - {title}.{output-ext}}
      MAX_THREADS:       ${SPOTDL_THREADS:-4}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
    volumes:
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}:/music
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8181/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${SPOTDL_CPU_LIMIT:-1.0}"
          memory: "${SPOTDL_MEM_LIMIT:-1G}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # streamrip-api (Qobuz/Tidal/Deezer/SoundCloud lossless downloads)
  # ---------------------------------------------------------------------------
  # Uncomment to enable. Also uncomment STREAMRIP_API_URL on the grooveiq service
  # above, and configure at least one service's credentials in .env.
  #
  # streamrip-api:
  #   build:
  #     context: ./streamrip-api
  #     dockerfile: Dockerfile
  #   image: streamrip-api:latest
  #   container_name: streamrip-api
  #   restart: unless-stopped
  #   read_only: true
  #   cap_drop: [ALL]
  #   security_opt: [no-new-privileges:true]
  #   tmpfs:
  #     - /tmp:noexec,nosuid,size=128M
  #   # No host ports — reachable by grooveiq via Docker network at streamrip-api:8282.
  #   env_file: .env
  #   environment:
  #     OUTPUT_DIR:          /music
  #     DOWNLOAD_QUALITY:    ${STREAMRIP_QUALITY:-3}
  #     DOWNLOAD_CODEC:      ${STREAMRIP_CODEC:-FLAC}
  #     MAX_CONNECTIONS:     ${STREAMRIP_CONNECTIONS:-6}
  #     MAX_THREADS:         ${STREAMRIP_THREADS:-4}
  #     DEFAULT_SERVICE:     ${STREAMRIP_DEFAULT_SERVICE:-qobuz}
  #     LOG_LEVEL:           ${LOG_LEVEL:-INFO}
  #   volumes:
  #     - ${MUSIC_LIBRARY_PATH:-/mnt/music}:/music
  #     - streamrip_config:/config
  #   healthcheck:
  #     test: ["CMD", "python", "-c",
  #            "import urllib.request; urllib.request.urlopen('http://localhost:8282/health')"]
  #     interval: 30s
  #     timeout:  10s
  #     retries:  3
  #     start_period: 30s
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "${STREAMRIP_CPU_LIMIT:-1.0}"
  #         memory: "${STREAMRIP_MEM_LIMIT:-1G}"
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  # ---------------------------------------------------------------------------
  # Optional: AcousticBrainz Lookup (audio-feature discovery from 29.5M tracks)
  # ---------------------------------------------------------------------------
  # Uncomment to enable. Set AB_LOOKUP_ENABLED=true in .env on the grooveiq
  # container.  First run downloads ~39 GB (or 85 MB with AB_SAMPLE_MODE=true).
  #
  acousticbrainz-lookup:
    build: ./acousticbrainz-lookup
    container_name: acousticbrainz-lookup
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    # No host ports — reachable by grooveiq via Docker network at
    # acousticbrainz-lookup:8200.  No auth on this service.
    environment:
      SAMPLE_MODE: ${AB_SAMPLE_MODE:-false}
      LOG_LEVEL: ${AB_LOG_LEVEL:-INFO}
    volumes:
      - ablookup_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${AB_CPU_LIMIT:-1.0}"
          memory: "${AB_MEM_LIMIT:-2G}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Optional: slskd (Soulseek peer-to-peer downloads)
  # ---------------------------------------------------------------------------
  # Uncomment to enable. Set SLSKD_ENABLED=true and SLSKD_URL=http://slskd:5030
  # in .env on the grooveiq container.  Requires a Soulseek account.
  #
  # slskd:
  #   image: slskd/slskd:latest
  #   container_name: slskd
  #   user: "1001:1001"
  #   restart: unless-stopped
  #   ports:
  #     - "${SLSKD_PORT:-5030}:5030"
