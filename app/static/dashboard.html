<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrooveIQ Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #7c5cfc;
    --accent-dim: #5a3fd6;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 20px; font-weight: 600; color: var(--accent); }
  header h1 span { color: var(--text-dim); font-weight: 400; }
  .auth-bar { display: flex; gap: 8px; align-items: center; }
  .auth-bar input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 260px;
  }
  .auth-bar input::placeholder { color: var(--text-dim); }
  button {
    background: var(--accent); color: #fff; border: none; padding: 6px 16px;
    border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  }
  button.secondary:hover { background: var(--border); color: var(--text); }
  button.danger { background: var(--red); }
  button.danger:hover { opacity: 0.8; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* Tab navigation */
  .tab-bar {
    display: flex; gap: 4px; padding: 8px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab-bar button {
    background: transparent; color: var(--text-dim); border: none; padding: 8px 16px;
    border-radius: 6px 6px 0 0; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .tab-bar button:hover { color: var(--text); background: var(--bg); }
  .tab-bar button.active { color: var(--accent); background: var(--bg); border-bottom: 2px solid var(--accent); }

  /* Stats cards */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px;
  }
  .stat-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* Panels */
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 800px) { .panels { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .panel-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-body { padding: 0; }
  .full-width { grid-column: 1 / -1; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 16px; color: var(--text-dim); font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap;
  }
  th:hover { color: var(--text); }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(124, 92, 252, 0.04); }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: rgba(124, 92, 252, 0.08); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .badge-red { background: rgba(248, 113, 113, 0.15); color: var(--red); }
  .badge-yellow { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
  .badge-blue { background: rgba(96, 165, 250, 0.15); color: var(--blue); }
  .badge-purple { background: rgba(124, 92, 252, 0.15); color: var(--accent); }

  /* Bar chart */
  .bar-row { display: flex; align-items: center; padding: 8px 16px; gap: 12px; }
  .bar-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .bar-label { font-size: 12px; min-width: 90px; color: var(--text-dim); }
  .bar-track { flex: 1; height: 20px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .bar-count { font-size: 12px; min-width: 40px; text-align: right; }

  /* Status */
  .status-line { padding: 12px 20px; font-size: 13px; color: var(--text-dim); }
  .status-line b { color: var(--text); }

  /* Empty state */
  .empty { padding: 40px 20px; text-align: center; color: var(--text-dim); font-size: 13px; }

  /* Progress bar */
  .progress-bar { width: 100%; height: 24px; background: var(--bg); border-radius: 6px; overflow: hidden; margin: 8px 0; position: relative; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 6px; transition: width 0.6s ease; }
  .progress-text { position: absolute; top: 0; left: 0; right: 0; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

  /* Scan log */
  #scan-log div { transition: background 0.3s; }
  #scan-log div:last-child { background: rgba(124, 92, 252, 0.06); }

  /* Filter bar */
  .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); align-items: center; }
  .filter-bar label { font-size: 11px; color: var(--text-dim); }
  .filter-bar input, .filter-bar select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 80px;
  }
  .filter-bar select { width: auto; }
  .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; font-size: 12px; color: var(--text-dim); }

  /* Playlist cards */
  .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .playlist-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; cursor: pointer; transition: border-color 0.2s;
  }
  .playlist-card:hover { border-color: var(--accent); }
  .playlist-card h3 { font-size: 15px; margin-bottom: 8px; }
  .playlist-card .meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 12px; }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; min-width: 400px; max-width: 500px;
  }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .modal .field { margin-bottom: 12px; }
  .modal .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .modal .field input, .modal .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-size: 13px;
  }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Refresh indicator */
  .refresh-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .refresh-info { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; }

  /* Score bar (inline) */
  .score-bar { display: inline-block; width: 60px; height: 8px; background: var(--bg); border-radius: 4px; vertical-align: middle; margin-left: 6px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 4px; }

  /* Reco source badges */
  .source-content { background: rgba(124, 92, 252, 0.15); color: var(--accent); }
  .source-cf { background: rgba(96, 165, 250, 0.15); color: var(--blue); }
  .source-artist { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .source-popular { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }

  /* Profile sections */
  .profile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 16px; }
  .profile-item { text-align: center; }
  .profile-item .pval { font-size: 22px; font-weight: 700; }
  .profile-item .plbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* Inline select styled */
  .inline-select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 6px; font-size: 13px;
  }

  /* Pipeline flow --------------------------------------------------------- */
  .pipeline-flow {
    display: flex; align-items: flex-start; gap: 0; overflow-x: auto;
    padding: 24px 16px; position: relative;
  }
  .pipe-node {
    display: flex; flex-direction: column; align-items: center; min-width: 110px;
    position: relative; cursor: pointer; flex-shrink: 0;
  }
  .pipe-node:hover .pipe-box { border-color: var(--accent); }
  .pipe-box {
    width: 100px; background: var(--surface); border: 2px solid var(--border);
    border-radius: 10px; padding: 12px 8px; text-align: center;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .pipe-box .pipe-icon { font-size: 20px; margin-bottom: 4px; }
  .pipe-box .pipe-label { font-size: 11px; font-weight: 600; line-height: 1.3; color: var(--text); }
  .pipe-box .pipe-metric { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
  .pipe-box .pipe-time { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .pipe-arrow {
    display: flex; align-items: center; padding-top: 28px; color: var(--border);
    font-size: 18px; flex-shrink: 0;
  }
  .pipe-arrow.done { color: var(--green); }
  .pipe-arrow.active { color: var(--accent); }

  /* Node states */
  .pipe-node.pending .pipe-box { opacity: 0.5; }
  .pipe-node.running .pipe-box { border-color: var(--accent); box-shadow: 0 0 12px rgba(124, 92, 252, 0.3); }
  .pipe-node.completed .pipe-box { border-color: var(--green); }
  .pipe-node.failed .pipe-box { border-color: var(--red); box-shadow: 0 0 8px rgba(248, 113, 113, 0.2); }
  .pipe-node.skipped .pipe-box { opacity: 0.4; border-style: dashed; }

  /* Pulse animation for running nodes */
  @keyframes pipe-pulse { 0%, 100% { box-shadow: 0 0 8px rgba(124,92,252,0.3); } 50% { box-shadow: 0 0 20px rgba(124,92,252,0.5); } }
  .pipe-node.running .pipe-box { animation: pipe-pulse 1.5s ease-in-out infinite; }

  /* Status dot on node */
  .pipe-dot {
    width: 10px; height: 10px; border-radius: 50%; margin-top: 6px;
    border: 2px solid var(--border); background: var(--bg);
  }
  .pipe-node.running .pipe-dot { background: var(--accent); border-color: var(--accent); }
  .pipe-node.completed .pipe-dot { background: var(--green); border-color: var(--green); }
  .pipe-node.failed .pipe-dot { background: var(--red); border-color: var(--red); }

  /* Pipeline detail panel */
  .pipe-detail {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-top: 16px;
  }
  .pipe-detail h3 { font-size: 14px; margin-bottom: 8px; }
  .pipe-detail pre {
    background: #1a1020; border: 1px solid #3a2040; border-radius: 6px;
    padding: 12px; font-size: 12px; color: var(--red); overflow-x: auto;
    max-height: 200px; white-space: pre-wrap; word-break: break-all;
  }
  .pipe-detail .metric-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
  }
  .pipe-detail .metric-item {
    background: var(--surface); border-radius: 6px; padding: 8px 12px;
  }
  .pipe-detail .metric-item .mk { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
  .pipe-detail .metric-item .mv { font-size: 16px; font-weight: 600; }

  /* Error log panel */
  .error-log {
    max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px;
  }
  .error-entry { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .error-entry .error-step { color: var(--red); font-weight: 600; }
  .error-entry .error-time { color: var(--text-dim); font-size: 11px; float: right; }
  .error-entry pre { margin-top: 4px; color: var(--text-dim); white-space: pre-wrap; font-size: 11px; max-height: 80px; overflow: hidden; }
  .error-entry.expanded pre { max-height: none; }
  .error-entry:hover { background: rgba(248, 113, 113, 0.04); cursor: pointer; }

  /* Model readiness cards */
  .model-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
  }
  .model-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
  }
  .model-card .model-name { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .model-card .model-status { font-size: 11px; }
  .model-card .model-detail { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .model-card.ready { border-left: 3px solid var(--green); }
  .model-card.not-ready { border-left: 3px solid var(--text-dim); }

  /* Run history */
  .run-row { display: flex; align-items: center; gap: 12px; padding: 8px 16px; font-size: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .run-row:hover { background: rgba(124, 92, 252, 0.04); }
  .run-row .run-id { font-family: monospace; color: var(--text-dim); min-width: 90px; }
  .run-row .run-steps { display: flex; gap: 2px; flex: 1; }
  .run-row .run-step-dot { width: 14px; height: 14px; border-radius: 3px; }
  .run-step-dot.completed { background: var(--green); }
  .run-step-dot.failed { background: var(--red); }
  .run-step-dot.pending { background: var(--border); }
  .run-step-dot.skipped { background: var(--border); opacity: 0.4; }
  .run-step-dot.running { background: var(--accent); }

  /* SSE connection indicator */
  .sse-indicator {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    padding: 2px 8px; border-radius: 4px; background: rgba(52, 211, 153, 0.1);
    color: var(--green);
  }
  .sse-indicator.disconnected { background: rgba(248, 113, 113, 0.1); color: var(--red); }
  .sse-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
</style>
</head>
<body>
<header>
  <h1>GrooveIQ <span>Dashboard</span></h1>
  <div class="auth-bar">
    <div class="refresh-info" id="refresh-info" style="display:none">
      <span class="refresh-dot"></span> Auto-refresh
    </div>
    <input type="password" id="api-key" placeholder="API Key" autocomplete="off">
    <button onclick="connect()">Connect</button>
  </div>
</header>

<div class="tab-bar" id="tab-bar" style="display:none">
  <button class="active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</button>
  <button data-tab="pipeline" onclick="switchTab('pipeline')">Pipeline</button>
  <button data-tab="recommendations" onclick="switchTab('recommendations')">Recommendations</button>
  <button data-tab="users" onclick="switchTab('users')">Users</button>
  <button data-tab="tracks" onclick="switchTab('tracks')">Tracks</button>
  <button data-tab="playlists" onclick="switchTab('playlists')">Playlists</button>
  <button data-tab="discovery" onclick="switchTab('discovery')">Discovery</button>
</div>

<div id="js-errors" style="display:none;background:#2d1111;border:1px solid #7f2222;border-radius:8px;margin:12px 24px;color:#f87171;font-family:monospace;font-size:12px;max-height:200px;overflow:auto"></div>
<div class="container" id="app">
  <div class="empty" id="welcome">Enter your API key above to connect.</div>
</div>

<script>
// Global error handler
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('js-errors');
  if (el) { el.style.display = 'block'; el.innerHTML += '<div style="padding:6px 12px"><b>JS Error:</b> ' + esc(msg) + ' (line ' + line + ')</div>'; }
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('js-errors');
  if (el) { el.style.display = 'block'; el.innerHTML += '<div style="padding:6px 12px"><b>Promise:</b> ' + esc(e.reason ? (e.reason.message || e.reason) : 'unknown') + '</div>'; }
});

var $ = function(s) { return document.querySelector(s); };
var BASE = window.location.origin;
var KEY = '';
var refreshTimer = null;
var scanPollTimer = null;
var scanLogLastId = 0;
var currentView = 'dashboard';
var trackState = { offset: 0, limit: 50, sort: 'bpm', dir: 'asc', total: 0, search: '' };
var userDetailState = { userId: '', historyOffset: 0, historyLimit: 25 };
var cachedUsers = [];

function esc(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

function headers() { return { 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' }; }

function api(path) {
  return fetch(BASE + path, { headers: headers() }).then(function(res) {
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    return res.json();
  });
}

function apiPost(path, body) {
  return fetch(BASE + path, { method: 'POST', headers: headers(), body: JSON.stringify(body) }).then(function(res) {
    if (!res.ok) return res.json().then(function(d) { throw new Error(d.detail || res.statusText); });
    return res.json();
  });
}

function apiPatch(path, body) {
  return fetch(BASE + path, { method: 'PATCH', headers: headers(), body: JSON.stringify(body) }).then(function(res) {
    if (!res.ok) return res.json().then(function(d) { throw new Error(d.detail || res.statusText); });
    return res.json();
  });
}

function apiDelete(path) {
  return fetch(BASE + path, { method: 'DELETE', headers: headers() }).then(function(res) {
    if (!res.ok) throw new Error(res.status);
  });
}

function timeAgo(ts) {
  if (!ts) return '\u2014';
  var diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function fmtTime(ts) { return ts ? new Date(ts * 1000).toLocaleString() : '\u2014'; }

function fmtDuration(secs) {
  if (secs == null) return '\u2014';
  if (secs < 60) return Math.round(secs) + 's';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ' + Math.round(secs % 60) + 's';
  return Math.floor(secs / 3600) + 'h ' + Math.floor((secs % 3600) / 60) + 'm';
}

function fmtTrackDur(secs) {
  if (!secs) return '\u2014';
  var m = Math.floor(secs / 60);
  var s = Math.round(secs % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function topMood(tags) {
  if (!tags || !tags.length) return '\u2014';
  var best = tags[0];
  for (var i = 1; i < tags.length; i++) { if (tags[i].confidence > best.confidence) best = tags[i]; }
  return best.confidence > 0.4 ? esc(best.label) : '\u2014';
}

function basename(path) {
  if (!path) return '\u2014';
  var parts = path.split('/');
  return esc(parts[parts.length - 1]);
}

function trackName(t) {
  // Show "Artist - Title" if available from media server sync, otherwise filename.
  if (t.title && t.artist) return esc(t.artist) + ' \u2014 ' + esc(t.title);
  if (t.title) return esc(t.title);
  return basename(t.file_path);
}

function trackTooltip(t) {
  var parts = [];
  if (t.artist) parts.push(t.artist);
  if (t.title) parts.push(t.title);
  if (t.album) parts.push(t.album);
  if (t.file_path) parts.push(t.file_path);
  return esc(parts.join(' | '));
}

function eventBadge(type) {
  var colors = {
    play_end:'green',like:'green',playlist_add:'green',repeat:'green',seek_back:'green',queue_add:'green',play_start:'green',
    skip:'red',dislike:'red',volume_up:'blue',volume_down:'blue',
    pause:'yellow',resume:'yellow',rating:'yellow',seek_forward:'yellow',reco_impression:'purple'
  };
  return '<span class="badge badge-' + (colors[type] || 'purple') + '">' + esc(type) + '</span>';
}

function strategyBadge(s) {
  var colors = { flow: 'purple', mood: 'green', energy_curve: 'yellow', key_compatible: 'blue' };
  return '<span class="badge badge-' + (colors[s] || 'purple') + '">' + esc(s).replace('_', ' ') + '</span>';
}

function sourceBadge(s) {
  var cls = 'badge ';
  if (s && s.indexOf('content') === 0) cls += 'source-content';
  else if (s === 'cf') cls += 'source-cf';
  else if (s && s.indexOf('artist') === 0) cls += 'source-artist';
  else if (s === 'popular') cls += 'source-popular';
  else cls += 'badge-purple';
  return '<span class="' + cls + '">' + esc(s || 'unknown') + '</span>';
}

function scoreBar(score, maxScore) {
  if (score == null) return '\u2014';
  var pct = maxScore > 0 ? Math.min(score / maxScore * 100, 100) : 0;
  var color = pct > 70 ? 'var(--green)' : pct > 40 ? 'var(--yellow)' : 'var(--red)';
  return score.toFixed(3) + '<div class="score-bar"><div class="score-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
}

// ---------------------------------------------------------------------------
// Tab navigation
// ---------------------------------------------------------------------------

function switchTab(view) {
  currentView = view;
  var tabs = document.querySelectorAll('.tab-bar button');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].className = tabs[i].getAttribute('data-tab') === view ? 'active' : '';
  }
  if (view === 'dashboard') loadDashboard();
  else if (view === 'pipeline') loadPipeline();
  else if (view === 'recommendations') loadRecommendations();
  else if (view === 'users') loadUsers();
  else if (view === 'tracks') loadTracks();
  else if (view === 'playlists') loadPlaylists();
  else if (view === 'discovery') loadDiscovery();
}

// ---------------------------------------------------------------------------
// Connection
// ---------------------------------------------------------------------------

function connect() {
  KEY = $('#api-key').value.trim();
  if (!KEY) return;
  sessionStorage.setItem('grooveiq_key', KEY);
  // Pre-fetch users for dropdowns
  api('/v1/users?limit=200').then(function(u) { cachedUsers = u; }).catch(function(){});
  loadDashboard().then(function() {
    $('#refresh-info').style.display = 'flex';
    $('#tab-bar').style.display = 'flex';
    startAutoRefresh();
  }).catch(function(e) {
    $('#app').innerHTML = '<div class="empty">Connection failed: ' + esc(e.message) + '</div>';
  });
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(function() { if (currentView === 'dashboard') loadDashboard(); }, 10000);
}

function startScanPolling(scanId) {
  if (scanPollTimer) clearInterval(scanPollTimer);
  scanLogLastId = 0;
  scanPollTimer = setInterval(function() {
    if (currentView !== 'dashboard') return;
    api('/v1/stats').then(function(stats) {
      var panel = document.getElementById('scan-panel');
      if (panel) panel.innerHTML = renderScanPanel(stats.latest_scan);
      var tc = document.getElementById('stat-tracks');
      if (tc) tc.textContent = stats.total_tracks_analyzed;
      if (!stats.latest_scan || stats.latest_scan.status !== 'running') {
        stopScanPolling();
        loadDashboard();
      }
    });
    api('/v1/library/scan/' + scanId + '/logs?limit=50&after_id=' + scanLogLastId).then(function(logs) {
      if (!logs.length) return;
      scanLogLastId = logs[logs.length - 1].id;
      var el = document.getElementById('scan-log');
      if (!el) return;
      for (var i = 0; i < logs.length; i++) {
        var l = logs[i];
        var cls = l.level === 'ok' ? 'color:var(--green)' : l.level === 'fail' ? 'color:var(--red)' : 'color:var(--text-dim)';
        var icon = l.level === 'ok' ? '\u2713' : l.level === 'fail' ? '\u2717' : '\u2022';
        var line = document.createElement('div');
        line.style.cssText = 'padding:3px 12px;font-size:12px;font-family:monospace;border-bottom:1px solid var(--border);' + cls;
        line.textContent = icon + ' ' + (l.filename || '') + (l.message ? '  ' + l.message : '');
        el.appendChild(line);
      }
      el.scrollTop = el.scrollHeight;
    });
  }, 3000);
}

function stopScanPolling() {
  if (scanPollTimer) { clearInterval(scanPollTimer); scanPollTimer = null; }
}

// ---------------------------------------------------------------------------
// Dashboard view
// ---------------------------------------------------------------------------

function loadDashboard() {
  return Promise.all([api('/v1/stats'), api('/v1/users?limit=20'), api('/v1/events?limit=30'), api('/v1/stats/model').catch(function() { return null; })])
    .then(function(results) { renderDashboard(results[0], results[1], results[2], results[3]); });
}

function renderScanPanel(scan) {
  if (!scan) return '<div class="empty">No scans yet. Click "Scan Now" to analyze your library.</div>';
  var statusColor = 'red';
  if (scan.status === 'completed') statusColor = 'green';
  else if (scan.status === 'running') statusColor = 'yellow';
  else if (scan.status === 'interrupted') statusColor = 'blue';

  var h = '';
  h += '<div class="status-line" style="display:flex;align-items:center;flex-wrap:wrap;gap:12px">';
  h += '<span>Status: <span class="badge badge-' + statusColor + '">' + esc(scan.status).toUpperCase() + '</span></span>';
  if (scan.elapsed_seconds) h += '<span style="font-size:12px">Elapsed: <b>' + fmtDuration(scan.elapsed_seconds) + '</b></span>';
  if (scan.status === 'running' && scan.eta_seconds != null) h += '<span style="font-size:12px">ETA: <b style="color:var(--yellow)">' + fmtDuration(scan.eta_seconds) + '</b></span>';
  if (scan.rate_per_sec) h += '<span style="font-size:12px">Analysis speed: <b>' + scan.rate_per_sec + '</b> files/s</span>';
  h += '</div>';

  if (scan.files_found > 0) {
    var pct = scan.percent_complete || 0;
    var proc = scan.files_analyzed + (scan.files_skipped || 0) + scan.files_failed;
    h += '<div style="padding:4px 20px 12px">';
    h += '<div class="progress-bar" style="height:28px">';
    h += '<div class="progress-fill" style="width:' + pct + '%"></div>';
    h += '<div class="progress-text" style="font-size:12px">' + pct + '%  \u2014  ' + proc + ' / ' + scan.files_found + ' files</div>';
    h += '</div></div>';
  }

  h += '<div style="display:flex;gap:24px;padding:4px 20px 8px;font-size:13px">';
  h += '<span style="color:var(--green)">\u2713 Analyzed: <b>' + scan.files_analyzed + '</b></span>';
  h += '<span style="color:var(--blue)">\u21bb Skipped: <b>' + (scan.files_skipped || 0) + '</b></span>';
  h += '<span style="color:var(--red)">\u2717 Failed: <b>' + scan.files_failed + '</b></span>';
  h += '<span style="color:var(--text-dim)">Found: <b>' + scan.files_found + '</b></span>';
  h += '</div>';

  if (scan.status === 'running' && scan.current_file) {
    h += '<div style="padding:4px 20px 8px;font-size:12px;color:var(--text-dim)">';
    h += '\u25b6 Processing: <span style="color:var(--text);font-family:monospace">' + esc(scan.current_file) + '</span>';
    h += '</div>';
  }

  h += '<div style="padding:4px 20px 8px;font-size:12px;color:var(--text-dim)">';
  h += 'Started: ' + fmtTime(scan.started_at);
  if (scan.ended_at) h += ' &nbsp;\u2022&nbsp; Ended: ' + fmtTime(scan.ended_at);
  h += '</div>';

  return h;
}

function renderDashboard(stats, users, events, model) {
  var maxEvt = 1;
  var evtKeys = Object.keys(stats.event_types_24h || {});
  for (var i = 0; i < evtKeys.length; i++) { if (stats.event_types_24h[evtKeys[i]] > maxEvt) maxEvt = stats.event_types_24h[evtKeys[i]]; }

  var h = '<div class="stats-grid">'
    + '<div class="stat-card"><div class="label">Total Events</div><div class="value">' + (stats.total_events||0).toLocaleString() + '</div><div class="sub">' + stats.events_last_24h + ' in last 24h</div></div>'
    + '<div class="stat-card"><div class="label">Active Users</div><div class="value">' + stats.total_users + '</div></div>'
    + '<div class="stat-card"><div class="label">Total Tracks</div><div class="value" id="stat-tracks">' + stats.total_tracks_analyzed + '</div><div class="sub">analysis v' + (stats.analysis_version||'?') + '</div></div>'
    + '<div class="stat-card"><div class="label">Playlists</div><div class="value">' + (stats.total_playlists||0) + '</div></div>'
    + '<div class="stat-card"><div class="label">Events / Hour</div><div class="value">' + stats.events_last_1h + '</div><div class="sub">last 60 minutes</div></div>';

  // Model stats card
  if (model && model.ranker) {
    var r = model.ranker;
    h += '<div class="stat-card"><div class="label">Ranker Model</div><div class="value" style="font-size:16px">'
      + esc(r.model_type || 'N/A') + '</div><div class="sub">'
      + (r.n_samples ? r.n_samples + ' samples' : 'not trained');
    if (r.trained_at) h += ' \u00B7 ' + timeAgo(r.trained_at);
    h += '</div></div>';
  }
  h += '</div><div class="panels">';

  // Model evaluation panel (if available)
  if (model && (model.latest_evaluation || model.impressions)) {
    h += '<div class="panel"><div class="panel-header">Recommendation Model</div><div class="panel-body">';
    if (model.latest_evaluation) {
      var ev = model.latest_evaluation;
      h += '<div class="profile-grid">';
      if (ev.ndcg_at_10 != null) h += '<div class="profile-item"><div class="pval">' + ev.ndcg_at_10.toFixed(4) + '</div><div class="plbl">NDCG@10</div></div>';
      if (ev.ndcg_at_50 != null) h += '<div class="profile-item"><div class="pval">' + ev.ndcg_at_50.toFixed(4) + '</div><div class="plbl">NDCG@50</div></div>';
      if (ev.evaluated_users != null) h += '<div class="profile-item"><div class="pval">' + ev.evaluated_users + '</div><div class="plbl">Test Users</div></div>';
      if (ev.baseline_ndcg_at_10 != null) h += '<div class="profile-item"><div class="pval">' + ev.baseline_ndcg_at_10.toFixed(4) + '</div><div class="plbl">Baseline NDCG@10 (popularity)</div></div>';
      h += '</div>';
    }
    if (model.impressions) {
      var imp = model.impressions;
      h += '<div style="padding:8px 16px;font-size:13px;border-top:1px solid var(--border)">';
      h += 'Impressions: <b>' + (imp.impressions || 0) + '</b>';
      h += ' &nbsp;\u00B7&nbsp; Streams: <b>' + (imp.streams_from_reco || 0) + '</b>';
      if (imp.i2s_rate != null) h += ' &nbsp;\u00B7&nbsp; I2S Rate: <b style="color:var(--green)">' + (imp.i2s_rate * 100).toFixed(1) + '%</b>';
      h += '</div>';
    }
    h += '</div></div>';
  }

  // Event types
  h += '<div class="panel"><div class="panel-header">Event Types (24h)</div><div class="panel-body">';
  if (evtKeys.length === 0) { h += '<div class="empty">No events in the last 24 hours</div>'; }
  else { for (var i = 0; i < evtKeys.length; i++) { var k=evtKeys[i], c=stats.event_types_24h[k]; h += '<div class="bar-row"><div class="bar-label">' + eventBadge(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (c/maxEvt*100).toFixed(1) + '%"></div></div><div class="bar-count">' + c + '</div></div>'; } }
  h += '</div></div>';

  // Users
  h += '<div class="panel"><div class="panel-header">Users</div><div class="panel-body">';
  if (!users.length) { h += '<div class="empty">No users yet</div>'; }
  else { h += '<table><tr><th>UID</th><th>User</th><th>Events</th><th>Last Seen</th></tr>'; for (var i = 0; i < users.length; i++) { var u=users[i]; h += '<tr class="clickable" onclick="switchTab(\'users\');setTimeout(function(){viewUser(\'' + esc(u.user_id) + '\')},100)"><td style="font-family:monospace;color:var(--text-dim)">' + (u.uid||'') + '</td><td><b>' + esc(u.user_id) + '</b></td><td>' + u.event_count + '</td><td>' + timeAgo(u.last_seen) + '</td></tr>'; } h += '</table>'; }
  h += '</div></div>';

  // Top tracks
  h += '<div class="panel"><div class="panel-header">Top Tracks (24h)</div><div class="panel-body">';
  var tt = stats.top_tracks_24h || [];
  if (!tt.length) { h += '<div class="empty">No track activity in the last 24 hours</div>'; }
  else { h += '<table><tr><th>Track</th><th>Events</th></tr>'; for (var i = 0; i < tt.length; i++) { var name = (tt[i].artist && tt[i].title) ? esc(tt[i].artist) + ' \u2014 ' + esc(tt[i].title) : tt[i].title ? esc(tt[i].title) : esc(tt[i].track_id); h += '<tr><td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="ID: ' + esc(tt[i].track_id) + '">' + name + '</td><td>' + tt[i].events + '</td></tr>'; } h += '</table>'; }
  h += '</div></div>';

  // Library scan
  h += '<div class="panel full-width"><div class="panel-header">Library Scan <span style="display:flex;gap:6px"><button class="secondary" onclick="triggerSync()">Sync IDs</button><button class="secondary" onclick="triggerScan()">Scan Now</button></span></div>';
  h += '<div class="panel-body" id="scan-panel">' + renderScanPanel(stats.latest_scan) + '</div>';
  h += '<div style="border-top:1px solid var(--border)">';
  h += '<div style="padding:10px 20px;font-size:12px;font-weight:600;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center">';
  h += '<span>Activity Log</span>';
  if (stats.latest_scan && stats.latest_scan.status === 'running') {
    h += '<span class="badge badge-yellow" style="animation:pulse 1.5s infinite">LIVE</span>';
  }
  h += '</div>';
  h += '<div id="scan-log" style="max-height:250px;overflow-y:auto;background:var(--bg);border-top:1px solid var(--border)">';
  h += '<div style="padding:8px 12px;font-size:11px;color:var(--text-dim);font-style:italic">Waiting for scan activity...</div>';
  h += '</div></div></div>';

  // Recent events
  h += '<div class="panel full-width"><div class="panel-header">Recent Events</div><div class="panel-body" style="overflow-x:auto">';
  if (!events.length) { h += '<div class="empty">No events recorded yet</div>'; }
  else {
    h += '<table><tr><th>Time</th><th>User</th><th>Track</th><th>Event</th><th>Value</th><th>Source</th><th>Device</th></tr>';
    for (var i = 0; i < events.length; i++) {
      var e = events[i];
      var src = [e.context_type, e.surface].filter(Boolean).join(' / ') || '\u2014';
      var dev = [e.device_type, e.device_id ? e.device_id.slice(0,12) : null].filter(Boolean).join(' ') || '\u2014';
      h += '<tr><td style="white-space:nowrap">' + timeAgo(e.timestamp) + '</td><td><b>' + esc(e.user_id) + '</b></td>'
        + '<td style="font-family:monospace;font-size:12px">' + esc(e.track_id) + '</td><td>' + eventBadge(e.event_type) + '</td>'
        + '<td>' + (e.value != null ? e.value : '\u2014') + '</td><td>' + esc(src) + '</td><td>' + esc(dev) + '</td></tr>';
    }
    h += '</table>';
  }
  h += '</div></div></div>';
  $('#app').innerHTML = h;

  // Scan log loading
  if (stats.latest_scan && stats.latest_scan.status === 'running') {
    startScanPolling(stats.latest_scan.scan_id);
    api('/v1/library/scan/' + stats.latest_scan.scan_id + '/logs?limit=100').then(function(logs) {
      var el = document.getElementById('scan-log');
      if (!el || !logs.length) return;
      el.innerHTML = '';
      for (var i = 0; i < logs.length; i++) {
        var l = logs[i];
        var cls = l.level === 'ok' ? 'color:var(--green)' : l.level === 'fail' ? 'color:var(--red)' : 'color:var(--text-dim)';
        var icon = l.level === 'ok' ? '\u2713' : l.level === 'fail' ? '\u2717' : '\u2022';
        var line = document.createElement('div');
        line.style.cssText = 'padding:3px 12px;font-size:12px;font-family:monospace;border-bottom:1px solid var(--border);' + cls;
        line.textContent = icon + ' ' + (l.filename || '') + (l.message ? '  ' + l.message : '');
        el.appendChild(line);
      }
      if (logs.length) scanLogLastId = logs[logs.length - 1].id;
      el.scrollTop = el.scrollHeight;
    });
  } else {
    stopScanPolling();
    if (stats.latest_scan) {
      api('/v1/library/scan/' + stats.latest_scan.scan_id + '/logs?limit=50').then(function(logs) {
        var el = document.getElementById('scan-log');
        if (!el || !logs.length) return;
        el.innerHTML = '';
        for (var i = 0; i < logs.length; i++) {
          var l = logs[i];
          var cls = l.level === 'ok' ? 'color:var(--green)' : l.level === 'fail' ? 'color:var(--red)' : 'color:var(--text-dim)';
          var icon = l.level === 'ok' ? '\u2713' : l.level === 'fail' ? '\u2717' : '\u2022';
          var line = document.createElement('div');
          line.style.cssText = 'padding:3px 12px;font-size:12px;font-family:monospace;border-bottom:1px solid var(--border);' + cls;
          line.textContent = icon + ' ' + (l.filename || '') + (l.message ? '  ' + l.message : '');
          el.appendChild(line);
        }
      });
    }
  }
}

function loadRecommendations() {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">'
    + '<h2 style="font-size:18px">Recommendations</h2>'
    + '<div style="display:flex;gap:8px;align-items:center">'
    + '<button class="secondary" onclick="runPipeline()">Run Pipeline</button>'
    + '<button class="secondary" style="color:var(--red)" onclick="resetPipeline()">Reset Pipeline</button>'
    + '<span style="width:1px;height:20px;background:var(--border)"></span>'
    + '<select id="reco-user" class="inline-select"><option value="">Select user...</option>';
  for (var i = 0; i < cachedUsers.length; i++) {
    h += '<option value="' + esc(cachedUsers[i].user_id) + '">' + esc(cachedUsers[i].user_id) + '</option>';
  }
  h += '</select>'
    + '<input id="reco-seed" class="inline-select" placeholder="Seed track (optional)" style="width:200px">'
    + '<input id="reco-limit" type="number" class="inline-select" value="25" min="1" max="100" style="width:60px">'
    + '<button onclick="fetchRecommendations()">Get Recs</button>'
    + '</div></div>';
  h += '<div id="reco-results"><div class="empty">Select a user and click "Get Recs" to generate recommendations.</div></div>';
  $('#app').innerHTML = h;
}

function fetchRecommendations() {
  var userId = document.getElementById('reco-user').value;
  if (!userId) return;
  var seed = document.getElementById('reco-seed').value.trim();
  var limit = parseInt(document.getElementById('reco-limit').value) || 25;
  var url = '/v1/recommend/' + encodeURIComponent(userId) + '?limit=' + limit;
  if (seed) url += '&seed_track_id=' + encodeURIComponent(seed);

  document.getElementById('reco-results').innerHTML = '<div class="empty">Loading recommendations...</div>';

  api(url).then(function(data) {
    renderRecoResults(data);
  }).catch(function(e) {
    document.getElementById('reco-results').innerHTML = '<div class="empty" style="color:var(--red)">Error: ' + esc(e.message) + '</div>';
  });
}

function renderRecoResults(data) {
  var tracks = data.tracks || [];
  var h = '<div class="panel full-width"><div class="panel-header">'
    + 'Results for ' + esc(data.user_id)
    + ' <span style="font-weight:400;color:var(--text-dim);font-size:12px">'
    + tracks.length + ' tracks \u00B7 model: ' + esc(data.model_version) + ' \u00B7 request: ' + esc(data.request_id).slice(0, 8) + '...'
    + '</span></div>';

  if (!tracks.length) {
    h += '<div class="panel-body"><div class="empty">No recommendations available. Ensure the user has listening history and tracks are analyzed.</div></div></div>';
    document.getElementById('reco-results').innerHTML = h;
    return;
  }

  var maxScore = 0;
  for (var i = 0; i < tracks.length; i++) { if (tracks[i].score > maxScore) maxScore = tracks[i].score; }

  h += '<div class="panel-body" style="overflow-x:auto"><table>'
    + '<tr><th>#</th><th>Track</th><th>Artist</th><th>Source</th><th>Score</th><th>BPM</th><th>Key</th><th>Energy</th><th>Mood</th><th>Duration</th></tr>';

  for (var i = 0; i < tracks.length; i++) {
    var t = tracks[i];
    h += '<tr>'
      + '<td>' + (t.position + 1) + '</td>'
      + '<td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + trackTooltip(t) + '">' + (esc(t.title || '') || basename(t.file_path)) + '</td>'
      + '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(t.artist || '\u2014') + '</td>'
      + '<td>' + sourceBadge(t.source) + '</td>'
      + '<td style="white-space:nowrap">' + scoreBar(t.score, maxScore) + '</td>'
      + '<td>' + (t.bpm ? t.bpm.toFixed(1) : '\u2014') + '</td>'
      + '<td>' + esc(t.key || '\u2014') + ' ' + (t.mode ? t.mode.charAt(0) : '') + '</td>'
      + '<td>' + (t.energy != null ? t.energy.toFixed(2) : '\u2014') + '</td>'
      + '<td>' + topMood(t.mood_tags) + '</td>'
      + '<td>' + fmtTrackDur(t.duration) + '</td>'
      + '</tr>';
  }
  h += '</table></div></div>';

  // Source distribution
  var srcCounts = {};
  for (var i = 0; i < tracks.length; i++) {
    var s = tracks[i].source || 'unknown';
    srcCounts[s] = (srcCounts[s] || 0) + 1;
  }
  h += '<div class="panel" style="margin-top:16px"><div class="panel-header">Source Distribution</div><div class="panel-body">';
  var srcKeys = Object.keys(srcCounts);
  for (var i = 0; i < srcKeys.length; i++) {
    var k = srcKeys[i], c = srcCounts[k];
    h += '<div class="bar-row"><div class="bar-label">' + sourceBadge(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (c/tracks.length*100).toFixed(1) + '%"></div></div><div class="bar-count">' + c + '</div></div>';
  }
  h += '</div></div>';

  document.getElementById('reco-results').innerHTML = h;
}

function loadUsers() {
  api('/v1/users?limit=200').then(function(users) {
    cachedUsers = users;
    renderUsersList(users);
  });
}

function renderUsersList(users) {
  var h = '<h2 style="font-size:18px;margin-bottom:16px">Users (' + users.length + ')</h2>';

  if (!users.length) {
    h += '<div class="empty">No users yet. Users are auto-created when events are ingested.</div>';
    $('#app').innerHTML = h;
    return;
  }

  h += '<div class="panel full-width"><div class="panel-body" style="overflow-x:auto"><table>'
    + '<tr><th>UID</th><th>Username</th><th>Display Name</th><th>Events</th><th>Last Seen</th><th>Created</th><th></th></tr>';
  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    h += '<tr class="clickable" onclick="viewUser(\'' + esc(u.user_id) + '\')">'
      + '<td style="font-family:monospace;color:var(--text-dim)">' + u.uid + '</td>'
      + '<td><b>' + esc(u.user_id) + '</b></td>'
      + '<td>' + esc(u.display_name || '\u2014') + '</td>'
      + '<td>' + u.event_count + '</td>'
      + '<td>' + timeAgo(u.last_seen) + '</td>'
      + '<td>' + fmtTime(u.created_at) + '</td>'
      + '<td><button class="secondary" onclick="event.stopPropagation();viewUser(\'' + esc(u.user_id) + '\')">View</button></td>'
      + '</tr>';
  }
  h += '</table></div></div>';
  $('#app').innerHTML = h;
}

function viewUser(userId) {
  userDetailState.userId = userId;
  userDetailState.historyOffset = 0;
  _loadUserDetail();
}

function _loadUserDetail() {
  var enc = encodeURIComponent(userDetailState.userId);
  var hs = userDetailState;
  Promise.all([
    api('/v1/users/' + enc + '/profile'),
    api('/v1/users/' + enc + '/interactions?limit=20&sort_by=satisfaction_score&sort_dir=desc'),
    api('/v1/users/' + enc + '/sessions?limit=10'),
    api('/v1/users/' + enc + '/lastfm/profile').catch(function() { return null; }),
    api('/v1/users/' + enc + '/history?limit=' + hs.historyLimit + '&offset=' + hs.historyOffset),
  ]).then(function(results) {
    renderUserDetail(results[0], results[1], results[2], results[3], results[4]);
  }).catch(function(e) {
    $('#app').innerHTML = '<div class="empty" style="color:var(--red)">Error loading user: ' + esc(e.message) + '</div>';
  });
}

function historyPage(delta) {
  var hs = userDetailState;
  hs.historyOffset = Math.max(0, hs.historyOffset + delta * hs.historyLimit);
  _loadUserDetail();
}

function renderUserDetail(profile, interactions, sessions, lastfmProfile, history) {
  var userId = profile.user_id;
  var numericUid = profile.uid;
  var tp = profile.taste_profile;

  var h = '<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
    + '<button class="secondary" onclick="loadUsers()">\u2190 Back</button>'
    + '<h2 style="font-size:18px">' + esc(userId) + '</h2>'
    + '<span class="badge badge-purple" style="font-family:monospace">UID ' + numericUid + '</span>';
  if (profile.display_name) h += '<span style="color:var(--text-dim)">' + esc(profile.display_name) + '</span>';
  if (profile.profile_updated_at) h += '<span style="color:var(--text-dim);font-size:12px">Profile updated ' + timeAgo(profile.profile_updated_at) + '</span>';
  h += '<button class="secondary" onclick="showRenameModal(' + numericUid + ',\'' + esc(userId) + '\',\'' + esc(profile.display_name || '') + '\')">Edit User</button>';
  h += '<button onclick="switchTab(\'recommendations\');setTimeout(function(){document.getElementById(\'reco-user\').value=\'' + esc(userId) + '\';},100)">Get Recs</button>';
  h += '</div>';

  // Taste profile
  h += '<div class="panels">';

  if (tp && tp.audio_preferences) {
    var ap = tp.audio_preferences;
    h += '<div class="panel"><div class="panel-header">Audio Preferences</div><div class="panel-body"><div class="profile-grid">';
    var prefs = [
      ['BPM', ap.bpm && ap.bpm.mean, 1], ['Energy', ap.energy && ap.energy.mean, 2], ['Danceability', ap.danceability && ap.danceability.mean, 2],
      ['Valence', ap.valence && ap.valence.mean, 2], ['Acousticness', ap.acousticness && ap.acousticness.mean, 2],
      ['Instrumentalness', ap.instrumentalness && ap.instrumentalness.mean, 2], ['Loudness', ap.loudness && ap.loudness.mean, 1]
    ];
    for (var i = 0; i < prefs.length; i++) {
      var p = prefs[i];
      h += '<div class="profile-item"><div class="pval">' + (p[1] != null ? p[1].toFixed(p[2]) : '\u2014') + '</div><div class="plbl">' + p[0] + '</div></div>';
    }
    h += '</div></div></div>';
  }

  if (tp && tp.behaviour) {
    var b = tp.behaviour;
    h += '<div class="panel"><div class="panel-header">Behaviour</div><div class="panel-body"><div class="profile-grid">';
    var stats = [
      ['Total Plays', b.total_plays, 0], ['Active Days', b.active_days, 0],
      ['Avg Session', (b.avg_session_tracks || 0).toFixed(1), -1],
      ['Skip Rate', b.skip_rate != null ? (b.skip_rate * 100).toFixed(1) + '%' : '\u2014', -1],
      ['Completion', b.avg_completion != null ? (b.avg_completion * 100).toFixed(1) + '%' : '\u2014', -1],
    ];
    for (var i = 0; i < stats.length; i++) {
      var s = stats[i];
      h += '<div class="profile-item"><div class="pval">' + (s[2] >= 0 ? (s[1] != null ? Number(s[1]).toFixed(s[2]) : '\u2014') : s[1]) + '</div><div class="plbl">' + s[0] + '</div></div>';
    }
    h += '</div></div></div>';
  }

  if (tp && tp.mood_preferences) {
    var mp = tp.mood_preferences;
    var moodKeys = Object.keys(mp).sort(function(a, b) { return mp[b] - mp[a]; });
    h += '<div class="panel"><div class="panel-header">Mood Preferences</div><div class="panel-body">';
    if (moodKeys.length === 0) { h += '<div class="empty">No mood data yet</div>'; }
    else {
      var maxMood = mp[moodKeys[0]] || 1;
      for (var i = 0; i < Math.min(moodKeys.length, 8); i++) {
        var k = moodKeys[i], v = mp[k];
        h += '<div class="bar-row"><div class="bar-label">' + esc(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (v/maxMood*100).toFixed(1) + '%;background:var(--green)"></div></div><div class="bar-count">' + v.toFixed(2) + '</div></div>';
      }
    }
    h += '</div></div>';
  }

  if (tp && tp.key_preferences) {
    var kp = tp.key_preferences;
    var keyKeys = Object.keys(kp).sort(function(a, b) { return kp[b] - kp[a]; });
    h += '<div class="panel"><div class="panel-header">Key Preferences</div><div class="panel-body">';
    if (keyKeys.length === 0) { h += '<div class="empty">No key data yet</div>'; }
    else {
      var maxKey = kp[keyKeys[0]] || 1;
      for (var i = 0; i < Math.min(keyKeys.length, 12); i++) {
        var k = keyKeys[i], v = kp[k];
        h += '<div class="bar-row"><div class="bar-label">' + esc(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (v/maxKey*100).toFixed(1) + '%;background:var(--blue)"></div></div><div class="bar-count">' + v.toFixed(2) + '</div></div>';
      }
    }
    h += '</div></div>';
  }

  h += '</div>';

  // Last.fm integration
  var lfm = profile.lastfm || null;
  var lfp = lastfmProfile;
  h += '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">Last.fm'
    + (lfm ? ' <span class="badge badge-green" style="margin-left:8px">Connected</span>' : '')
    + '</div><div class="panel-body">';

  if (!lfm) {
    // Not connected — users connect via their client app, not the dashboard
    h += '<div style="padding:16px">'
      + '<p style="color:var(--text-dim);font-size:13px">No Last.fm account linked. Users connect through their music app \u2014 credentials never pass through this dashboard.</p>'
      + '</div>';
  } else {
    // Connected — show status + disconnect
    h += '<div style="padding:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
      + '<div><span style="color:var(--text-dim);font-size:12px">Username</span><br><b>' + esc(lfm.username) + '</b></div>'
      + '<div><span style="color:var(--text-dim);font-size:12px">Scrobbling</span><br>'
      + (lfm.scrobbling_enabled ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-yellow">Read-only</span>') + '</div>'
      + '<div><span style="color:var(--text-dim);font-size:12px">Last Synced</span><br>' + timeAgo(lfm.synced_at) + '</div>'
      + '<button onclick="syncLastfm(\'' + esc(userId) + '\')">Sync Now</button>'
      + '<button class="danger" onclick="disconnectLastfm(\'' + esc(userId) + '\')">Disconnect</button>'
      + '</div>';

    // Last.fm profile data (from cached profile or inline lastfm object)
    var lfData = (lfp && lfp.profile) || (lfm && lfm.profile) || null;
    if (lfData) {
      // Global stats from user_info
      var ui = lfData.user_info;
      if (ui) {
        h += '<div style="border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:24px;flex-wrap:wrap">';
        if (ui.playcount) h += '<div class="profile-item"><div class="pval">' + Number(ui.playcount).toLocaleString() + '</div><div class="plbl">Total Scrobbles</div></div>';
        if (ui.country) h += '<div class="profile-item"><div class="pval">' + esc(ui.country) + '</div><div class="plbl">Country</div></div>';
        if (ui.registered) {
          var regDate = ui.registered.unixtime ? new Date(ui.registered.unixtime * 1000).getFullYear() : (ui.registered['#text'] || '');
          h += '<div class="profile-item"><div class="pval">' + esc(regDate) + '</div><div class="plbl">Member Since</div></div>';
        }
        h += '</div>';
      }

      // Top Artists
      var periods = [['7day', '7 Days'], ['1month', '1 Month'], ['overall', 'All Time']];
      if (lfData.top_artists) {
        h += '<div style="border-top:1px solid var(--border)">';
        h += '<div style="padding:12px 16px;font-size:13px;font-weight:600">Top Artists</div>';
        h += '<div style="display:flex;gap:0;overflow-x:auto">';
        for (var pi = 0; pi < periods.length; pi++) {
          var pk = periods[pi][0], plbl = periods[pi][1];
          var artists = lfData.top_artists[pk] || [];
          h += '<div style="flex:1;min-width:200px;border-right:1px solid var(--border)">';
          h += '<div style="padding:8px 16px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)">' + plbl + '</div>';
          for (var ai = 0; ai < Math.min(artists.length, 8); ai++) {
            var a = artists[ai];
            h += '<div style="padding:4px 16px;font-size:12px;display:flex;justify-content:space-between">'
              + '<span>' + esc(a.name) + '</span>'
              + '<span style="color:var(--text-dim)">' + (a.playcount || '') + '</span></div>';
          }
          if (!artists.length) h += '<div style="padding:8px 16px;font-size:12px;color:var(--text-dim)">No data</div>';
          h += '</div>';
        }
        h += '</div></div>';
      }

      // Loved Tracks
      if (lfData.loved_tracks && lfData.loved_tracks.length > 0) {
        h += '<div style="border-top:1px solid var(--border)">';
        h += '<div style="padding:12px 16px;font-size:13px;font-weight:600">Loved Tracks</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:0">';
        for (var li = 0; li < Math.min(lfData.loved_tracks.length, 10); li++) {
          var lt = lfData.loved_tracks[li];
          var ltArtist = lt.artist ? (lt.artist.name || lt.artist) : '';
          h += '<div style="padding:4px 16px;font-size:12px;width:50%">'
            + '<span style="color:var(--red);margin-right:4px">\u2665</span> '
            + esc(ltArtist) + ' \u2014 ' + esc(lt.name) + '</div>';
        }
        h += '</div></div>';
      }

      // Genre Tags
      if (lfData.genres && Object.keys(lfData.genres).length > 0) {
        var genres = Object.keys(lfData.genres);
        h += '<div style="border-top:1px solid var(--border);padding:12px 16px">';
        h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Genres</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
        for (var gi = 0; gi < Math.min(genres.length, 20); gi++) {
          h += '<span class="badge badge-purple">' + esc(genres[gi]) + '</span>';
        }
        h += '</div></div>';
      }
    }
  }
  h += '</div></div>';

  // Top interactions
  h += '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">Top Tracks (' + interactions.total + ' interactions)</div>';
  h += '<div class="panel-body" style="overflow-x:auto"><table>'
    + '<tr><th>Track</th><th>Score</th><th>Plays</th><th>Skips</th><th>Likes</th><th>Completion</th><th>Last Played</th></tr>';
  var ints = interactions.interactions || [];
  var maxSat = 0;
  for (var i = 0; i < ints.length; i++) { if (ints[i].satisfaction_score > maxSat) maxSat = ints[i].satisfaction_score; }
  for (var i = 0; i < ints.length; i++) {
    var t = ints[i];
    h += '<tr>'
      + '<td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + trackTooltip(t) + '">' + trackName(t) + '</td>'
      + '<td style="white-space:nowrap">' + scoreBar(t.satisfaction_score, maxSat > 0 ? maxSat : 1) + '</td>'
      + '<td>' + t.play_count + '</td>'
      + '<td>' + t.skip_count + '</td>'
      + '<td>' + t.like_count + '</td>'
      + '<td>' + (t.avg_completion != null ? (t.avg_completion * 100).toFixed(0) + '%' : '\u2014') + '</td>'
      + '<td>' + timeAgo(t.last_played_at) + '</td>'
      + '</tr>';
  }
  h += '</table></div></div>';

  // Listening History
  if (history && history.history) {
    var hist = history.history;
    h += '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">Listening History (' + history.total + ' total)</div>';
    h += '<div class="panel-body" style="overflow-x:auto"><table>'
      + '<tr><th>Time</th><th>Artist</th><th>Title</th><th>Album</th><th>Duration</th><th>Listened</th><th>Completion</th><th>Result</th><th>Device</th></tr>';
    for (var i = 0; i < hist.length; i++) {
      var entry = hist[i];
      var comp = entry.completion != null ? (entry.completion * 100).toFixed(0) + '%' : '\u2014';
      var compColor = entry.completion != null && entry.completion < 0.5 ? 'color:var(--red)' : '';
      var listened = entry.dwell_ms != null ? fmtDuration(Math.round(entry.dwell_ms / 1000)) : '\u2014';
      var dur = entry.duration != null ? fmtDuration(Math.round(entry.duration)) : '\u2014';
      var result = entry.reason_end || '\u2014';
      var resultColor = result === 'user_skip' ? 'color:var(--red)' : '';
      h += '<tr>'
        + '<td style="white-space:nowrap">' + fmtTime(entry.timestamp) + '</td>'
        + '<td>' + esc(entry.artist || '\u2014') + '</td>'
        + '<td>' + esc(entry.title || '\u2014') + '</td>'
        + '<td>' + esc(entry.album || '\u2014') + '</td>'
        + '<td>' + dur + '</td>'
        + '<td>' + listened + '</td>'
        + '<td style="' + compColor + '">' + comp + '</td>'
        + '<td style="' + resultColor + '">' + esc(result) + '</td>'
        + '<td>' + esc(entry.device_type || '\u2014') + '</td>'
        + '</tr>';
    }
    h += '</table>';
    // Pagination
    var hs = userDetailState;
    var showing = hs.historyOffset + 1;
    var showEnd = Math.min(hs.historyOffset + hist.length, history.total);
    h += '<div class="pagination">'
      + '<span>Showing ' + showing + '\u2013' + showEnd + ' of ' + history.total + '</span>'
      + '<div><button class="secondary" onclick="historyPage(-1)"' + (hs.historyOffset === 0 ? ' disabled' : '') + '>\u2190 Prev</button> '
      + '<button class="secondary" onclick="historyPage(1)"' + (hs.historyOffset + hs.historyLimit >= history.total ? ' disabled' : '') + '>Next \u2192</button></div>'
      + '</div>';
    h += '</div></div>';
  }

  // Sessions
  h += '<div class="panel full-width"><div class="panel-header">Recent Sessions (' + sessions.total + ' total)</div>';
  h += '<div class="panel-body" style="overflow-x:auto"><table>'
    + '<tr><th>Started</th><th>Duration</th><th>Tracks</th><th>Plays</th><th>Skips</th><th>Skip Rate</th><th>Completion</th><th>Context</th><th>Device</th></tr>';
  var sess = sessions.sessions || [];
  for (var i = 0; i < sess.length; i++) {
    var s = sess[i];
    var skipColor = (s.skip_rate != null && s.skip_rate > 0.5) ? 'color:var(--red)' : '';
    h += '<tr>'
      + '<td style="white-space:nowrap">' + fmtTime(s.started_at) + '</td>'
      + '<td>' + fmtDuration(s.duration_s) + '</td>'
      + '<td>' + s.track_count + '</td>'
      + '<td>' + s.play_count + '</td>'
      + '<td>' + s.skip_count + '</td>'
      + '<td style="' + skipColor + '">' + (s.skip_rate != null ? (s.skip_rate * 100).toFixed(0) + '%' : '\u2014') + '</td>'
      + '<td>' + (s.avg_completion != null ? (s.avg_completion * 100).toFixed(0) + '%' : '\u2014') + '</td>'
      + '<td>' + esc(s.dominant_context_type || '\u2014') + '</td>'
      + '<td>' + esc(s.dominant_device_type || '\u2014') + '</td>'
      + '</tr>';
  }
  h += '</table></div></div>';

  $('#app').innerHTML = h;
}

// ---------------------------------------------------------------------------
// Tracks view
// ---------------------------------------------------------------------------

function loadTracks() {
  var s = trackState;
  var url = '/v1/tracks?limit=' + s.limit + '&offset=' + s.offset + '&sort_by=' + s.sort + '&sort_dir=' + s.dir;
  if (s.search) url += '&search=' + encodeURIComponent(s.search);
  return api(url).then(function(data) { trackState.total = data.total; renderTracks(data); });
}

function searchTracks() {
  var input = document.getElementById('track-search');
  trackState.search = input ? input.value.trim() : '';
  trackState.offset = 0;
  loadTracks();
}

function clearTrackSearch() {
  trackState.search = '';
  var input = document.getElementById('track-search');
  if (input) input.value = '';
  trackState.offset = 0;
  loadTracks();
}

function sortTracks(field) {
  if (trackState.sort === field) trackState.dir = trackState.dir === 'asc' ? 'desc' : 'asc';
  else { trackState.sort = field; trackState.dir = 'asc'; }
  trackState.offset = 0;
  loadTracks();
}

function trackPage(delta) {
  trackState.offset = Math.max(0, trackState.offset + delta * trackState.limit);
  loadTracks();
}

function renderTracks(data) {
  var tracks = data.tracks;
  var s = trackState;
  var arrow = function(f) { return s.sort === f ? (s.dir === 'asc' ? ' \u25B2' : ' \u25BC') : ''; };

  var h = '<div class="panel full-width"><div class="panel-header">'
    + '<span>Tracks (' + s.total + ')</span>'
    + '<div style="display:flex;gap:8px;align-items:center">'
    + '<div style="position:relative"><input id="track-search" type="text" placeholder="Search title, artist, ID\u2026" value="' + esc(s.search) + '" '
    + 'onkeydown="if(event.key===\'Enter\')searchTracks()" '
    + 'style="padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;width:220px">'
    + (s.search ? '<span onclick="clearTrackSearch()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-dim);font-size:16px">\u00D7</span>' : '')
    + '</div>'
    + '<button class="secondary" onclick="searchTracks()">Search</button>'
    + '<button onclick="showGenerateModal()">Generate Playlist</button>'
    + '</div></div>';

  h += '<div class="panel-body" style="overflow-x:auto"><table>'
    + '<tr>'
    + '<th onclick="sortTracks(\'bpm\')">BPM' + arrow('bpm') + '</th>'
    + '<th>Title</th>'
    + '<th>Artist</th>'
    + '<th>Genre</th>'
    + '<th>Key</th>'
    + '<th onclick="sortTracks(\'energy\')">Energy' + arrow('energy') + '</th>'
    + '<th onclick="sortTracks(\'danceability\')">Dance' + arrow('danceability') + '</th>'
    + '<th onclick="sortTracks(\'valence\')">Valence' + arrow('valence') + '</th>'
    + '<th>Mood</th>'
    + '<th onclick="sortTracks(\'duration\')">Duration' + arrow('duration') + '</th>'
    + '<th onclick="sortTracks(\'analysis_version\')">Version' + arrow('analysis_version') + '</th>'
    + '<th>Track ID</th>'
    + '</tr>';

  for (var i = 0; i < tracks.length; i++) {
    var t = tracks[i];
    var energyBar = t.energy != null ? '<div style="display:inline-block;width:50px;height:8px;background:var(--bg);border-radius:4px;vertical-align:middle;margin-left:4px"><div style="width:' + (t.energy*100) + '%;height:100%;background:var(--green);border-radius:4px"></div></div>' : '';
    h += '<tr>'
      + '<td>' + (t.bpm ? t.bpm.toFixed(1) : '\u2014') + '</td>'
      + '<td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + trackTooltip(t) + '">' + (esc(t.title || '') || basename(t.file_path)) + '</td>'
      + '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(t.artist || '\u2014') + '</td>'
      + '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(t.genre || '\u2014') + '</td>'
      + '<td>' + esc(t.key || '\u2014') + ' ' + (t.mode ? t.mode.charAt(0) : '') + '</td>'
      + '<td>' + (t.energy != null ? t.energy.toFixed(2) : '\u2014') + energyBar + '</td>'
      + '<td>' + (t.danceability != null ? t.danceability.toFixed(2) : '\u2014') + '</td>'
      + '<td>' + (t.valence != null ? t.valence.toFixed(2) : '\u2014') + '</td>'
      + '<td>' + topMood(t.mood_tags) + '</td>'
      + '<td>' + fmtTrackDur(t.duration) + '</td>'
      + '<td style="font-family:monospace;font-size:11px;color:var(--text-dim)">' + esc(t.analysis_version || '\u2014') + '</td>'
      + '<td style="font-family:monospace;font-size:11px">' + esc(t.track_id) + '</td>'
      + '</tr>';
  }
  h += '</table></div>';

  var from = s.offset + 1;
  var to = Math.min(s.offset + tracks.length, s.total);
  h += '<div class="pagination">'
    + '<span>Showing ' + from + '\u2013' + to + ' of ' + s.total + '</span>'
    + '<div><button class="secondary" onclick="trackPage(-1)"' + (s.offset === 0 ? ' disabled' : '') + '>\u2190 Prev</button> '
    + '<button class="secondary" onclick="trackPage(1)"' + (s.offset + s.limit >= s.total ? ' disabled' : '') + '>Next \u2192</button></div>'
    + '</div></div>';

  $('#app').innerHTML = h;
}

// ---------------------------------------------------------------------------
// Playlists view
// ---------------------------------------------------------------------------

function loadPlaylists() {
  return api('/v1/playlists?limit=50').then(function(data) { renderPlaylistList(data); });
}

function renderPlaylistList(playlists) {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<h2 style="font-size:18px">Playlists (' + playlists.length + ')</h2>'
    + '<button onclick="showGenerateModal()">Generate Playlist</button></div>';

  if (!playlists.length) {
    h += '<div class="empty">No playlists yet. Generate one from the button above or from the Tracks tab.</div>';
    $('#app').innerHTML = h;
    return;
  }

  h += '<div class="playlist-grid">';
  for (var i = 0; i < playlists.length; i++) {
    var p = playlists[i];
    h += '<div class="playlist-card" onclick="viewPlaylist(' + p.id + ')">'
      + '<h3>' + esc(p.name) + '</h3>'
      + '<div class="meta">' + strategyBadge(p.strategy)
      + '<span>' + p.track_count + ' tracks</span>'
      + '<span>' + fmtDuration(p.total_duration) + '</span>'
      + '<span>' + timeAgo(p.created_at) + '</span></div></div>';
  }
  h += '</div>';
  $('#app').innerHTML = h;
}

function viewPlaylist(id) {
  api('/v1/playlists/' + id).then(function(p) { renderPlaylistDetail(p); });
}

function renderPlaylistDetail(p) {
  var h = '<div style="margin-bottom:16px">'
    + '<button class="secondary" onclick="loadPlaylists()" style="margin-right:8px">\u2190 Back</button>'

    + '<span style="font-weight:400;color:var(--text-dim);font-size:12px">' + p.track_count + ' tracks \u00B7 ' + fmtDuration(p.total_duration) + '</span></div>';

    + '<tr><th>#</th><th>Track</th><th>Artist</th><th>BPM</th><th>Key</th><th>Energy</th><th>Mood</th><th>Duration</th></tr>';

  for (var i = 0; i < p.tracks.length; i++) {

      + '<td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + trackTooltip(t) + '">' + (esc(t.title || '') || basename(t.file_path)) + '</td>'

      + '<td>' + (t.bpm ? t.bpm.toFixed(1) : '\u2014') + '</td>'
      + '<td>' + esc(t.key || '\u2014') + ' ' + (t.mode ? t.mode.charAt(0) : '') + '</td>'
      + '<td>' + (t.energy != null ? t.energy.toFixed(2) : '\u2014') + '</td>'
      + '<td>' + topMood(t.mood_tags) + '</td>'
      + '<td>' + fmtTrackDur(t.duration) + '</td></tr>';
  }
  h += '</table></div></div>';
  $('#app').innerHTML = h;
