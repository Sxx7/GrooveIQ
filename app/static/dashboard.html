var pipelineSSE = null;
var pipelineData = { current: null, history: [], models: null };
var pipelineSelectedStep = null;
var pipelineSelectedRun = null;

var STEP_META = {
  sessionizer:        { icon: '\u23F1', label: 'Sessionizer',  desc: 'Groups raw events into listening sessions' },
  track_scoring:      { icon: '\u2B50', label: 'Scoring',      desc: 'Computes per-track satisfaction scores' },
  taste_profiles:     { icon: '\uD83C\uDFAF', label: 'Taste Profiles', desc: 'Builds user audio preference profiles' },
  collab_filter:      { icon: '\uD83E\uDD1D', label: 'Collab Filter', desc: 'User-user & item-item similarity' },
  ranker:             { icon: '\uD83C\uDFC6', label: 'Ranker',        desc: 'Trains LightGBM ranking model' },
  session_embeddings: { icon: '\uD83E\uDDE0', label: 'Embeddings',    desc: 'Word2Vec skip-gram on sessions' },
  lastfm_cache:       { icon: '\uD83C\uDF10', label: 'Last.fm',       desc: 'External CF via Last.fm similar tracks' },
  sasrec:             { icon: '\u26A1',  label: 'SASRec',       desc: 'Transformer sequential model' },
  session_gru:        { icon: '\uD83D\uDCC8', label: 'Session GRU',   desc: 'Taste drift via GRU over sessions' }
};

var STEP_ORDER = ['sessionizer','track_scoring','taste_profiles','collab_filter','ranker','session_embeddings','lastfm_cache','sasrec','session_gru'];

function loadPipeline() {
  $('#app').innerHTML = '<div class="empty">Loading pipeline status...</div>';
  Promise.all([
    api('/v1/pipeline/status?limit=10'),
    api('/v1/pipeline/models').catch(function() { return null; })
  ]).then(function(results) {
    pipelineData.current = results[0].current;
    pipelineData.history = results[0].history || [];
    pipelineData.models = results[1];
    pipelineSelectedRun = pipelineData.current || (pipelineData.history.length ? pipelineData.history[0] : null);
    pipelineSelectedStep = null;
    renderPipeline();
    // Auto-connect SSE if a run is active
    if (pipelineData.current) pipelineConnectSSE();
  }).catch(function(e) {
    $('#app').innerHTML = '<div class="empty" style="color:var(--red)">Error: ' + esc(e.message) + '</div>';
  });
}

function pipelineRefreshStatus() {
  api('/v1/pipeline/status?limit=10').then(function(data) {
    pipelineData.current = data.current;
    pipelineData.history = data.history || [];
    if (pipelineData.current) {
      pipelineSelectedRun = pipelineData.current;
    } else if (!pipelineSelectedRun && pipelineData.history.length) {
      pipelineSelectedRun = pipelineData.history[0];
    }
    // Update the selected run from history if it was refreshed
    if (pipelineSelectedRun && pipelineSelectedRun.run_id) {
      for (var i = 0; i < pipelineData.history.length; i++) {
        if (pipelineData.history[i].run_id === pipelineSelectedRun.run_id) {
          pipelineSelectedRun = pipelineData.history[i];
          break;
        }
      }
    }
    if (currentView === 'pipeline') renderPipeline();
  });
}

function pipelineConnectSSE() {
  if (pipelineSSE) { pipelineSSE.close(); pipelineSSE = null; }
  var url = BASE + '/v1/pipeline/stream';
  // EventSource doesn't support custom headers, so pass key as query param
  // We'll need to handle this server-side or use fetch-based SSE
  pipelineSSE = new EventSource(url);

  // Actually, EventSource can't set auth headers. Use fetch-based SSE instead.
  pipelineSSE.close();
  pipelineSSE = null;
  pipelineSSEFetch();
}

function pipelineSSEFetch() {
  if (pipelineSSE) return; // Already connected
  var abortCtrl = new AbortController();
  pipelineSSE = abortCtrl; // Store so we can abort later

  fetch(BASE + '/v1/pipeline/stream', {
    headers: { 'Authorization': 'Bearer ' + KEY },
    signal: abortCtrl.signal
  }).then(function(response) {
    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function read() {
      reader.read().then(function(result) {
        if (result.done) { pipelineSSE = null; pipelineUpdateIndicator(false); return; }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop(); // Keep incomplete line in buffer
        var eventType = 'message';
        var dataLines = [];
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.indexOf('event: ') === 0) {
            eventType = line.slice(7).trim();
          } else if (line.indexOf('data: ') === 0) {
            dataLines.push(line.slice(6));
          } else if (line === '' && dataLines.length > 0) {
            // End of event
            try {
              var data = JSON.parse(dataLines.join('\n'));
              pipelineHandleSSE(eventType, data);
            } catch(e) {}
            eventType = 'message';
            dataLines = [];
          }
        }
        pipelineUpdateIndicator(true);
        read();
      }).catch(function() { pipelineSSE = null; pipelineUpdateIndicator(false); });
    }
    read();
  }).catch(function() { pipelineSSE = null; pipelineUpdateIndicator(false); });
}

function pipelineDisconnectSSE() {
  if (pipelineSSE && pipelineSSE.abort) { pipelineSSE.abort(); }
  pipelineSSE = null;
  pipelineUpdateIndicator(false);
}

function pipelineUpdateIndicator(connected) {
  var el = document.getElementById('sse-indicator');
  if (!el) return;
  if (connected) {
    el.className = 'sse-indicator';
    el.innerHTML = '<span class="sse-dot"></span> Live';
  } else {
    el.className = 'sse-indicator disconnected';
    el.innerHTML = '<span class="sse-dot" style="animation:none"></span> Disconnected';
  }
}

function pipelineHandleSSE(eventType, data) {
  if (eventType === 'pipeline_start') {
    pipelineRefreshStatus();
  } else if (eventType === 'step_start' || eventType === 'step_complete' || eventType === 'step_failed') {
    // Update the current run in-place for snappy UI
    if (pipelineSelectedRun && pipelineSelectedRun.run_id === data.run_id) {
      var steps = pipelineSelectedRun.steps || [];
      for (var i = 0; i < steps.length; i++) {
        if (steps[i].name === data.step) {
          if (eventType === 'step_start') {
            steps[i].status = 'running';
            steps[i].started_at = data.timestamp;
          } else if (eventType === 'step_complete') {
            steps[i].status = 'completed';
            steps[i].duration_ms = data.duration_ms;
            steps[i].metrics = data.metrics || {};
            steps[i].ended_at = data.timestamp;
          } else if (eventType === 'step_failed') {
            steps[i].status = 'failed';
            steps[i].duration_ms = data.duration_ms;
            steps[i].error = data.error;
            steps[i].ended_at = data.timestamp;
          }
          break;
        }
      }
      if (currentView === 'pipeline') renderPipeline();
    }
  } else if (eventType === 'pipeline_end') {
    pipelineRefreshStatus();
    // Refresh models after pipeline completes
    api('/v1/pipeline/models').then(function(m) {
      pipelineData.models = m;
      if (currentView === 'pipeline') renderPipeline();
    }).catch(function(){});
  }
}

function renderPipeline() {
  var run = pipelineSelectedRun;
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">';
  h += '<h2 style="font-size:18px">Pipeline</h2>';
  h += '<div style="display:flex;gap:8px;align-items:center">';
  h += '<span id="sse-indicator" class="sse-indicator disconnected"><span class="sse-dot" style="animation:none"></span> Disconnected</span>';
  if (!pipelineSSE) {
    h += '<button class="secondary" onclick="pipelineConnectSSE()">Connect Live</button>';
  } else {
    h += '<button class="secondary" onclick="pipelineDisconnectSSE()">Disconnect</button>';
  }
  h += '<button onclick="runPipelineFromTab()">Run Pipeline</button>';
  h += '<button class="danger" onclick="resetPipelineFromTab()">Reset Pipeline</button>';
  h += '</div></div>';

  // ── Flow diagram ──────────────────────────────────────────────
  h += '<div class="panel full-width"><div class="panel-header">';
  if (run) {
    var triggerBadge = run.trigger === 'manual' ? 'badge-purple' : run.trigger === 'startup' ? 'badge-blue' : 'badge-yellow';
    var statusBadge = run.status === 'completed' ? 'badge-green' : run.status === 'failed' ? 'badge-red' : 'badge-yellow';
    h += 'Pipeline Run <span class="badge ' + triggerBadge + '">' + esc(run.trigger) + '</span> ';
    h += '<span class="badge ' + statusBadge + '">' + esc(run.status).toUpperCase() + '</span>';
    if (run.config_version != null) {
      h += ' <span class="badge badge-blue" title="Algorithm config version">cfg v' + run.config_version + '</span>';
    }
    h += '<span style="font-weight:400;font-size:12px;color:var(--text-dim);margin-left:12px">';
    h += esc(run.run_id);
    if (run.duration_ms != null) h += ' \u00B7 ' + fmtMs(run.duration_ms);
    if (run.started_at) h += ' \u00B7 ' + fmtTime(run.started_at);
    h += '</span>';
  } else {
    h += 'Pipeline <span style="font-weight:400;font-size:12px;color:var(--text-dim)">No runs yet</span>';
  }
  h += '</div><div class="panel-body">';

  // Render flow nodes
  h += '<div class="pipeline-flow">';
  for (var i = 0; i < STEP_ORDER.length; i++) {
    var name = STEP_ORDER[i];
    var meta = STEP_META[name];
    var step = null;
    if (run && run.steps) {
      for (var j = 0; j < run.steps.length; j++) {
        if (run.steps[j].name === name) { step = run.steps[j]; break; }
      }
    }
    var status = step ? step.status : 'pending';
    var selected = pipelineSelectedStep === name ? ' style="border-color:var(--accent);background:rgba(124,92,252,0.08)"' : '';

    if (i > 0) {
      var arrowCls = 'pipe-arrow';
      // Arrow reflects status of the step it leads to
      if (status === 'completed') arrowCls += ' done';
      else if (status === 'running') arrowCls += ' active';
      h += '<div class="' + arrowCls + '">\u2192</div>';
    }

    h += '<div class="pipe-node ' + status + '" onclick="pipelineSelectStep(\'' + name + '\')">';
    h += '<div class="pipe-box"' + selected + '>';
    h += '<div class="pipe-icon">' + meta.icon + '</div>';
    h += '<div class="pipe-label">' + esc(meta.label) + '</div>';
    if (step && step.duration_ms != null) {
      h += '<div class="pipe-time">' + fmtMs(step.duration_ms) + '</div>';
    }
    // Show one key metric if available
    if (step && step.metrics) {
      var mKey = firstMetricKey(step.metrics);
      if (mKey) {
        h += '<div class="pipe-metric">' + fmtMetricVal(step.metrics[mKey]) + ' ' + fmtMetricLabel(mKey) + '</div>';
      }
    }
    h += '</div>';
    h += '<div class="pipe-dot"></div>';
    h += '</div>';
  }
  h += '</div></div></div>';

  // ── Step detail panel ─────────────────────────────────────────
  if (pipelineSelectedStep && run) {
    var step = null;
    if (run.steps) {
      for (var j = 0; j < run.steps.length; j++) {
        if (run.steps[j].name === pipelineSelectedStep) { step = run.steps[j]; break; }
      }
    }
    if (step) {
      var meta = STEP_META[pipelineSelectedStep];
      h += '<div class="pipe-detail">';
      h += '<h3>' + meta.icon + ' ' + esc(meta.label) + ' <span style="font-weight:400;color:var(--text-dim);font-size:12px">' + esc(meta.desc) + '</span></h3>';
      h += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">';
      h += 'Status: <span class="badge badge-' + stepStatusColor(step.status) + '">' + esc(step.status).toUpperCase() + '</span>';
      if (step.duration_ms != null) h += ' \u00B7 Duration: <b>' + fmtMs(step.duration_ms) + '</b>';
      if (step.started_at) h += ' \u00B7 Started: ' + fmtTime(step.started_at);
      h += '</div>';

      // Metrics
      if (step.metrics && Object.keys(step.metrics).length > 0) {
        h += '<div class="metric-grid">';
        var mkeys = Object.keys(step.metrics);
        for (var m = 0; m < mkeys.length; m++) {
          var mk = mkeys[m];
          h += '<div class="metric-item"><div class="mk">' + fmtMetricLabel(mk) + '</div><div class="mv">' + fmtMetricVal(step.metrics[mk]) + '</div></div>';
        }
        h += '</div>';
      }

      // Error traceback
      if (step.error) {
        h += '<div style="margin-top:12px"><div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px">Error</div>';
        h += '<pre>' + esc(step.error) + '</pre></div>';
      }
      h += '</div>';
    }
  }

  // ── Model readiness ───────────────────────────────────────────
  if (pipelineData.models) {
    h += '<div class="panel full-width" style="margin-top:16px"><div class="panel-header">Model Readiness</div><div class="panel-body" style="padding:16px">';
    h += '<div class="model-grid">';
    h += renderModelCard('Ranker (LightGBM)', pipelineData.models.ranker);
    h += renderModelCard('Collaborative Filter', pipelineData.models.collab_filter);
    h += renderModelCard('Session Embeddings', pipelineData.models.session_embeddings);
    h += renderModelCard('SASRec', pipelineData.models.sasrec);
    h += renderModelCard('Session GRU', pipelineData.models.session_gru);
    h += renderModelCard('Last.fm Cache', pipelineData.models.lastfm_cache);
    h += '</div></div></div>';
  }

  // ── Error log ─────────────────────────────────────────────────
  var errors = collectErrors();
  if (errors.length > 0) {
    h += '<div class="panel full-width" style="margin-top:16px"><div class="panel-header">';
    h += 'Recent Errors <span class="badge badge-red">' + errors.length + '</span>';
    h += '</div><div class="panel-body"><div class="error-log">';
    for (var e = 0; e < errors.length; e++) {
      var err = errors[e];
      h += '<div class="error-entry" onclick="this.classList.toggle(\'expanded\')">';
      h += '<span class="error-step">' + esc(STEP_META[err.step] ? STEP_META[err.step].label : err.step) + '</span>';
      h += '<span class="error-time">' + fmtTime(err.timestamp) + ' \u00B7 run ' + esc(err.run_id) + '</span>';
      h += '<pre>' + esc(err.error) + '</pre>';
      h += '</div>';
    }
    h += '</div></div></div>';
  }

  // ── Run history ───────────────────────────────────────────────
  if (pipelineData.history.length > 0) {
    h += '<div class="panel full-width" style="margin-top:16px"><div class="panel-header">Run History</div><div class="panel-body">';
    for (var r = 0; r < pipelineData.history.length; r++) {
      var rn = pipelineData.history[r];
      var isSelected = pipelineSelectedRun && pipelineSelectedRun.run_id === rn.run_id;
      h += '<div class="run-row' + (isSelected ? '" style="background:rgba(124,92,252,0.06)' : '') + '" onclick="pipelineSelectRun(\'' + esc(rn.run_id) + '\')">';
      h += '<span class="run-id">' + esc(rn.run_id) + '</span>';
      h += '<span class="badge badge-' + (rn.status === 'completed' ? 'green' : rn.status === 'failed' ? 'red' : 'yellow') + '">' + esc(rn.status) + '</span>';
      h += '<span style="font-size:11px;color:var(--text-dim)">' + esc(rn.trigger) + '</span>';
      if (rn.config_version != null) {
        h += '<span class="badge badge-blue" style="font-size:10px" title="Algorithm config version">cfg v' + rn.config_version + '</span>';
      }
      h += '<span class="run-steps">';
      if (rn.steps) {
        for (var s = 0; s < rn.steps.length; s++) {
          h += '<span class="run-step-dot ' + esc(rn.steps[s].status) + '" title="' + esc(rn.steps[s].name) + ': ' + esc(rn.steps[s].status) + '"></span>';
        }
      }
      h += '</span>';
      h += '<span style="font-size:11px;color:var(--text-dim);min-width:70px;text-align:right">' + (rn.duration_ms != null ? fmtMs(rn.duration_ms) : '\u2014') + '</span>';
      h += '<span style="font-size:11px;color:var(--text-dim);min-width:80px;text-align:right">' + timeAgo(rn.started_at) + '</span>';
      h += '</div>';
    }
    h += '</div></div>';
  }

  $('#app').innerHTML = h;

  // Update SSE indicator state
  pipelineUpdateIndicator(!!pipelineSSE);
}

function renderModelCard(name, model) {
  if (!model) return '<div class="model-card not-ready"><div class="model-name">' + esc(name) + '</div><div class="model-status" style="color:var(--text-dim)">No data</div></div>';
  var ready = model.trained || model.built || false;
  var h = '<div class="model-card ' + (ready ? 'ready' : 'not-ready') + '">';
  h += '<div class="model-name">' + esc(name) + '</div>';
  h += '<div class="model-status" style="color:' + (ready ? 'var(--green)' : 'var(--text-dim)') + '">';
  h += ready ? '\u2713 Ready' : '\u2717 Not trained';
  h += '</div>';
  // Show relevant details
  var details = [];
  if (model.training_samples) details.push(model.training_samples + ' samples');
  if (model.n_features) details.push(model.n_features + ' features');
  if (model.engine) details.push(model.engine);
  if (model.vocab_size) details.push(model.vocab_size + ' vocab');
  if (model.users) details.push(model.users + ' users');
  if (model.tracks) details.push(model.tracks + ' tracks');
  if (model.seeds_cached) details.push(model.seeds_cached + ' seeds');
  if (model.cache_age_seconds != null && model.cache_age_seconds > 0) details.push(fmtDuration(model.cache_age_seconds) + ' ago');
  if (model.model_version) details.push(model.model_version);
  if (model.trained_at) details.push(timeAgo(model.trained_at));
  if (details.length) h += '<div class="model-detail">' + esc(details.join(' \u00B7 ')) + '</div>';
  h += '</div>';
  return h;
}

function collectErrors() {
  var errors = [];
  var runs = pipelineData.history || [];
  for (var r = 0; r < runs.length; r++) {
    var rn = runs[r];
    if (!rn.steps) continue;
    for (var s = 0; s < rn.steps.length; s++) {
      if (rn.steps[s].error) {
        errors.push({
          run_id: rn.run_id,
          step: rn.steps[s].name,
          error: rn.steps[s].error,
          timestamp: rn.steps[s].ended_at,
          duration_ms: rn.steps[s].duration_ms
        });
      }
    }
  }
  // Sort newest first
  errors.sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
  return errors.slice(0, 20);
}

function fmtMs(ms) {
  if (ms == null) return '\u2014';
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  return Math.floor(ms / 60000) + 'm ' + Math.round((ms % 60000) / 1000) + 's';
}

function firstMetricKey(metrics) {
  if (!metrics) return null;
  var keys = Object.keys(metrics);
  // Prefer interesting keys
  var preferred = ['sessions_created','interactions_created','users_updated','training_samples','vocab_size','seeds_cached','trained'];
  for (var i = 0; i < preferred.length; i++) { if (metrics[preferred[i]] != null) return preferred[i]; }
  return keys.length ? keys[0] : null;
}

function fmtMetricLabel(key) {
  return key.replace(/_/g, ' ');
}

function fmtMetricVal(val) {
  if (val === true) return '\u2713';
  if (val === false) return '\u2717';
  if (typeof val === 'number') {
    if (Number.isInteger(val)) return val.toLocaleString();
    return val.toFixed(2);
  }
  return esc(String(val));
}

function stepStatusColor(status) {
  if (status === 'completed') return 'green';
  if (status === 'failed') return 'red';
  if (status === 'running') return 'yellow';
  if (status === 'skipped') return 'blue';
  return 'purple';
}

var chartsCurrentScope = 'global';
var chartsCurrentType = 'top_tracks';

function loadCharts() {
  return Promise.all([
    api('/v1/charts'),
    api('/v1/charts/stats').catch(function() { return null; }),
    api('/v1/charts/' + chartsCurrentType + '?scope=' + encodeURIComponent(chartsCurrentScope) + '&limit=100').catch(function() { return null; })
  ]).then(function(results) {
    renderCharts(results[0], results[1], results[2]);
  });
}

function chartsLidarrBadge(status) {
  if (!status) return '';
  if (status === 'downloading') return '<span class="badge badge-blue" title="Lidarr">&#x2B07; lidarr</span>';
  if (status === 'in_lidarr') return '<span class="badge badge-green" title="Lidarr">&#x2B07; lidarr</span>';
  if (status === 'pending') return '<span class="badge badge-yellow" title="Lidarr">&#x23F3; lidarr</span>';
  if (status === 'failed') return '<span class="badge badge-red" title="Lidarr">&#x2717; lidarr</span>';
  return '<span class="badge">' + esc(status) + '</span>';
}

function chartsThumbnail(entry) {
  // Priority: media server cover (matched tracks) > cached fallback URL (Spotizerr/Last.fm).
  var src = (entry.library && entry.library.cover_url) || entry.image_url || '';
  if (!src) {
    return '<div style="width:40px;height:40px;border-radius:4px;background:rgba(255,255,255,0.04);'
      + 'display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:16px">&#x266B;</div>';
  }
  return '<img src="' + esc(src) + '" alt="" loading="lazy" '
    + 'style="width:40px;height:40px;border-radius:4px;object-fit:cover;display:block" '
    + 'onerror="this.style.display=\'none\'">';
}

function chartsDownloadBtn(entry) {
  // Only show download button for unmatched tracks (not artist charts).
  if (entry.in_library || !entry.track_title) return '';
  return ' <button onclick="chartsDownloadTrack(this,' + entry.position + ')" '
    + 'title="Download via Spotizerr" style="font-size:10px;padding:2px 8px;border-radius:4px;'
    + 'background:rgba(96,165,250,0.15);color:var(--blue);border:none;cursor:pointer;font-weight:600"'
    + '>&#x2B07; get</button>';
}

function chartsLibraryBadge(entry) {
  if (entry.in_library) {
    // Show source hint if we know how it got there.
    if (entry.lidarr_status === 'in_lidarr' || entry.lidarr_status === 'downloading') {
      return '<span class="badge badge-green">in library</span>'
        + ' <span class="badge badge-purple" style="font-size:9px;opacity:0.7">via lidarr</span>';
    }
    return '<span class="badge badge-green">in library</span>';
  }
  var badges = chartsLidarrBadge(entry.lidarr_status);
  badges += chartsDownloadBtn(entry);
  return badges || '<span class="badge" style="opacity:0.4">not in library</span>';
}

function chartsDownloadTrack(btn, position) {
  btn.disabled = true;
  btn.textContent = '...';
  apiPost('/v1/charts/download', {
    chart_type: chartsCurrentType,
    scope: chartsCurrentScope,
    position: position
  }).then(function(data) {
    if (data.status === 'downloading' || data.status === 'duplicate') {
      btn.outerHTML = '<span class="badge badge-blue" title="Spotizerr">&#x2B07; spotizerr</span>';
    } else {
      btn.textContent = data.status || 'sent';
      btn.disabled = false;
    }
  }).catch(function(e) {
    btn.outerHTML = '<span class="badge badge-red" title="' + esc(e.message || 'failed') + '">&#x2717; failed</span>';
  });
}

function renderCharts(available, stats, chartData) {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<h2 style="font-size:18px">Charts</h2>'
    + '<button onclick="buildCharts(this)">Build Charts</button>'
    + '</div>';

  // Stats cards
  if (stats) {
    h += '<div class="stats-grid">'
      + '<div class="stat-card"><div class="label">Charts</div><div class="value">' + (stats.chart_count || 0) + '</div></div>'
      + '<div class="stat-card"><div class="label">Total Entries</div><div class="value">' + (stats.total_entries || 0) + '</div></div>'
      + '<div class="stat-card"><div class="label">Library Matches</div><div class="value" style="color:var(--green)">' + (stats.library_matches || 0) + '</div></div>'
      + '<div class="stat-card"><div class="label">Match Rate</div><div class="value">' + ((stats.match_rate || 0) * 100).toFixed(1) + '%</div>'
      + (stats.last_fetched_at ? '<div class="sub">Updated ' + timeAgo(stats.last_fetched_at) + '</div>' : '') + '</div>'
      + '</div>';
  }

  // Scope selector
  var charts = (available && available.charts) || [];
  if (!charts.length) {
    h += '<div class="empty">No charts built yet. Click "Build Charts" to fetch from Last.fm.<br><br>'
      + 'Configure <code>CHARTS_ENABLED=true</code> and <code>CHARTS_TAGS</code> / <code>CHARTS_COUNTRIES</code> in your .env file.</div>';
    $('#app').innerHTML = h;
    return;
  }

  // Build scope options grouped
  var scopes = [];
  var seenScopes = {};
  for (var i = 0; i < charts.length; i++) {
    if (!seenScopes[charts[i].scope]) {
      seenScopes[charts[i].scope] = true;
      scopes.push(charts[i].scope);
    }
  }

  // Check which chart_types exist for current scope
  var typesForScope = {};
  for (var i = 0; i < charts.length; i++) {
    if (charts[i].scope === chartsCurrentScope) typesForScope[charts[i].chart_type] = true;
  }

  h += '<div class="filter-bar">';
  h += '<label>Scope</label><select class="inline-select" onchange="chartsCurrentScope=this.value;loadCharts()">';
  for (var i = 0; i < scopes.length; i++) {
    var label = scopes[i];
    if (label === 'global') label = 'Global';
    else if (label.indexOf('tag:') === 0) label = 'Genre: ' + label.substring(4);
    else if (label.indexOf('geo:') === 0) label = 'Country: ' + label.substring(4);
    h += '<option value="' + esc(scopes[i]) + '"' + (scopes[i] === chartsCurrentScope ? ' selected' : '') + '>' + esc(label) + '</option>';
  }
  h += '</select>';

  h += '<label>Type</label><select class="inline-select" onchange="chartsCurrentType=this.value;loadCharts()">';
  h += '<option value="top_tracks"' + (chartsCurrentType === 'top_tracks' ? ' selected' : '') + '>Top Tracks</option>';
  h += '<option value="top_artists"' + (chartsCurrentType === 'top_artists' ? ' selected' : '') + '>Top Artists</option>';
  h += '</select>';
  h += '</div>';

  // Chart table
  if (!chartData || !chartData.entries || !chartData.entries.length) {
    h += '<div class="empty">No data for this chart type / scope combination.</div>';
    $('#app').innerHTML = h;
    return;
  }

  var isTrack = chartsCurrentType === 'top_tracks';
  h += '<div class="panel full-width"><div class="panel-header">'
    + esc(chartsCurrentScope === 'global' ? 'Global' : chartsCurrentScope) + ' — '
    + (isTrack ? 'Top Tracks' : 'Top Artists')
    + ' <span style="font-weight:400;color:var(--text-dim);font-size:12px">' + chartData.total + ' entries'
    + (chartData.fetched_at ? ', updated ' + timeAgo(chartData.fetched_at) : '') + '</span>'
    + '</div>';

  h += '<div class="panel-body" style="overflow-x:auto"><table>';
  if (isTrack) {
    h += '<tr><th style="width:40px">#</th><th style="width:52px"></th><th>Title</th><th>Artist</th><th>Plays</th><th>Listeners</th><th>Status</th></tr>';
  } else {
    h += '<tr><th style="width:40px">#</th><th style="width:52px"></th><th>Artist</th><th>Plays</th><th>Listeners</th><th>Library Tracks</th><th>Status</th></tr>';
  }

  for (var i = 0; i < chartData.entries.length; i++) {
    var e = chartData.entries[i];
    h += '<tr>';
    h += '<td style="color:var(--text-dim);font-weight:600">' + (e.position + 1) + '</td>';
    h += '<td>' + chartsThumbnail(e) + '</td>';

    if (isTrack) {
      h += '<td><b>' + esc(e.track_title || '') + '</b></td>';
      h += '<td>' + esc(e.artist_name || '') + '</td>';
    } else {
      h += '<td><b>' + esc(e.artist_name || '') + '</b></td>';
    }

    h += '<td>' + fmtNumber(e.playcount) + '</td>';
    h += '<td>' + fmtNumber(e.listeners) + '</td>';

    if (!isTrack) {
      h += '<td>' + (e.library_track_count || 0) + '</td>';
    }

    h += '<td>' + chartsLibraryBadge(e) + '</td>';
    h += '</tr>';
  }

  h += '</table></div></div>';
  $('#app').innerHTML = h;
}

function fmtNumber(n) {
  if (n == null) return '\u2014';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return '' + n;
}

function buildCharts(btn) {
  btn.disabled = true;
  btn.textContent = 'Building...';
  apiPost('/v1/charts/build', {}).then(function(data) {
    btn.textContent = 'Done';
    setTimeout(function() { loadCharts(); }, 1000);
  }).catch(function(e) {
    alert('Chart build failed: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Build Charts';
  });
}

function discoveryStatusBadge(status) {

function discoverySourceBadge(source) {

  if (source === 'lastfm_genre') return '<span class="badge badge-blue">genre</span>';

function renderDiscovery(stats, data) {

    + '<h2 style="font-size:18px">Music Discovery</h2>';

  if (!stats.enabled) {

  // Stats cards
  var sent = (stats.by_status.sent || 0) + (stats.by_status.in_lidarr || 0);
  h += '<div class="stats-grid">'
    + '<div class="stat-card"><div class="stat-value">' + stats.total + '</div><div class="stat-label">Total Discovered</div></div>'
    + '<div class="stat-card"><div class="stat-value" style="color:var(--green)">' + sent + '</div><div class="stat-label">Sent to Lidarr</div></div>'
    + '<div class="stat-card"><div class="stat-value" style="color:var(--yellow)">' + (stats.by_status.pending || 0) + '</div><div class="stat-label">Pending</div></div>'
    + '<div class="stat-card"><div class="stat-value">' + stats.today_count + ' <span style="font-size:14px;color:var(--text-dim)">/ ' + stats.daily_limit + '</span></div><div class="stat-label">Today</div></div>'
    + '</div>';

  // Requests table
  var requests = data.requests || [];
  if (!requests.length) {
    h += '<div class="empty">No discovery requests yet. Click "Run Discovery" to start finding new music.</div>';
    $('#app').innerHTML = h;
    return;
  }

  h += '<div class="panel full-width"><div class="panel-header">Recent Discoveries <span style="font-weight:400;color:var(--text-dim);font-size:12px">' + data.total + ' total</span></div>';
  h += '<div class="panel-body" style="overflow-x:auto"><table>'
    + '<tr><th>Artist</th><th>Source</th><th>Seed</th><th>Similarity</th><th>Status</th><th>When</th></tr>';

  for (var i = 0; i < requests.length; i++) {
    var r = requests[i];
    var seed = r.seed_artist ? esc(r.seed_artist) : (r.seed_genre ? '<span style="color:var(--text-dim)">' + esc(r.seed_genre) + '</span>' : '\u2014');
    var sim = r.similarity_score != null ? '<div class="bar-row"><div class="bar-fill" style="width:' + (r.similarity_score * 100).toFixed(0) + '%;background:var(--accent)"></div></div>' : '\u2014';
    var err = r.error_message ? ' title="' + esc(r.error_message) + '"' : '';

    h += '<tr' + err + '>'
      + '<td><b>' + esc(r.artist_name) + '</b>'
      + (r.artist_mbid ? '<br><span style="font-size:11px;color:var(--text-dim);font-family:monospace">' + esc(r.artist_mbid).substring(0, 16) + '...</span>' : '')
      + '</td>'
      + '<td>' + discoverySourceBadge(r.source) + '</td>'
      + '<td>' + seed + '</td>'
      + '<td style="min-width:80px">' + sim + '</td>'
      + '<td>' + discoveryStatusBadge(r.status) + '</td>'
      + '<td>' + timeAgo(r.created_at) + '</td>'
      + '</tr>';
  }
  h += '</table></div></div>';
  $('#app').innerHTML = h;
}

function runDiscovery(btn) {
  btn.disabled = true;
  btn.textContent = 'Running...';
  apiPost('/v1/discovery/run', {}).then(function(data) {
    btn.textContent = 'Started';
    // Poll for updates after a short delay
    setTimeout(function() { loadDiscovery(); }, 3000);
    setTimeout(function() { loadDiscovery(); }, 10000);
    setTimeout(function() { loadDiscovery(); }, 30000);
  }).catch(function(e) {
    alert('Discovery failed: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Run Discovery';
  });
}

function pipelineSelectStep(name) {
  pipelineSelectedStep = pipelineSelectedStep === name ? null : name;
  renderPipeline();
  // Load rich detail view for certain steps
  if (pipelineSelectedStep) {
    loadStepDetail(pipelineSelectedStep);
  }
}

function loadStepDetail(stepName) {
  var el = document.getElementById('step-detail-rich');
  if (!el) return;
  if (stepName === 'sessionizer') {
    el.innerHTML = '<div class="empty">Loading sessionizer stats...</div>';
    api('/v1/pipeline/stats/sessionizer').then(renderSessionizerDetail).catch(function(e) {
      el.innerHTML = '<div class="empty" style="color:var(--red)">Error: ' + esc(e.message) + '</div>';
    });
  } else if (stepName === 'track_scoring') {
    el.innerHTML = '<div class="empty">Loading scoring stats...</div>';
    api('/v1/pipeline/stats/scoring').then(renderScoringDetail).catch(function(e) {
      el.innerHTML = '<div class="empty" style="color:var(--red)">Error: ' + esc(e.message) + '</div>';
    });
  } else if (stepName === 'taste_profiles') {
    el.innerHTML = '<div class="empty">Loading taste profiles...</div>';
    loadTasteProfileExplorer();
  } else if (stepName === 'ranker') {
    el.innerHTML = '<div class="empty">Loading ranker stats...</div>';
    Promise.all([api('/v1/pipeline/models'), api('/v1/stats/model').catch(function(){return null;})]).then(function(r) {
      renderRankerDetail(r[0], r[1]);
    }).catch(function(e) { el.innerHTML = '<div class="empty" style="color:var(--red)">' + esc(e.message) + '</div>'; });
  } else {
    el.innerHTML = '';
  }
}

function renderSessionizerDetail(data) {
  var el = document.getElementById('step-detail-rich');
  if (!el) return;
  if (!data.total_sessions) { el.innerHTML = '<div class="empty">No sessions yet.</div>'; return; }

  var h = '<div class="stats-grid" style="margin-bottom:16px">';
  h += '<div class="stat-card"><div class="label">Total Sessions</div><div class="value">' + data.total_sessions.toLocaleString() + '</div></div>';
  h += '<div class="stat-card"><div class="label">Avg Duration</div><div class="value">' + fmtDuration(data.avg_duration_s) + '</div></div>';
  h += '<div class="stat-card"><div class="label">Avg Tracks/Session</div><div class="value">' + data.avg_tracks_per_session + '</div></div>';
  h += '<div class="stat-card"><div class="label">Avg Skip Rate</div><div class="value">' + (data.avg_skip_rate * 100).toFixed(1) + '%</div></div>';
  h += '</div>';

  // Skip rate distribution bar chart
  var dist = data.skip_rate_distribution || {};
  var distKeys = Object.keys(dist);
  var maxDist = 1;
  for (var i = 0; i < distKeys.length; i++) { if (dist[distKeys[i]] > maxDist) maxDist = dist[distKeys[i]]; }
  h += '<div class="panels"><div class="panel"><div class="panel-header">Skip Rate Distribution</div><div class="panel-body">';
  for (var i = 0; i < distKeys.length; i++) {
    var k = distKeys[i], v = dist[k];
    h += '<div class="bar-row"><div class="bar-label">' + esc(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (v/maxDist*100).toFixed(1) + '%;background:var(--red)"></div></div><div class="bar-count">' + v + '</div></div>';
  }
  h += '</div></div>';

  // Sessions per user histogram
  var perUser = data.sessions_per_user || [];
  var maxSpu = 1;
  for (var i = 0; i < perUser.length; i++) { if (perUser[i].sessions > maxSpu) maxSpu = perUser[i].sessions; }
  h += '<div class="panel"><div class="panel-header">Sessions per User</div><div class="panel-body">';
  for (var i = 0; i < perUser.length; i++) {
    var u = perUser[i];
    h += '<div class="bar-row"><div class="bar-label">' + esc(u.user_id) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (u.sessions/maxSpu*100).toFixed(1) + '%;background:var(--blue)"></div></div><div class="bar-count">' + u.sessions + '</div></div>';
  }
  h += '</div></div></div>';
  el.innerHTML = h;
}

function renderScoringDetail(data) {
  var el = document.getElementById('step-detail-rich');
  if (!el) return;
  if (!data.total_interactions) { el.innerHTML = '<div class="empty">No interactions yet.</div>'; return; }

  var h = '<div class="stat-card" style="display:inline-block;margin-bottom:16px"><div class="label">Total Interactions</div><div class="value">' + data.total_interactions.toLocaleString() + '</div></div>';

  // Score distribution histogram
  var bins = data.score_distribution || [];
  var maxBin = 1;
  for (var i = 0; i < bins.length; i++) { if (bins[i].count > maxBin) maxBin = bins[i].count; }

  h += '<div class="panels"><div class="panel"><div class="panel-header">Satisfaction Score Distribution</div><div class="panel-body">';
  for (var i = 0; i < bins.length; i++) {
    var b = bins[i];
    var color = i < 3 ? 'var(--red)' : i < 7 ? 'var(--yellow)' : 'var(--green)';
    h += '<div class="bar-row"><div class="bar-label">' + esc(b.range) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (b.count/maxBin*100).toFixed(1) + '%;background:' + color + '"></div></div><div class="bar-count">' + b.count + '</div></div>';
  }
  h += '</div></div>';

  // Signal counts
  var sig = data.signal_counts || {};
  var sigKeys = ['full_listens', 'likes', 'repeats', 'playlist_adds', 'early_skips', 'dislikes'];
  var sigColors = {'full_listens':'var(--green)','likes':'var(--green)','repeats':'var(--blue)','playlist_adds':'var(--blue)','early_skips':'var(--red)','dislikes':'var(--red)'};
  var maxSig = 1;
  for (var i = 0; i < sigKeys.length; i++) { if ((sig[sigKeys[i]] || 0) > maxSig) maxSig = sig[sigKeys[i]]; }
  h += '<div class="panel"><div class="panel-header">Signal Breakdown</div><div class="panel-body">';
  for (var i = 0; i < sigKeys.length; i++) {
    var k = sigKeys[i], v = sig[k] || 0;
    h += '<div class="bar-row"><div class="bar-label">' + fmtMetricLabel(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (v/maxSig*100).toFixed(1) + '%;background:' + sigColors[k] + '"></div></div><div class="bar-count">' + v.toLocaleString() + '</div></div>';
  }
  h += '</div></div></div>';

  // Top / bottom tracks
  h += '<div class="panels">';
  h += renderTrackScoreTable('Top Scored Tracks', data.top_tracks || [], 'var(--green)');
  h += renderTrackScoreTable('Lowest Scored Tracks', data.bottom_tracks || [], 'var(--red)');
  h += '</div>';

  el.innerHTML = h;
}

function renderTrackScoreTable(title, tracks, color) {
  var h = '<div class="panel"><div class="panel-header">' + esc(title) + '</div><div class="panel-body"><table>';
  h += '<tr><th>Track</th><th>Score</th><th>Plays</th></tr>';
  for (var i = 0; i < tracks.length; i++) {
    var t = tracks[i];
    var name = (t.artist && t.title) ? esc(t.artist) + ' \u2014 ' + esc(t.title) : esc(t.track_id);
    h += '<tr><td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + name + '</td>';
    h += '<td style="color:' + color + ';font-weight:600">' + t.score.toFixed(3) + '</td>';
    h += '<td>' + (t.plays || 0) + '</td></tr>';
  }
  h += '</table></div></div>';
  return h;
}

  var el = document.getElementById('taste-profile-content');

function renderTasteExplorer(profile) {
  var el = document.getElementById('taste-profile-content');
  if (!el) return;
  var tp = profile.taste_profile;
  if (!tp) { el.innerHTML = '<div class="empty">No taste profile computed yet for this user.</div>'; return; }

  var h = '<div class="panels">';

  // Radar chart (SVG)
  var ap = tp.audio_preferences || {};
  var ts = tp.timescale_audio || {};
  var shortP = ts.short || {};
  var longP = ts.long || {};
  var axes = ['energy', 'valence', 'danceability', 'acousticness', 'instrumentalness'];
  var axisLabels = ['Energy', 'Valence', 'Dance', 'Acoustic', 'Instrum.'];

  h += '<div class="panel"><div class="panel-header">Audio Preferences (Radar)</div><div class="panel-body chart-container">';
  h += renderRadarChart(axes, axisLabels, [
    { values: axes.map(function(a) { return (ap[a] && ap[a].mean != null) ? ap[a].mean : 0.5; }), color: 'var(--accent)', label: 'All-time' },
    { values: axes.map(function(a) { return shortP[a] != null ? shortP[a] : 0.5; }), color: 'var(--green)', label: '7-day' },
    { values: axes.map(function(a) { return longP[a] != null ? longP[a] : 0.5; }), color: 'var(--blue)', label: 'Long-term' },
  ]);
  h += '<div class="legend-row">';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> All-time</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> 7-day</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Long-term</div>';
  h += '</div></div></div>';

  // Time-of-day heatmap
  var timeP = tp.time_patterns || {};
  h += '<div class="panel"><div class="panel-header">Time of Day Pattern</div><div class="panel-body">';
  h += '<div class="heatmap-grid">';
  var maxTime = 0.01;
  for (var i = 0; i < 24; i++) { var v = parseFloat(timeP[String(i)] || 0); if (v > maxTime) maxTime = v; }
  for (var i = 0; i < 24; i++) {
    var v = parseFloat(timeP[String(i)] || 0);
    var intensity = maxTime > 0 ? v / maxTime : 0;
    var bg = 'rgba(124, 92, 252, ' + (intensity * 0.8 + 0.05).toFixed(2) + ')';
    h += '<div class="heatmap-cell" style="background:' + bg + '" title="' + i + ':00 \u2014 ' + v.toFixed(3) + '">' + i + '</div>';
  }
  h += '</div></div></div>';
  h += '</div>';

  // Mood + context bars
  h += '<div class="panels">';

  // Mood preferences
  var mp = tp.mood_preferences || {};
  var moodKeys = Object.keys(mp).sort(function(a, b) { return mp[b] - mp[a]; });
  h += '<div class="panel"><div class="panel-header">Mood Preferences</div><div class="panel-body">';
  if (!moodKeys.length) { h += '<div class="empty">No mood data</div>'; }
  else {
    var maxMood = mp[moodKeys[0]] || 1;
    for (var i = 0; i < Math.min(moodKeys.length, 10); i++) {
      var k = moodKeys[i], v = mp[k];
      h += '<div class="bar-row"><div class="bar-label">' + esc(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (v/maxMood*100).toFixed(1) + '%;background:var(--green)"></div></div><div class="bar-count">' + v.toFixed(2) + '</div></div>';
    }
  }
  h += '</div></div>';

  // Device/context/output/location breakdown
  var patternSets = [
    ['Device', tp.device_patterns || {}, 'var(--blue)'],
    ['Context Type', tp.context_type_patterns || {}, 'var(--accent)'],
    ['Output', tp.output_patterns || {}, 'var(--yellow)'],
    ['Location', tp.location_patterns || {}, 'var(--green)'],
  ];
  for (var p = 0; p < patternSets.length; p++) {
    var pName = patternSets[p][0], pData = patternSets[p][1], pColor = patternSets[p][2];
    var pKeys = Object.keys(pData).sort(function(a, b) { return pData[b] - pData[a]; });
    if (!pKeys.length) continue;
    var maxP = pData[pKeys[0]] || 1;
    h += '<div class="panel"><div class="panel-header">' + esc(pName) + ' Patterns</div><div class="panel-body">';
    for (var i = 0; i < pKeys.length; i++) {
      var k = pKeys[i], v = pData[k];
      h += '<div class="bar-row"><div class="bar-label">' + esc(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (v/maxP*100).toFixed(1) + '%;background:' + pColor + '"></div></div><div class="bar-count">' + v.toFixed(2) + '</div></div>';
    }
    h += '</div></div>';
  }
  h += '</div>';

  // Behaviour summary
  var b = tp.behaviour || {};
  if (b.total_plays != null) {
    h += '<div class="stats-grid">';
    h += '<div class="stat-card"><div class="label">Total Plays</div><div class="value">' + (b.total_plays || 0).toLocaleString() + '</div></div>';
    h += '<div class="stat-card"><div class="label">Active Days</div><div class="value">' + (b.active_days || 0) + '</div></div>';
    h += '<div class="stat-card"><div class="label">Avg Session Tracks</div><div class="value">' + (b.avg_session_tracks || 0).toFixed(1) + '</div></div>';
    h += '<div class="stat-card"><div class="label">Skip Rate</div><div class="value">' + (b.skip_rate != null ? (b.skip_rate * 100).toFixed(1) + '%' : '\u2014') + '</div></div>';
    h += '<div class="stat-card"><div class="label">Avg Completion</div><div class="value">' + (b.avg_completion != null ? (b.avg_completion * 100).toFixed(1) + '%' : '\u2014') + '</div></div>';
    h += '</div>';
  }

  el.innerHTML = h;
}

function renderRadarChart(axes, labels, series) {
  var cx = 120, cy = 120, r = 90;
  var n = axes.length;
  var h = '<svg width="240" height="260" viewBox="0 0 240 260">';

  // Grid rings
  for (var ring = 1; ring <= 4; ring++) {
    var rr = r * ring / 4;
    var points = [];
    for (var i = 0; i < n; i++) {
      var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      points.push((cx + rr * Math.cos(angle)).toFixed(1) + ',' + (cy + rr * Math.sin(angle)).toFixed(1));
    }
    h += '<polygon points="' + points.join(' ') + '" fill="none" stroke="' + (ring === 4 ? 'var(--border)' : 'rgba(42,45,58,0.5)') + '" stroke-width="1"/>';
  }

  // Axis lines + labels
  for (var i = 0; i < n; i++) {
    var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    var x2 = cx + r * Math.cos(angle);
    var y2 = cy + r * Math.sin(angle);
    h += '<line x1="' + cx + '" y1="' + cy + '" x2="' + x2.toFixed(1) + '" y2="' + y2.toFixed(1) + '" stroke="var(--border)" stroke-width="1"/>';
    var lx = cx + (r + 14) * Math.cos(angle);
    var ly = cy + (r + 14) * Math.sin(angle);
    var anchor = Math.abs(Math.cos(angle)) < 0.1 ? 'middle' : Math.cos(angle) > 0 ? 'start' : 'end';
    h += '<text x="' + lx.toFixed(1) + '" y="' + (ly + 4).toFixed(1) + '" class="radar-label" text-anchor="' + anchor + '">' + esc(labels[i]) + '</text>';
  }

  // Data series
  for (var s = 0; s < series.length; s++) {
    var vals = series[s].values;
    var color = series[s].color;
    var pts = [];
    for (var i = 0; i < n; i++) {
      var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      var v = Math.max(0, Math.min(1, vals[i] || 0));
      pts.push((cx + r * v * Math.cos(angle)).toFixed(1) + ',' + (cy + r * v * Math.sin(angle)).toFixed(1));
    }
    h += '<polygon points="' + pts.join(' ') + '" fill="' + color + '" fill-opacity="0.1" stroke="' + color + '" stroke-width="2"/>';
    for (var i = 0; i < n; i++) {
      var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      var v = Math.max(0, Math.min(1, vals[i] || 0));
      h += '<circle cx="' + (cx + r * v * Math.cos(angle)).toFixed(1) + '" cy="' + (cy + r * v * Math.sin(angle)).toFixed(1) + '" r="3" fill="' + color + '"/>';
    }
  }
  h += '</svg>';
  return h;
}

// --- Ranker detail ---

function renderRankerDetail(models, modelReport) {
  var el = document.getElementById('step-detail-rich');
  if (!el) return;
  var ranker = models ? models.ranker : null;
  if (!ranker || !ranker.trained) { el.innerHTML = '<div class="empty">Ranker model not trained yet.</div>'; return; }

  var h = '<div class="stats-grid" style="margin-bottom:16px">';
  h += '<div class="stat-card"><div class="label">Training Samples</div><div class="value">' + (ranker.training_samples || 0).toLocaleString() + '</div></div>';
  h += '<div class="stat-card"><div class="label">Features</div><div class="value">' + (ranker.n_features || 0) + '</div></div>';
  h += '<div class="stat-card"><div class="label">Engine</div><div class="value" style="font-size:16px">' + esc(ranker.engine || '?') + '</div></div>';
  h += '<div class="stat-card"><div class="label">Trained</div><div class="value" style="font-size:16px">' + timeAgo(ranker.trained_at) + '</div></div>';

  // NDCG gauge
  if (modelReport && modelReport.latest_evaluation && modelReport.latest_evaluation.ndcg_at_10 != null) {
    var ev = modelReport.latest_evaluation;
    var ndcg = ev.ndcg_at_10;
    var color = ev.lift_over_popularity_pct > 0 ? 'var(--green)' : ev.lift_over_popularity_pct === 0 ? 'var(--yellow)' : 'var(--red)';
    h += '<div class="stat-card"><div class="label">NDCG@10</div><div class="value" style="color:' + color + '">' + ndcg.toFixed(4) + '</div>';
    if (ev.lift_over_popularity_pct != null) h += '<div class="sub">Lift over popularity: ' + (ev.lift_over_popularity_pct > 0 ? '+' : '') + ev.lift_over_popularity_pct + '%</div>';
    h += '</div>';
  }
  h += '</div>';

  // Feature importance horizontal bar chart
  var fi = ranker.feature_importances || {};
  var fiKeys = Object.keys(fi).sort(function(a, b) { return fi[b] - fi[a]; });
  if (fiKeys.length > 0) {
    var maxFi = fi[fiKeys[0]] || 1;
    h += '<div class="panel full-width"><div class="panel-header">Feature Importance (top 20)</div><div class="panel-body">';
    for (var i = 0; i < Math.min(fiKeys.length, 20); i++) {
      var k = fiKeys[i], v = fi[k];
      h += '<div class="feat-bar"><div class="feat-name">' + esc(k) + '</div><div class="feat-track"><div class="feat-fill" style="width:' + (v/maxFi*100).toFixed(1) + '%"></div></div><div class="feat-val">' + v.toFixed(0) + '</div></div>';
    }
    h += '</div></div>';
  }

  // Baseline comparison bars
  if (modelReport && modelReport.latest_evaluation) {
    var ev = modelReport.latest_evaluation;
    h += '<div class="panels" style="margin-top:16px">';
    h += '<div class="panel"><div class="panel-header">NDCG@10 Baseline Comparison</div><div class="panel-body">';
    var bars = [
      ['Model', ev.ndcg_at_10, 'var(--accent)'],
      ['Popularity', ev.baseline_popularity_ndcg_at_10, 'var(--yellow)'],
      ['Random', ev.baseline_random_ndcg_at_10, 'var(--text-dim)'],
    ];
    var maxNdcg = 0.001;
    for (var i = 0; i < bars.length; i++) { if (bars[i][1] && bars[i][1] > maxNdcg) maxNdcg = bars[i][1]; }
    for (var i = 0; i < bars.length; i++) {
      if (bars[i][1] == null) continue;
      h += '<div class="bar-row"><div class="bar-label">' + bars[i][0] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (bars[i][1]/maxNdcg*100).toFixed(1) + '%;background:' + bars[i][2] + '"></div></div><div class="bar-count">' + bars[i][1].toFixed(4) + '</div></div>';
    }
    h += '</div></div>';

    // Impression funnel
    if (modelReport.impressions) {
      var imp = modelReport.impressions;
      h += '<div class="panel"><div class="panel-header">Impression-to-Stream Funnel</div><div class="panel-body">';
      var funnelMax = Math.max(imp.impressions || 1, 1);
      var funnelItems = [
        ['Impressions', imp.impressions || 0, 'var(--accent)'],
        ['Streams', imp.streams_from_reco || 0, 'var(--green)'],
      ];
      for (var i = 0; i < funnelItems.length; i++) {
        h += '<div class="bar-row"><div class="bar-label">' + funnelItems[i][0] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (funnelItems[i][1]/funnelMax*100).toFixed(1) + '%;background:' + funnelItems[i][2] + '"></div></div><div class="bar-count">' + funnelItems[i][1].toLocaleString() + '</div></div>';
      }
      if (imp.i2s_rate != null) {
        h += '<div style="padding:12px 16px;font-size:14px;font-weight:600;color:var(--green)">I2S Rate: ' + (imp.i2s_rate * 100).toFixed(1) + '%</div>';
      }
      h += '</div></div>';
    }
    h += '</div>';
  }

  el.innerHTML = h;
}

function loadRecommendations() {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">'
    + '<h2 style="font-size:18px">Recommendations</h2>'
    + '<div style="display:flex;gap:8px;align-items:center">'
    + '<button class="secondary" onclick="runPipeline()">Run Pipeline</button>'
    + '<button class="secondary" style="color:var(--red)" onclick="resetPipeline()">Reset Pipeline</button>'
    + '<span style="width:1px;height:20px;background:var(--border)"></span>'
    + '<select id="reco-user" class="inline-select"><option value="">Select user...</option>';
  for (var i = 0; i < cachedUsers.length; i++) {
    h += '<option value="' + esc(cachedUsers[i].user_id) + '">' + esc(cachedUsers[i].user_id) + '</option>';
  }
  h += '</select>'
    + '<input id="reco-seed" class="inline-select" placeholder="Seed track (optional)" style="width:200px">'
    + '<input id="reco-limit" type="number" class="inline-select" value="25" min="1" max="100" style="width:60px">'
    + '<button onclick="fetchRecommendations()">Get Recs</button>'
    + '<button class="secondary" onclick="fetchDebugRecommendations()">Debug Recs</button>'
    + '</div></div>';
  h += '<div id="reco-results"><div class="empty">Select a user and click "Get Recs" for normal results, or "Debug Recs" to trace the pipeline.</div></div>';
  $('#app').innerHTML = h;
}

function fetchDebugRecommendations() {
  var userId = document.getElementById('reco-user').value;
  if (!userId) return;
  var seed = document.getElementById('reco-seed').value.trim();
  var limit = parseInt(document.getElementById('reco-limit').value) || 25;
  var url = '/v1/recommend/' + encodeURIComponent(userId) + '?limit=' + limit + '&debug=true';
  if (seed) url += '&seed_track_id=' + encodeURIComponent(seed);

  document.getElementById('reco-results').innerHTML = '<div class="empty">Loading debug recommendations...</div>';

  api(url).then(function(data) {
    renderDebugResults(data);
  }).catch(function(e) {
    document.getElementById('reco-results').innerHTML = '<div class="empty" style="color:var(--red)">Error: ' + esc(e.message) + '</div>';
  });
}

function renderDebugResults(data) {
  var tracks = data.tracks || [];
  var debug = data.debug || {};

  var h = '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">';
  h += 'Debug: ' + esc(data.user_id) + ' <span style="font-weight:400;font-size:12px;color:var(--text-dim)">';
  h += tracks.length + ' tracks \u00B7 model: ' + esc(data.model_version) + ' \u00B7 total candidates: ' + (debug.total_candidates || '?');
  h += '</span></div></div>';

  // Candidate source pie chart (as horizontal bar)
  var cbs = debug.candidates_by_source || {};
  var srcKeys = Object.keys(cbs);
  var srcColors = {
    content:'var(--accent)', content_profile:'var(--accent)', cf:'var(--blue)',
    session_skipgram:'var(--yellow)', sasrec:'var(--green)', lastfm_similar:'var(--red)',
    artist_recall:'var(--green)', popular:'var(--yellow)'
  };

  h += '<div class="panels">';
  h += '<div class="panel"><div class="panel-header">Candidates by Source</div><div class="panel-body">';
  var maxSrc = 1;
  for (var i = 0; i < srcKeys.length; i++) { if (cbs[srcKeys[i]].length > maxSrc) maxSrc = cbs[srcKeys[i]].length; }
  for (var i = 0; i < srcKeys.length; i++) {
    var k = srcKeys[i], cnt = cbs[k].length;
    var color = srcColors[k] || 'var(--accent)';
    h += '<div class="bar-row"><div class="bar-label">' + sourceBadge(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (cnt/maxSrc*100).toFixed(1) + '%;background:' + color + '"></div></div><div class="bar-count">' + cnt + '</div></div>';
  }
  h += '</div></div>';

  // Reranker actions summary
  var actions = debug.reranker_actions || [];
  h += '<div class="panel"><div class="panel-header">Reranker Actions (' + actions.length + ')</div><div class="panel-body">';
  if (!actions.length) {
    h += '<div class="empty">No reranker actions taken.</div>';
  } else {
    // Group by action type
    var byAction = {};
    for (var i = 0; i < actions.length; i++) {
      var a = actions[i].action;
      byAction[a] = (byAction[a] || 0) + 1;
    }
    var actionKeys = Object.keys(byAction);
    var actionColors = {
      freshness_boost:'var(--green)', skip_suppression:'var(--red)',
      anti_repetition_exclude:'var(--red)', short_track_exclude:'var(--yellow)',
      exploration_slot:'var(--blue)', artist_diversity_demote:'var(--yellow)'
    };
    for (var i = 0; i < actionKeys.length; i++) {
      var k = actionKeys[i];
      h += '<div class="bar-row"><div class="bar-label" style="min-width:160px">' + fmtMetricLabel(k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (byAction[k]/actions.length*100).toFixed(1) + '%;background:' + (actionColors[k]||'var(--accent)') + '"></div></div><div class="bar-count">' + byAction[k] + '</div></div>';
    }
  }
  h += '</div></div></div>';

  // Pre-rank vs post-rank comparison
  var preRank = debug.pre_rerank || [];
  h += '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">Rank Comparison (Pre-Rerank \u2192 Final)</div><div class="panel-body">';
  h += '<div class="debug-columns">';

  // Build position maps
  var prePos = {};
  for (var i = 0; i < preRank.length; i++) { prePos[preRank[i].track_id] = i; }
  var postPos = {};
  for (var i = 0; i < tracks.length; i++) { postPos[tracks[i].track_id] = i; }

  // Final order with rank deltas
  h += '<div style="max-height:400px;overflow-y:auto">';
  h += '<div style="padding:8px 12px;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px">Final Order (click to inspect features)</div>';
  for (var i = 0; i < tracks.length; i++) {
    var t = tracks[i];
    var pre = prePos[t.track_id];
    var delta = pre != null ? pre - i : 0;
    var deltaCls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'same';
    var deltaStr = delta > 0 ? '\u25B2' + delta : delta < 0 ? '\u25BC' + Math.abs(delta) : '\u2014';
    var name = (t.title && t.artist) ? esc(t.artist) + ' \u2014 ' + esc(t.title) : esc(t.track_id);
    h += '<div class="rank-compare-row" onclick="toggleFeatureInspector(\'' + esc(t.track_id) + '\')">';
    h += '<span class="rank-num">' + (i + 1) + '</span>';
    h += '<span class="rank-track" title="' + esc(t.track_id) + '">' + name + '</span>';
    h += sourceBadge(t.source) + ' ';
    h += '<span style="font-size:11px;color:var(--text-dim)">' + t.score.toFixed(3) + '</span> ';
    h += '<span class="rank-delta ' + deltaCls + '">' + deltaStr + '</span>';
    h += '</div>';
    // Feature inspector placeholder
    h += '<div id="feat-inspect-' + esc(t.track_id) + '" style="display:none"></div>';
  }
  h += '</div>';

  // Reranker actions detail
  h += '<div style="max-height:400px;overflow-y:auto">';
  h += '<div style="padding:8px 12px;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px">Reranker Actions Detail</div>';
  for (var i = 0; i < actions.length; i++) {
    var a = actions[i];
    var aColor = (a.action.indexOf('boost') >= 0 || a.action === 'exploration_slot') ? 'var(--green)' : 'var(--red)';
    h += '<div style="padding:4px 12px;font-size:12px;border-bottom:1px solid var(--border)">';
    h += '<span style="color:' + aColor + ';font-weight:600">' + fmtMetricLabel(a.action) + '</span> ';
    h += '<span style="font-family:monospace;font-size:11px;color:var(--text-dim)">' + esc(a.track_id).slice(0, 16) + '</span>';
    if (a.score_before != null) h += ' <span style="font-size:11px">' + a.score_before.toFixed(3) + ' \u2192 ' + a.score_after.toFixed(3) + '</span>';
    if (a.noise_added != null) h += ' <span style="font-size:11px">noise: +' + a.noise_added.toFixed(3) + '</span>';
    if (a.from_position != null) h += ' <span style="font-size:11px">pos ' + a.from_position + ' \u2192 ' + a.to_position + '</span>';
    h += '</div>';
  }
  h += '</div></div></div>';

  // Store debug data globally for feature inspector
  window._debugData = debug;

  document.getElementById('reco-results').innerHTML = h;
}

function toggleFeatureInspector(trackId) {
  var el = document.getElementById('feat-inspect-' + trackId);
  if (!el) return;
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  var fv = window._debugData && window._debugData.feature_vectors && window._debugData.feature_vectors[trackId];
  if (!fv) { el.innerHTML = '<div style="padding:8px 12px;font-size:11px;color:var(--text-dim)">No feature data</div>'; el.style.display = 'block'; return; }
  var h = '<div class="feat-grid">';
  var keys = Object.keys(fv);
  for (var i = 0; i < keys.length; i++) {
    h += '<div class="feat-cell"><span class="fk">' + esc(keys[i]) + ':</span> <span class="fv">' + fv[keys[i]] + '</span></div>';
  }
  h += '</div>';
  el.innerHTML = h;
  el.style.display = 'block';
}

function renderDashboardWithHealth(stats, users, events, model) {
  // Call original dashboard render first, then append health panels
  renderDashboard(stats, users, events, model);

  // Add system health panels below the existing dashboard content
  var container = document.getElementById('app');
  if (!container) return;

  // Load async health data
  Promise.all([
    api('/v1/pipeline/stats/events').catch(function(){return null;}),
    api('/v1/pipeline/stats/activity?days=7').catch(function(){return null;}),
    api('/v1/pipeline/stats/engagement').catch(function(){return null;}),
  ]).then(function(results) {
    var healthHtml = '';

    // Event ingest sparkline
    if (results[0] && results[0].buckets && results[0].buckets.length > 0) {
      healthHtml += renderEventSparkline(results[0]);
    }

    // Library coverage (from stats already loaded)
    if (stats.library_coverage) {
      healthHtml += renderLibraryCoverage(stats.library_coverage);
    }

    // Listening activity timeline
    if (results[1] && results[1].buckets && results[1].buckets.length > 0) {
      healthHtml += renderActivityTimeline(results[1]);
    }

    // Engagement leaderboard
    if (results[2] && results[2].users && results[2].users.length > 0) {
      healthHtml += renderEngagementTable(results[2]);
    }

    if (healthHtml) {
      container.innerHTML += '<h2 style="font-size:16px;margin:24px 0 16px;color:var(--text-dim)">System Health & Trends</h2>' + healthHtml;
    }
  });
}

function renderEventSparkline(data) {
  var buckets = data.buckets;
  var w = 800, h = 60, pad = 4;
  var maxCount = 1;
  for (var i = 0; i < buckets.length; i++) { if (buckets[i].count > maxCount) maxCount = buckets[i].count; }

  var points = [];
  var barW = Math.max(2, (w - pad * 2) / buckets.length - 1);
  for (var i = 0; i < buckets.length; i++) {
    var x = pad + i * ((w - pad * 2) / buckets.length);
    var bh = (buckets[i].count / maxCount) * (h - pad * 2);
    points.push('<rect x="' + x.toFixed(1) + '" y="' + (h - pad - bh).toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + bh.toFixed(1) + '" fill="var(--accent)" opacity="0.7" rx="1"/>');
  }

  var totalEvents = 0;
  for (var i = 0; i < buckets.length; i++) totalEvents += buckets[i].count;

  var html = '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">Event Ingest Rate (24h) <span style="font-weight:400;font-size:12px;color:var(--text-dim)">' + totalEvents.toLocaleString() + ' events</span></div>';
  html += '<div class="panel-body chart-container"><svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:auto">';
  html += points.join('');
  html += '</svg></div></div>';
  return html;
}

function renderLibraryCoverage(cov) {
  var total = cov.total_files || 0;
  var analyzed = cov.total_analyzed || 0;
  var pct = total > 0 ? (analyzed / total * 100).toFixed(1) : 0;
  var vd = cov.version_distribution || {};
  var vKeys = Object.keys(vd);
  var failed = cov.failed_files || [];

  var html = '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">Library Coverage</div><div class="panel-body">';

  // Progress bar
  html += '<div style="padding:12px 16px">';
  html += '<div style="font-size:13px;margin-bottom:4px">Analyzed: <b>' + analyzed + '</b> / ' + total + ' files (' + pct + '%)</div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div>';
  html += '<div class="progress-text">' + pct + '%</div></div>';
  html += '</div>';

  // Version distribution
  if (vKeys.length > 0) {
    var maxVer = 1;
    for (var i = 0; i < vKeys.length; i++) { if (vd[vKeys[i]] > maxVer) maxVer = vd[vKeys[i]]; }
    html += '<div style="border-top:1px solid var(--border);padding-top:8px">';
    for (var i = 0; i < vKeys.length; i++) {
      html += '<div class="bar-row"><div class="bar-label">v' + esc(vKeys[i]) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (vd[vKeys[i]]/maxVer*100).toFixed(1) + '%;background:var(--blue)"></div></div><div class="bar-count">' + vd[vKeys[i]] + '</div></div>';
    }
    html += '</div>';
  }

  // Failed files
  if (failed.length > 0) {
    html += '<div style="border-top:1px solid var(--border);padding:8px 16px">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px">Failed Files (' + failed.length + ')</div>';
    for (var i = 0; i < Math.min(failed.length, 10); i++) {
      html += '<div style="font-size:11px;font-family:monospace;color:var(--text-dim);padding:2px 0">\u2717 ' + esc(failed[i].filename || '') + (failed[i].message ? ' \u2014 ' + esc(failed[i].message) : '') + '</div>';
    }
    html += '</div>';
  }

  html += '</div></div>';
  return html;
}

function renderActivityTimeline(data) {
  var buckets = data.buckets;
  if (!buckets.length) return '';

  // Collect all event types
  var allTypes = {};
  for (var i = 0; i < buckets.length; i++) {
    var keys = Object.keys(buckets[i]);
    for (var j = 0; j < keys.length; j++) { if (keys[j] !== 'timestamp') allTypes[keys[j]] = true; }
  }
  var types = Object.keys(allTypes);
  var typeColors = {
    play_start:'#34d399', play_end:'#22c55e', skip:'#f87171', like:'#60a5fa',
    dislike:'#fb923c', pause:'#fbbf24', resume:'#a78bfa', reco_impression:'#7c5cfc',
    playlist_add:'#2dd4bf', rating:'#e879f9', repeat:'#38bdf8', queue_add:'#818cf8'
  };
  var defaultColors = ['#7c5cfc','#34d399','#f87171','#60a5fa','#fbbf24','#a78bfa','#fb923c'];

  var w = 800, h = 120, pad = 30;
  var n = buckets.length;
  if (n < 2) return '';
  var dx = (w - pad * 2) / (n - 1);

  // Compute stacked totals
  var maxStack = 1;
  for (var i = 0; i < n; i++) {
    var sum = 0;
    for (var t = 0; t < types.length; t++) { sum += buckets[i][types[t]] || 0; }
    if (sum > maxStack) maxStack = sum;
  }

  var html = '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">Listening Activity (' + data.days + ' days)</div><div class="panel-body chart-container">';
  html += '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:auto">';

  // Draw stacked areas (bottom to top)
  for (var t = types.length - 1; t >= 0; t--) {
    var type = types[t];
    var color = typeColors[type] || defaultColors[t % defaultColors.length];
    var points = pad + ',' + (h - pad);
    for (var i = 0; i < n; i++) {
      var x = pad + i * dx;
      var stackSum = 0;
      for (var tt = 0; tt <= t; tt++) { stackSum += buckets[i][types[tt]] || 0; }
      var y = (h - pad) - (stackSum / maxStack) * (h - pad * 2);
      points += ' ' + x.toFixed(1) + ',' + y.toFixed(1);
    }
    points += ' ' + (pad + (n - 1) * dx).toFixed(1) + ',' + (h - pad);
    html += '<polygon points="' + points + '" fill="' + color + '" opacity="0.6"/>';
  }
  html += '</svg>';

  // Legend
  html += '<div class="legend-row">';
  for (var t = 0; t < types.length; t++) {
    var color = typeColors[types[t]] || defaultColors[t % defaultColors.length];
    html += '<div class="legend-item"><div class="legend-dot" style="background:' + color + '"></div> ' + esc(types[t]) + '</div>';
  }
  html += '</div></div></div>';
  return html;
}

function renderEngagementTable(data) {
  var users = data.users;
  var html = '<div class="panel full-width" style="margin-bottom:16px"><div class="panel-header">User Engagement (30 days)</div>';
  html += '<div class="panel-body" style="overflow-x:auto"><table>';
  html += '<tr><th>User</th><th>Events</th><th>Plays</th><th>Skip Rate</th><th>Unique Tracks</th><th>Diversity</th><th>Last Active</th></tr>';
  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    var skipColor = u.skip_rate > 0.5 ? 'color:var(--red)' : '';
    html += '<tr class="clickable" onclick="switchTab(\'users\');setTimeout(function(){viewUser(\'' + esc(u.user_id) + '\')},100)">';
    html += '<td><b>' + esc(u.user_id) + '</b></td>';
    html += '<td>' + u.total_events.toLocaleString() + '</td>';
    html += '<td>' + (u.plays || 0).toLocaleString() + '</td>';
    html += '<td style="' + skipColor + '">' + (u.skip_rate * 100).toFixed(1) + '%</td>';
    html += '<td>' + u.unique_tracks + '</td>';
    html += '<td>' + (u.diversity * 100).toFixed(0) + '%</td>';
    html += '<td>' + timeAgo(u.last_active) + '</td>';
    html += '</tr>';
  }
  html += '</table></div></div>';
  return html;
}

// News feed tab
// ---------------------------------------------------------------------------
var newsTagFilter = '';
var newsUser = '';

function loadNews() {
  if (!newsUser && cachedUsers && cachedUsers.length) newsUser = cachedUsers[0].user_id;
  if (!newsUser) { $('#app').innerHTML = '<div class="empty">No users found. Create a user first.</div>'; return; }
  var url = '/v1/news/' + encodeURIComponent(newsUser) + '?limit=50';
  if (newsTagFilter) url += '&tag=' + encodeURIComponent(newsTagFilter);
  api(url).then(renderNews).catch(function(e) {
    if (e.message && e.message.indexOf('503') !== -1) {
      $('#app').innerHTML = '<div style="padding:24px"><h2 style="margin:0 0 12px">Music News</h2><div class="empty">News feed is not enabled.<br>Set <code>NEWS_ENABLED=true</code> in your .env file.</div></div>';
    } else {
      $('#app').innerHTML = '<div style="padding:24px"><h2 style="margin:0 0 12px">Music News</h2><div class="empty">Failed to load news: ' + esc(e.message) + '</div></div>';
    }
  });
}

function refreshNewsFeed() {
  var btn = document.getElementById('news-refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Refreshing…'; }
  apiPost('/v1/news/refresh', {}).then(function() {
    // Refresh runs in background (~60s). Poll until cache is fresh.
    var polls = 0;
    var poller = setInterval(function() {
      polls++;
      if (polls > 40) { clearInterval(poller); if (btn) { btn.disabled = false; btn.textContent = 'Refresh Feed'; } return; }
      var url = '/v1/news/' + encodeURIComponent(newsUser) + '?limit=1';
      api(url).then(function(d) {
        if (d.total > 0 && d.cache_age_minutes != null && d.cache_age_minutes < 2) {
          clearInterval(poller);
          loadNews();
        }
      }).catch(function(){});
    }, 3000);
  }).catch(function(e) {
    alert('Failed to refresh news: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Refresh Feed'; }
  });
}

function renderNews(data) {
  var h = '<div style="padding:24px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
  h += '<h2 style="margin:0">Music News</h2>';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  // User selector
  if (cachedUsers && cachedUsers.length > 1) {
    h += '<select onchange="newsUser=this.value;loadNews()" style="background:var(--bg-card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px">';
    for (var i = 0; i < cachedUsers.length; i++) {
      h += '<option value="' + esc(cachedUsers[i].user_id) + '"' + (cachedUsers[i].user_id === newsUser ? ' selected' : '') + '>' + esc(cachedUsers[i].user_id) + '</option>';
    }
    h += '</select>';
  }
  // Tag filter
  h += '<select onchange="newsTagFilter=this.value;loadNews()" style="background:var(--bg-card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px">';
  h += '<option value="">All Posts</option>';
  var tags = ['FRESH', 'NEWS', 'DISCUSSION'];
  for (var t = 0; t < tags.length; t++) {
    h += '<option value="' + tags[t] + '"' + (newsTagFilter === tags[t] ? ' selected' : '') + '>' + tags[t] + '</option>';
  }
  h += '</select>';
  // Refresh button
  h += '<button id="news-refresh-btn" class="btn" onclick="refreshNewsFeed()" style="font-size:12px;padding:4px 12px">Refresh Feed</button>';
  h += '</div></div>';

  // Cache status
  if (data.cache_age_minutes != null) {
    var staleColor = data.cache_stale ? '#f59e0b' : 'var(--text-dim)';
    h += '<div style="text-align:right;margin-bottom:8px;font-size:11px;color:' + staleColor + '">Cache: ' + Math.round(data.cache_age_minutes) + 'min ago' + (data.cache_stale ? ' (stale)' : '') + '</div>';
  }

  if (!data.items || !data.items.length) {
    h += '<div class="empty">No news articles found.' + (newsTagFilter ? ' Try removing the tag filter.' : '') + '</div>';
    h += '</div>';
    $('#app').innerHTML = h; return;
  }

  h += '<div style="display:flex;flex-direction:column;gap:12px">';
  for (var i = 0; i < data.items.length; i++) {
    var item = data.items[i];
    h += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px">';
    // Title
    h += '<a href="' + esc(item.reddit_url) + '" target="_blank" rel="noopener" style="color:var(--text);font-weight:600;font-size:13px;text-decoration:none;line-height:1.4">' + esc(item.title) + '</a>';
    // Meta
    h += '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px">';
    h += '<span class="source-content" style="font-size:10px;padding:1px 6px;border-radius:4px">r/' + esc(item.subreddit) + '</span>';
    if (item.is_fresh) h += '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(34,197,94,0.15);color:#22c55e">FRESH</span>';
    if (item.parsed_tag && item.parsed_tag !== 'FRESH') h += '<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.08);color:var(--text-dim)">' + esc(item.parsed_tag) + '</span>';
    h += '<span style="font-size:11px;color:var(--text-dim)">' + item.score + ' pts · ' + item.num_comments + ' comments · ' + item.age_hours + 'h ago</span>';
    h += '</div>';
    // Relevance reasons
    if (item.relevance_reasons && item.relevance_reasons.length) {
      h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      for (var r = 0; r < item.relevance_reasons.length; r++) {
        var reason = item.relevance_reasons[r];
        var label = reason === 'artist_match' ? 'Artist you like' : reason === 'genre_match' ? 'Genre match' : reason === 'fresh' ? 'New release' : reason === 'high_engagement' ? 'Trending' : reason;
        h += '<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(124,92,252,0.15);color:var(--accent);font-weight:500">' + esc(label) + '</span>';
      }
      h += '</div>';
    }
    // Artists
    if (item.parsed_artists && item.parsed_artists.length) {
      h += '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">';
      h += item.parsed_artists.map(esc).join(', ');
      h += '</div>';
    }
    // Footer
    h += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px">';
    h += '<span style="color:var(--text-dim)">' + esc(item.domain) + '</span>';
    h += '<span style="margin-left:auto;color:var(--text-dim)">relevance: ' + item.relevance_score + '</span>';
    if (item.url && item.url !== item.reddit_url) {
      h += ' <a href="' + esc(item.url) + '" target="_blank" rel="noopener" class="btn" style="padding:2px 8px;font-size:10px">Link</a>';
    }
    h += '</div>';
    h += '</div>';
  }
  h += '</div></div>';
  $('#app').innerHTML = h;
}

// ---------------------------------------------------------------------------
// Algorithm config tab (Phase B)

var algoDefaults = null;   // { config: {...}, groups: [...] }
var algoCurrent = null;    // API response: { id, version, name, config, ... }
var algoEdited = null;     // Deep clone of config being edited
var algoHistory = null;    // Version history array
var algoCompareVersion = null; // Version number to diff against

function loadAlgorithm() {
  $('#app').innerHTML = '<div class="empty">Loading algorithm config\u2026</div>';
  Promise.all([
    api('/v1/algorithm/config/defaults'),
    api('/v1/algorithm/config'),
    api('/v1/algorithm/config/history?limit=50')
  ]).then(function(results) {
    algoDefaults = results[0];
    algoCurrent = results[1];
    algoEdited = JSON.parse(JSON.stringify(algoCurrent.config));
    algoHistory = results[2];
    algoCompareVersion = null;
    renderAlgorithm();
  }).catch(function(e) {
    $('#app').innerHTML = '<div class="empty">Failed to load config: ' + esc(e.message) + '</div>';
  });
}

function algoFieldSchema(groupKey) {
  // Extract field metadata from defaults + Pydantic schema info
  var defaults = algoDefaults.config[groupKey];
  var fields = [];
  for (var key in defaults) {
    if (!defaults.hasOwnProperty(key)) continue;
    fields.push({ key: key, default_value: defaults[key] });
  }
  return fields;
}

function algoIsRetrain(groupKey) {
  var groups = algoDefaults.groups;
  for (var i = 0; i < groups.length; i++) {
    if (groups[i].key === groupKey) return groups[i].retrain_required;
  }
  return false;
}

function algoFieldMeta(groupKey, fieldKey) {

      w_full_listen: { desc: "Weight for a full listen (completion >= 0.8 or dwell >= 30s)", min: -10, max: 10, step: 0.1 },

      early_skip_ms: { desc: "Milliseconds threshold for early skip classification", min: 100, max: 30000, step: 100, integer: true },

    },
    reranker: {
      artist_diversity_top_n: { desc: "Number of top positions to enforce artist diversity in", min: 1, max: 100, step: 1, integer: true },
      artist_max_per_top: { desc: "Max tracks from same artist in top N", min: 1, max: 20, step: 1, integer: true },
      repeat_window_hours: { desc: "Hours to suppress recently played tracks", min: 0, max: 168, step: 0.5 },
      freshness_boost: { desc: "Score multiplier boost for never-played tracks", min: 0, max: 1, step: 0.01 },
      skip_threshold: { desc: "Early skip count above which skip suppression activates", min: 1, max: 50, step: 1, integer: true },
      skip_demote_factor: { desc: "Score multiplier for skip-suppressed tracks", min: 0, max: 1, step: 0.05 },
      exploration_fraction: { desc: "Fraction of slots for under-explored tracks", min: 0, max: 0.5, step: 0.01 },

      min_duration_car: { desc: "Min track duration (seconds) in car/speaker mode", min: 0, max: 600, step: 5 }
    },
    candidate_sources: {
      content: { desc: "FAISS content-based similarity (from seed track)", min: 0, max: 5, step: 0.1 },
      content_profile: { desc: "FAISS similarity from user taste centroid", min: 0, max: 5, step: 0.1 },

      lastfm_similar: { desc: "Last.fm similar tracks (external CF)", min: 0, max: 5, step: 0.1 },
      sasrec: { desc: "SASRec transformer next-track prediction", min: 0, max: 5, step: 0.1 },
      popular: { desc: "Global popularity fallback", min: 0, max: 5, step: 0.1 },

    },
    taste_profile: {
      timescale_short_days: { desc: "Short-term taste window (days)", min: 1, max: 90, step: 1 },
      timescale_long_days: { desc: "Long-term taste window (days)", min: 30, max: 3650, step: 10 },
      top_tracks_limit: { desc: "Top tracks in taste profile", min: 10, max: 500, step: 10, integer: true },
      lastfm_decay_interactions: { desc: "Interactions at which Last.fm weight reaches ~37%", min: 10, max: 1000, step: 10 },
      onboarding_decay_interactions: { desc: "Interactions at which onboarding weight reaches ~37%", min: 10, max: 500, step: 10 },

    },
    ranker: {
