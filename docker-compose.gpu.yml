# GPU override for GrooveIQ
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Requires nvidia-container-toolkit on the host.
# For Intel iGPU (OpenVINO), use docker-compose.igpu.yml instead.

services:
  grooveiq:
    build:
      dockerfile: Dockerfile.gpu
    image: grooveiq:gpu

    environment:
      ANALYSIS_GPU: "true"
      ANALYSIS_GPU_WORKERS: "1"
      ANALYSIS_GPU_BATCH_SIZE: "64"

    volumes:
      - grooveiq_onnx:/cache/onnx

    # Adds GPU reservation on top of base limits.
    # CPU/memory limits come from the base docker-compose.yml via
    # CPU_LIMIT / MEM_LIMIT in .env — do NOT redefine them here.
    deploy:
      resources:
        reservations:
          memory: 256M
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  grooveiq_onnx:
