name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # ghcr.io requires lowercase image names. github.repository preserves the
  # original case ("Sxx7/GrooveIQ"), which docker push accepts but `trivy
  # image` rejects with "could not parse reference". Hardcode lowercase.
  IMAGE_NAME: sxx7/grooveiq

jobs:
  ruff-lint:
    name: Lint (ruff check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/

  ruff-format:
    name: Lint (ruff format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install ruff
      - run: ruff format --check app/ tests/

  pytest:
    name: Test (pytest)
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      API_KEYS: ci-test-key-must-be-at-least-32-chars-long
      SECRET_KEY: ci-secret-not-real
      DATABASE_URL: sqlite+aiosqlite:///test.db
      DISABLE_AUTH: 'true'
      # Tests that exercise /v1/recommend trigger fire-and-forget audit
      # writes via asyncio.create_task. Those tasks open their own
      # AsyncSessionLocal session pointing at DATABASE_URL above, which
      # is a separate engine from the test fixture's in-memory engine,
      # so the table doesn't exist there and the task logs an ERROR.
      # The audit code path is exercised explicitly in tests/test_reco_audit.py
      # via monkeypatch, so flipping the master switch here just silences
      # incidental noise from unrelated tests.
      RECO_AUDIT_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install system deps for Essentia
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libfftw3-dev libyaml-dev \
            libsamplerate0-dev libtag1-dev libchromaprint-dev
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --junitxml=report.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report
          path: report.xml
          retention-days: 30

  pip-audit:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --strict --desc

  semgrep:
    name: Security (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto --error --json --output semgrep-report.json app/
      - name: Upload semgrep report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  build-image:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [ruff-lint, pytest]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    name: Security (trivy image scan)
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # Don't fail the job — findings are reported via SARIF in the
          # Security tab. Treat the scan as a report, not a gate.
          exit-code: '0'
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
