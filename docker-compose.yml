# GrooveIQ – docker-compose.yml
#
# Usage:
#   cp .env.example .env          # edit your settings
#   docker compose up -d          # start
#   docker compose logs -f        # follow logs
#   docker compose down           # stop (data persists in ./data/)
#
# To use PostgreSQL instead of SQLite, uncomment the `db` service and
# update DATABASE_URL in your .env file.

services:

  grooveiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      platforms:
        - linux/amd64
    image: grooveiq:latest
    platform: linux/amd64
    container_name: grooveiq
    restart: unless-stopped

    ports:
      - "${GROOVEIQ_PORT:-8000}:8000"

    environment:
      # Core
      APP_ENV:              ${APP_ENV:-production}
      SECRET_KEY:           ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ENABLE_DOCS:          ${ENABLE_DOCS:-false}

      # Auth & Security
      API_KEYS:             ${API_KEYS:?API_KEYS must be set in .env}
      ALLOWED_HOSTS:        ${ALLOWED_HOSTS:-*}
      CORS_ORIGINS:         ${CORS_ORIGINS:-*}

      # Database (SQLite by default; swap for Postgres below)
      DATABASE_URL:         ${DATABASE_URL:-sqlite+aiosqlite:////data/grooveiq.db}

      # Audio analysis
      MUSIC_LIBRARY_PATH:   /music
      ANALYSIS_WORKERS:     ${ANALYSIS_WORKERS:-}
      RESCAN_INTERVAL_HOURS: ${RESCAN_INTERVAL_HOURS:-6}

      # Events
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-365}

      # Logging
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      LOG_JSON:             ${LOG_JSON:-true}

      # Media server integration (Plex / Navidrome)
      MEDIA_SERVER_TYPE:       ${MEDIA_SERVER_TYPE:-}
      MEDIA_SERVER_URL:        ${MEDIA_SERVER_URL:-}
      MEDIA_SERVER_TOKEN:      ${MEDIA_SERVER_TOKEN:-}
      MEDIA_SERVER_USER:       ${MEDIA_SERVER_USER:-}
      MEDIA_SERVER_PASSWORD:   ${MEDIA_SERVER_PASSWORD:-}
      MEDIA_SERVER_LIBRARY_ID: ${MEDIA_SERVER_LIBRARY_ID:-1}
      MEDIA_SERVER_MUSIC_PATH: ${MEDIA_SERVER_MUSIC_PATH:-}

      # Last.fm
      LASTFM_API_KEY:              ${LASTFM_API_KEY:-}
      LASTFM_API_SECRET:           ${LASTFM_API_SECRET:-}
      LASTFM_ENABLED:              ${LASTFM_ENABLED:-false}
      LASTFM_SCROBBLE_ENABLED:     ${LASTFM_SCROBBLE_ENABLED:-false}
      LASTFM_SESSION_ENCRYPTION_KEY: ${LASTFM_SESSION_ENCRYPTION_KEY:-}
      LASTFM_REFRESH_HOURS:        ${LASTFM_REFRESH_HOURS:-6}

      # Music discovery (Lidarr)
      LIDARR_URL:                  ${LIDARR_URL:-}
      LIDARR_API_KEY:              ${LIDARR_API_KEY:-}
      LIDARR_QUALITY_PROFILE_ID:   ${LIDARR_QUALITY_PROFILE_ID:-1}
      LIDARR_METADATA_PROFILE_ID:  ${LIDARR_METADATA_PROFILE_ID:-1}
      LIDARR_ROOT_FOLDER:          ${LIDARR_ROOT_FOLDER:-/music}
      DISCOVERY_CRON:              ${DISCOVERY_CRON:-0 3 * * *}
      DISCOVERY_MAX_REQUESTS_PER_DAY: ${DISCOVERY_MAX_REQUESTS_PER_DAY:-500}
      DISCOVERY_SIMILAR_LIMIT:     ${DISCOVERY_SIMILAR_LIMIT:-20}

      # Downloads — spotdl-api (preferred) or Spotizerr (legacy)
      SPOTDL_API_URL:              ${SPOTDL_API_URL:-}
      SPOTIZERR_URL:               ${SPOTIZERR_URL:-}
      SPOTIZERR_USERNAME:          ${SPOTIZERR_USERNAME:-}
      SPOTIZERR_PASSWORD:          ${SPOTIZERR_PASSWORD:-}
      CHARTS_SPOTIZERR_AUTO_ADD:   ${CHARTS_SPOTIZERR_AUTO_ADD:-false}
      CHARTS_SPOTIZERR_MAX_ADDS:   ${CHARTS_SPOTIZERR_MAX_ADDS:-50}

    volumes:
      # Persistent database & state
      - grooveiq_data:/data
      # Essentia model cache (avoids re-download on restart)
      - grooveiq_models:/cache/essentia
      # Your music library (read-only – GrooveIQ never modifies your files)
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}:/music:ro

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

    # Limit CPU/RAM so analysis jobs don't starve other containers
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEM_LIMIT:-2G}"
        reservations:
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

