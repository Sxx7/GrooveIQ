  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     grooveiq:
  #       condition: service_healthy

networks:
  default:
    # grooveiq_default — spotdl-api, acousticbrainz-lookup stay here
  apps_default:
    external: true
    # Shared network with the *arr stack (Lidarr, Sonarr, etc.)

volumes:
  grooveiq_data:
  grooveiq_models:
  ablookup_data:
