# GrooveIQ – GitLab CI/CD Pipeline
#
# Stages:
#   1. lint      – code quality & static analysis
#   2. test      – unit/integration tests
#   3. security  – dependency & container vulnerability scanning
#   4. build     – Docker image build & push to registry
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD
#     — auto-set when using GitLab Container Registry
#
# Optional variables:
#   GROOVEIQ_IMAGE  — override image name (default: $CI_REGISTRY_IMAGE)

stages:
  - lint
  - test
  - security
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_BUILDKIT: "1"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"

# ---------------------------------------------------------------------------
# Cache: shared pip cache across Python jobs
# ---------------------------------------------------------------------------
.python-cache: &python-cache
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip

# ===========================================================================
# Stage 1: Lint
# ===========================================================================

ruff-lint:
  stage: lint
  image: python:3.12-slim
  <<: *python-cache
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check app/ tests/
  allow_failure: false

ruff-format:
  stage: lint
  image: python:3.12-slim
  <<: *python-cache
  before_script:
    - pip install --quiet ruff
  script:
    - ruff format --check app/ tests/
  allow_failure: true  # advisory until codebase is formatted

# ===========================================================================
# Stage 2: Test
# ===========================================================================

pytest:
  stage: test
  image: python:3.12-slim
  <<: *python-cache
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends
        build-essential cmake libfftw3-dev libyaml-dev
        libsamplerate0-dev libtag1-dev libchromaprint-dev > /dev/null 2>&1
    - pip install --quiet -r requirements.txt
  script:
    - pytest tests/ -v --tb=short --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 30 days
  variables:
    APP_ENV: testing
    API_KEYS: "test-key-ci"
    SECRET_KEY: "ci-secret-not-real"
    DATABASE_URL: "sqlite+aiosqlite:///test.db"
    DISABLE_AUTH: "true"

# ===========================================================================
# Stage 3: Security
# ===========================================================================

dependency-scan:
  stage: security
  image: python:3.12-slim
  <<: *python-cache
  before_script:
    - pip install --quiet pip-audit
  script:
    - pip-audit -r requirements.txt --strict --desc
  allow_failure: true  # alert but don't block deploys for upstream CVEs
  artifacts:
    when: always
    paths:
      - pip-audit-report.txt
    expire_in: 30 days

semgrep:
  stage: security
  image: semgrep/semgrep:latest
  script:
    - semgrep scan --config auto --error --json --output semgrep-report.json app/
  allow_failure: true
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 30 days

trivy-image:
  stage: security
  image: docker:24
  services:
    - docker:24-dind
  needs: ["build-image"]
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker pull "$IMAGE_TAG"
  script:
    - trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed "$IMAGE_TAG"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 30 days

# ===========================================================================
# Stage 4: Build & Push Docker Image
# ===========================================================================

build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build
        --platform linux/amd64
        --build-arg BUILDKIT_INLINE_CACHE=1
        --cache-from "$IMAGE_LATEST"
        --tag "$IMAGE_TAG"
        --tag "$IMAGE_LATEST"
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA"
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
