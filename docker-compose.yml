# GrooveIQ – docker-compose.yml
#
# Usage:
#   cp .env.example .env          # edit your settings
#   docker compose up -d          # start
#   docker compose logs -f        # follow logs
#   docker compose down           # stop (data persists in ./data/)
#
# To use PostgreSQL instead of SQLite, uncomment the `db` service and
# update DATABASE_URL in your .env file.

services:

  grooveiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      platforms:
        - linux/amd64
    image: grooveiq:latest
    platform: linux/amd64
    container_name: grooveiq
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]

    ports:
      - "${GROOVEIQ_PORT:-8000}:8000"

    environment:
      # Core
      APP_ENV:              ${APP_ENV:-production}
      SECRET_KEY:           ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ENABLE_DOCS:          ${ENABLE_DOCS:-false}

      # Auth & Security
      API_KEYS:             ${API_KEYS:?API_KEYS must be set in .env}
      ALLOWED_HOSTS:        ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ORIGINS:         ${CORS_ORIGINS:-}

      # Database (SQLite by default; swap for Postgres below)
      DATABASE_URL:         ${DATABASE_URL:-sqlite+aiosqlite:////data/grooveiq.db}

      # Audio analysis
      MUSIC_LIBRARY_PATH:   /music
      ANALYSIS_WORKERS:     ${ANALYSIS_WORKERS:-}
      RESCAN_INTERVAL_HOURS: ${RESCAN_INTERVAL_HOURS:-6}

      # Events
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-365}

      # Logging
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      LOG_JSON:             ${LOG_JSON:-true}

      # Media server integration (Plex / Navidrome)
      MEDIA_SERVER_TYPE:       ${MEDIA_SERVER_TYPE:-}
      MEDIA_SERVER_URL:        ${MEDIA_SERVER_URL:-}
      MEDIA_SERVER_TOKEN:      ${MEDIA_SERVER_TOKEN:-}
      MEDIA_SERVER_USER:       ${MEDIA_SERVER_USER:-}
      MEDIA_SERVER_PASSWORD:   ${MEDIA_SERVER_PASSWORD:-}
      MEDIA_SERVER_LIBRARY_ID: ${MEDIA_SERVER_LIBRARY_ID:-1}
      MEDIA_SERVER_MUSIC_PATH: ${MEDIA_SERVER_MUSIC_PATH:-}

      # Last.fm
      LASTFM_API_KEY:              ${LASTFM_API_KEY:-}
      LASTFM_API_SECRET:           ${LASTFM_API_SECRET:-}
      LASTFM_ENABLED:              ${LASTFM_ENABLED:-false}
      LASTFM_SCROBBLE_ENABLED:     ${LASTFM_SCROBBLE_ENABLED:-false}
      LASTFM_SESSION_ENCRYPTION_KEY: ${LASTFM_SESSION_ENCRYPTION_KEY:-}
      LASTFM_REFRESH_HOURS:        ${LASTFM_REFRESH_HOURS:-6}

      # Music discovery (Lidarr)
      LIDARR_URL:                  ${LIDARR_URL:-}
      LIDARR_API_KEY:              ${LIDARR_API_KEY:-}
      LIDARR_QUALITY_PROFILE_ID:   ${LIDARR_QUALITY_PROFILE_ID:-1}
      LIDARR_METADATA_PROFILE_ID:  ${LIDARR_METADATA_PROFILE_ID:-1}
      LIDARR_ROOT_FOLDER:          ${LIDARR_ROOT_FOLDER:-/music}
      DISCOVERY_CRON:              ${DISCOVERY_CRON:-0 3 * * *}
      DISCOVERY_MAX_REQUESTS_PER_DAY: ${DISCOVERY_MAX_REQUESTS_PER_DAY:-500}
      DISCOVERY_SIMILAR_LIMIT:     ${DISCOVERY_SIMILAR_LIMIT:-20}

      # Downloads — spotdl-api (preferred) or Spotizerr (legacy)
      SPOTDL_API_URL:              ${SPOTDL_API_URL:-http://spotdl-api:8181}
      SPOTIZERR_URL:               ${SPOTIZERR_URL:-}
      SPOTIZERR_USERNAME:          ${SPOTIZERR_USERNAME:-}
      SPOTIZERR_PASSWORD:          ${SPOTIZERR_PASSWORD:-}
      CHARTS_SPOTIZERR_AUTO_ADD:   ${CHARTS_SPOTIZERR_AUTO_ADD:-false}
      CHARTS_SPOTIZERR_MAX_ADDS:   ${CHARTS_SPOTIZERR_MAX_ADDS:-50}

      # Spotify credentials (for spotdl-api)
      SPOTIFY_CLIENT_ID:           ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET:       ${SPOTIFY_CLIENT_SECRET:-}

      # Charts
      CHARTS_ENABLED:              ${CHARTS_ENABLED:-false}
      CHARTS_INTERVAL_HOURS:       ${CHARTS_INTERVAL_HOURS:-24}
      CHARTS_TOP_LIMIT:            ${CHARTS_TOP_LIMIT:-100}
      CHARTS_TAGS:                 ${CHARTS_TAGS:-}
      CHARTS_COUNTRIES:            ${CHARTS_COUNTRIES:-}
      CHARTS_LIDARR_AUTO_ADD:      ${CHARTS_LIDARR_AUTO_ADD:-false}
      CHARTS_LIDARR_MAX_ADDS:      ${CHARTS_LIDARR_MAX_ADDS:-50}

      # AcousticBrainz Lookup
      AB_LOOKUP_URL:               ${AB_LOOKUP_URL:-}
      AB_LOOKUP_ENABLED:           ${AB_LOOKUP_ENABLED:-false}
      AB_DISCOVERY_LIMIT:          ${AB_DISCOVERY_LIMIT:-50}

      # News feed (Reddit)
      NEWS_ENABLED:                ${NEWS_ENABLED:-false}
      NEWS_INTERVAL_MINUTES:       ${NEWS_INTERVAL_MINUTES:-30}
      NEWS_MAX_AGE_HOURS:          ${NEWS_MAX_AGE_HOURS:-48}
      NEWS_DEFAULT_SUBREDDITS:     ${NEWS_DEFAULT_SUBREDDITS:-Music,hiphopheads,indieheads,electronicmusic,popheads,metal,rnb}
      NEWS_MAX_POSTS_PER_SUB:      ${NEWS_MAX_POSTS_PER_SUB:-50}

    volumes:
      # Persistent database & state
      - grooveiq_data:/data
      # Essentia model cache (avoids re-download on restart)
      - grooveiq_models:/cache/essentia
      # Your music library (read-only – GrooveIQ never modifies your files)
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}:/music:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64M

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

    # Limit CPU/RAM so analysis jobs don't starve other containers
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEM_LIMIT:-2G}"
        reservations:
          memory: 256M

    networks:
      - default
      - apps_default

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # spotdl-api (Spotify-matched downloads via YouTube Music)
  # ---------------------------------------------------------------------------
  spotdl-api:
    build:
      context: ./spotdl-api
      dockerfile: Dockerfile
    image: spotdl-api:latest
    container_name: spotdl-api
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:noexec,nosuid,size=128M
    ports:
      - "${SPOTDL_API_PORT:-8181}:8181"
    environment:
      OUTPUT_DIR:        /music
      OUTPUT_FORMAT:     ${SPOTDL_FORMAT:-opus}
      BITRATE:           ${SPOTDL_BITRATE:-auto}
      OUTPUT_TEMPLATE:   ${SPOTDL_TEMPLATE:-{artist}/{album}/{artists} - {title}.{output-ext}}
      MAX_THREADS:       ${SPOTDL_THREADS:-4}
      SPOTIFY_CLIENT_ID:     ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
    volumes:
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}:/music
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8181/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${SPOTDL_CPU_LIMIT:-1.0}"
          memory: "${SPOTDL_MEM_LIMIT:-1G}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Optional: AcousticBrainz Lookup (audio-feature discovery from 29.5M tracks)
  # ---------------------------------------------------------------------------
  # Uncomment to enable. Set AB_LOOKUP_ENABLED=true in .env on the grooveiq
  # container.  First run downloads ~39 GB (or 85 MB with AB_SAMPLE_MODE=true).
  #
  acousticbrainz-lookup:
    build: ./acousticbrainz-lookup
    container_name: acousticbrainz-lookup
    restart: unless-stopped
    ports:
      - "${AB_LOOKUP_PORT:-8200}:8200"
    environment:
      SAMPLE_MODE: ${AB_SAMPLE_MODE:-false}
      LOG_LEVEL: ${AB_LOG_LEVEL:-INFO}
    volumes:
      - ablookup_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${AB_CPU_LIMIT:-1.0}"
          memory: "${AB_MEM_LIMIT:-2G}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Optional: PostgreSQL (uncomment for multi-user / production deployments)
  # ---------------------------------------------------------------------------
  # db:
  #   image: postgres:16-alpine
  #   container_name: grooveiq_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER:     grooveiq
