  #   volumes:
  #     - grooveiq_pg:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U grooveiq"]
  #     interval: 10s
  #     timeout:  5s
  #     retries:  5

  # ---------------------------------------------------------------------------
  # Optional: Caddy reverse proxy (HTTPS with auto TLS via Let's Encrypt)
  # ---------------------------------------------------------------------------
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: grooveiq_caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     grooveiq:
  #       condition: service_healthy

networks:
  default:
    # grooveiq_default — spotdl-api, acousticbrainz-lookup stay here
  apps_default:
    external: true
    # Shared network with the *arr stack (Lidarr, Sonarr, etc.)

volumes:
  grooveiq_data:
  grooveiq_models:
  ablookup_data:
